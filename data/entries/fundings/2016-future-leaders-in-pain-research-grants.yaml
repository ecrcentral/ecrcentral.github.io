comments: This year APS Future Leaders grants will be funded in part by the Mayday
  Fund. Up to two awards for $25,000 each to basic science pain research proposals
  and one award for $25,000 translational science pain research proposals will be
  given to those demonstrating the greatest merit and potential for success. The Future
  Leaders in Pain Research Grant Program was established in 2005 to fund pain research
  projects of doctoral-prepared investigators who have not yet attained NIH RO1-level
  funding. The purpose of this grant is to encourage research in pain that will add
  to the existing body of knowledge, and to allow investigators to develop pilot data
  that will aid them in securing additional major grant funding for continued pain
  research.
