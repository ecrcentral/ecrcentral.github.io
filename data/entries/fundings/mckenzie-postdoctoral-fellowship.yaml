description: The McKenzie Postdoctoral Fellowships Program has been established to
  attract outstanding recent doctoral graduates to the University from around the
  world. The Program aims to recruit new researchers who have the potential to build
  and lead interdisciplinary collaborative research activities inside and across Academic
  Divisions. The University offers a leading and lively research environment that
