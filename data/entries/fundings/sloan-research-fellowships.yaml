comments: Limited Submission (3 per department) Fellowships support fundamental research
  by early-career faculty. Candidates must hold a Ph.D. (or equivalent) in chemistry,
  computational or evolutionary molecular biology, computer science, economics, mathematics,
  neuroscience, ocean sciences, physics, or a related field. Candidates should be
  no more than six years from completion of their most recent Ph.D. (or equivalent)
  as of the year of their nomination. Awards are $55,000 over two years.
benefits: Fellowship funds may be used by the fellow for any expense judged supportive
