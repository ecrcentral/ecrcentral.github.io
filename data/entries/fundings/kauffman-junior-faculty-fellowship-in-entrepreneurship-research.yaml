comments: The Kauffman Foundation established the Kauffman Junior Faculty Fellowship
  in Entrepreneurship Research in 2008 to recognize tenured or tenure-track junior
  faculty members at accredited U.S. universities who are beginning to establish a
  record of scholarship and exhibit the potential to make significant contributions
  to the body of research in the field of entrepreneurship. The Kauffman Foundation
  will award up to five Junior Faculty Fellowship grants to junior faculty members
  whose research has the potential to make significant contributions to the body of
  research in the field of entrepreneurship. Each fellow's university will receive
  a grant of $50,000 over two years to support the research activities of the fellow.
  Multiple nominations are permitted by a single nominator, and universities may have
  multiple faculty members nominated for the Fellowship.
