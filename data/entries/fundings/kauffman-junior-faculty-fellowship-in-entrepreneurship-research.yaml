description: The Kauffman Foundation established the Kauffman Junior Faculty Fellowship
  in Entrepreneurship Research in 2008 to recognize tenured or tenure-track junior
  faculty members at accredited U.S. universities who are beginning to establish a
  record of scholarship and exhibit the potential to make significant contributions
  to the body of research in the field of entrepreneurship.
