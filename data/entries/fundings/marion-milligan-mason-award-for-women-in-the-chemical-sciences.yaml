comments: The objective of the Mason Award is to kick-start the research career of
  promising future senior investigators in the chemical sciences. Awards are for women
  who are starting their academic research careers. In addition to research funding,
  the program will provide leadership development and mentoring opportunities. Applicants
  must have a full-time career-track appointment. More than one applicant from the
  same institution can apply for this award, provided that each application is scientifically
  distinct. The Marion Milligan Mason Fund will provide four grants of $50,000 every
  other year to women researchers engaged in basic research in the chemical sciences.
