comments: The Medical Toxicology Foundation is accepting applications for its 2017
  Research and Teaching Awards. Through the program, the foundation will award a grant
  or grants totaling up to $20,000 over one to two years in support of innovative
  projects that support its mission to advance understanding, enhance patient care,
  and improve the dissemination of knowledge with respect to toxic exposures. Current
  research and education priorities of the foundation include support for early-career
  investigators (fellows and young faculty with less than five years post-fellowship
  training) and support for the development of innovative approaches to the delivery
  of medical toxicology education to healthcare providers and the lay public.
