comments: 'These grants support oncology nursing research. Research projects may include
  pilot or feasibility studies or the development of a new aspect of a program of
  research. Funding preference is given to research that addresses the ONS Research
  Priorities and/or the ONS Research Agenda. Eligibility: The principal investigator
  must be actively involved in some aspect of cancer patient care, education, or research,
  and be PhD- or DNSc-prepared. Funding preference is given to projects that involve
  nurses in the design and conduct of the research activity and that promote theoretically
  based oncology practice. Membership in ONS is not required for eligibility.'
