comments: This year, we’re asking for projects that deal specifically with EDS — Ehlers-Danlos
  syndrome — and its effects on hemostasis and thrombosis. Extensive bruising, spontaneous
  arterial rupture, rupture of hollow organs, and severe internal bleeding are predominant
  features in EDS. Patients suffering from such syndromes typically undergo hematological
  studies including evaluation of clotting factors, platelet aggregation, and bleeding
  time. Aniara has a passionate interest in this research because one of our own family
  suffers from EDS. We hope the grant will be used to spread awareness of this disease
  and address its specific issues within the hemostasis and coagulation fields.
