comments: The objective of the of the NIAID Career Transition Award is to support
  postdoctoral fellows transitioning to positions of assistant professor or equivalent,
  and initiate a successful biomedical career as an independent research scientist.
  NIH believes that the creativity and innovation of new independent investigators
  in their early career stages play an integral role in addressing our Nation’s biomedical,
  behavioral, and clinical research needs. The intent of the NIAID K22 program is
  to help alleviate this trend and to assist new investigators in transitioning to
  stable independent research positions at an earlier age and with an enhanced probability
  of success in obtaining independent NIH or other independent research support. The
  K22 award will provide two years of support to conduct biomedical research as an
  independent scientist at an extramural sponsoring institution/organization to which
  the individual has been recruited, been offered and has accepted a tenure-track
  full-time assistant professor position (or equivalent). In the first year of the
  K22 award, the PI may request $150,000 (total direct cost), and $100,000 (total
  direct cost) in the second year. The PI will have discretion to utilize the award
  as needed by the research described in the application. However, no more than $50,000
  per year of the award may be utilized to support the Principal Investigators salary.
  $250,000 over 2 years.
