comments: The American Society for Surgery of the Hand (ASSH) and the American Foundation
  for Surgery of the Hand  (AFSH) have established grant funding to encourage young
  investigators to perform basic science research studies.  Our goal is to enable
  investigators to initiate pilot projects that will lead to subsequent funding from
  other sources such as the National Institutes of Health (NIH).  The AFSH is committed
  to excellence in basic science research while maintaining the highest academic integrity
  and fiscal responsibility.  All applications are welcome, but need to have an ASSH
  Active member as the principal investigator, co-investigator, or sponsor. The maximum
  Basic Science Grant award is $20,000 for a one-year grant.
benefits: In the past, funding has been provided for a range of subjects, including
  microvascular, tendons, nerves, artificial joints, tissue engineering, biomechanics,
  rehabilitation, and other related subjects.
