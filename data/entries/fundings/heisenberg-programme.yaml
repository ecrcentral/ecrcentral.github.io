name: Heisenberg programme
description: The Heisenberg Programme is directed primarily at those researchers who
  have qualified for professorship via the Emmy Noether Programme, leadership of a
  junior research group, DFG project staff positions, private-sector research or mid-level
  faculty positions. The target group also includes junior professors who have received
  positive evaluations, those who have achieved their habilitation or an equivalent
  qualification, and German researchers returning from abroad, as well as appropriately
  qualified foreign researchers looking to pursue careers in Germany.
