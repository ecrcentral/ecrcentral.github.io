comments: The Fund recognizes that young investigators may find it difficult to remain
  in pediatric research because of a lack of funding. Therefore, the purpose of this
  program is to encourage the development of medical research in child health by awarding
  small grants to new researchers, helping them gain a foothold in this important
  area. The Fund makes approximately 30 awards each year. There are three funding
  cycles per year for Early Career Award Program grants. Awards may be up to $25,000
  in direct costs.
benefits: "The grant amount is based on the actual budgetary needs of the project,\
  \ with a maximum of $25,000 in direct costs for the entire grant. The duration of\
  \ the project can be up to two years. Indirect costs of no more than 7% of direct\
  \ costs will be paid on Early Career Award Program grants. Up to $12,500 in total\
  \ of the proposed budget may be used for salary (including fringe) of the new researcher.\
  \ Funds not needed for salary are to be used for research supplies or other research-related\
  \ expenses.\r\n\r\nThe cost of attending conferences are allowed for the applicant\
  \ to report findings resulting from Thrasher-supported research. Such travel costs\
  \ may not exceed $2,000.\r\n\r\nRequests for purchase of major equipment (items\
  \ >$4,000) are discouraged and rarely funded."
