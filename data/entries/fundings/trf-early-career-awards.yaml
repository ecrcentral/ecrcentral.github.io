name: Early Career Awards
description: The Fund recognizes that young investigators may find it difficult to
  remain in pediatric research because of a lack of funding. Therefore, the purpose
  of this program is to encourage the development of medical research in child health
  by awarding small grants to new researchers, helping them gain a foothold in this
  important area. The goal is to fund applicants who will go on to be independent
  investigators. The Fund will make up to 30 awards total with two funding cycles
  (15 awards each).
