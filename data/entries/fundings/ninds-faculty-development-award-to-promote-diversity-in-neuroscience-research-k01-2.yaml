comments: The purpose of the Faculty Development Award to Promote Diversity in Neuroscience
  Research is to support an intensive, supervised career development and scientific
  mentoring experience for promising junior investigators (defined as = 3 years of
  a first time tenure track or equivalent faculty position) from backgrounds underrepresented
  in biomedical research. The proposed career development experience is expected to
  substantially contribute to the research capabilities of the applicant, provide
  protected time from teaching/other duties and provide resources to hone skills in
  grant writing and publication of high impact research. IH will contribute up to
  $ 85,000   per year toward the salary of the career award recipient and $100,000  per
  year toward the research development costs of the award recipient. Award for up
  to 3 years.
