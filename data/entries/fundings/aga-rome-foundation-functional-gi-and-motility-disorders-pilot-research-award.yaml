comments: The objective of this award is to provide investigators funds to help establish
  their research careers or support pilot projects that represent new research directions.
  The intent of the award is to stimulate research in the areas of functional GI and
  motility disorders by providing time for investigators to obtain new data that can
  ultimately lead to subsequent grant applications for more substantial funding and
  duration. The proposed research must address the pathophysiology, diagnosis, and/or
  treatment of functional gastrointestinal or motility disorders. This research initiative
  grant for $50,000 for one year is offered to early stage and established investigators
  to support pilot research projects pertaining to functional GI and motility disorders.
