comments: "We are particularly interested in analyses that make use of newly available\
  \ data or demonstrate novel uses of existing data. We also support original data\
  \ collection. Proposals to conduct field experiments, in-depth qualitative interviews,\
  \ and ethnographies are also encouraged.\r\n\r\nThe Foundation encourages methodological\
  \ variety and inter-disciplinary collaboration. All proposed projects must have\
  \ well-developed conceptual frameworks and research designs. Analytical models must\
  \ be specified and research questions and hypotheses (where applicable) must be\
  \ clearly stated.\r\n\r\nFunding can be used for research assistance, data acquisition,\
  \ data analysis, and investigator time for conducting research and writing up results.\
  \ Trustee Grants are generally capped at $175,000, including 15% indirect costs,\
  \ over a two-year period. Presidential Awards are capped at $35,000 (no indirect\
  \ costs). PIs may request up to $50,000 (no indirect costs) when the proposed research\
  \ project has special needs for gathering data (e.g.: qualitative research) or gaining\
  \ access to restricted-use data.\r\n\r\nRSF particularly encourages early career\
  \ scholars to apply for Presidential grants. All nationalities are eligible to apply\
  \ and applicants do not have to reside in the U.S., but the focus of the proposed\
  \ research project must be on the U.S. as per our mission."
