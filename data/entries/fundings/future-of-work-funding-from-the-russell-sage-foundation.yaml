name: Future of Work Funding from the Russell Sage Foundation
description: The Russell Sage Foundation’s program on the Future of Work supports
  innovative research on the causes and consequences of changes in the quality of
  jobs for less- and moderately-skilled workers and their families. We seek investigator-initiated
  research proposals that will broaden our understanding of the role of changes in
  employer practices, the nature of the labor market and public policies on the employment,
  earnings, and the quality of jobs of workers. We are especially interested in proposals
  that address important questions about the interplay of market and non-market forces
  in shaping the wellbeing of workers, today and in the future.
