description: The Understanding Dynamic and Multi-scale Systems program supports scholarship
  and research directed toward the discovery and refinement of theoretical and mathematical
  tools contributing to the continued development of the study of complex, adaptive,
  nonlinear systems. The program's emphasis is on the development and application
  of the theory and tools used in the study of complex research questions and not
  on particular fields of research per se.
