comments: 'The foundation helps build capacity within developing countries in its
  three areas of interest with grants that support research or projects that solve
  specific problems. The foundation supports projects that demonstrate strong local
  leadership; promote professional development in the conservation, agricultural,
  and health sciences; develop the capacity of local organizations; and address a
  particular problem in the field. Preference will be given to projects that address
  underfunded issues and geographic areas. Grants are awarded in three focus areas:
  conservation, food, and health. Grant amounts are determined on a project-by-project
  basis. The average grant amount is $20,000.'
