comments: The objective of the DARPA Young Faculty Award (YFA) program is to identify
  and engage rising research stars in junior faculty positions at U.S. academic institutions
  and expose them to Department of Defense needs as well as DARPA’s program development
  process. The YFA program provides funding, mentoring, and industry and DoD contacts
  to awardees early in their careers so they may develop their research ideas in the
  context of DoD needs. The program focuses on untenured faculty, emphasizing those
  without prior DARPA funding. The long-term goal is to develop the next generation
  of academic scientists, engineers and mathematicians in key disciplines who will
  focus a significant portion of their career on DoD and national security issues.
  DARPA intends to award grants to eligible university faculty and nonprofit research
  organizations; each grant will encompass funding for a 24-month base period consisting
  of two 12-month phases (a maximum of $250,000 per 12-month phase) and a 12-month
  option period (a maximum of $500,000).
