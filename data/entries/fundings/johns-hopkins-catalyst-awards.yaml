comments: 'The Johns Hopkins Catalyst Award will provide grant awards of $25,000 to
  $75,000 to support the promising research and creative endeavors of early career
  faculty. We believe that the conferral of these awards will help launch our early-career
  colleagues on a path to a sustainable and rewarding academic career. The program
  will encompass not only funding but also mentoring opportunities and the chance
  to join a cohort of peers at a similar stage in their career. The funds will be
  allocated on a competitive basis in response to this Request for Applications (RFA)
  for three years: 2015, 2016, 2017.'
