comments: Through this award, ASMF aims to assist new faculty in the development of
  a career in academic sleep medicine. Physicians (MD or DO) who are certified in
  sleep medicine by the American Board of Sleep Medicine or by a member board of the
  American Board of Medical Specialties, and are within 10 years post sleep medicine
  fellowship and hold a faculty appointment are eligible to apply. Applicants must
  be members in good standing of the AASM at the time of application. The ABSM Junior
  Faculty Research Award program will grant an award of $75,000 spread over two years
  to up to two applicants per year.
