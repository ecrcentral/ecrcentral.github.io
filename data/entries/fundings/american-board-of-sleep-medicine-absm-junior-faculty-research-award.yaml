name: American Board of Sleep Medicine (ABSM) Junior Faculty Research Award
description: The American Board of Sleep Medicine (ABSM) Junior Faculty Award is for
  physicians (MD or DO) with faculty appointments who have completed an Accreditation
  Council for Graduate Medical Education (ACGME) approved sleep medicine fellowship
  within the last 10 years. This award provides an opportunity to support a 2-year
  mentored sleep and circadian research project for early-career faculty who are physician
  scientists in sleep medicine.
