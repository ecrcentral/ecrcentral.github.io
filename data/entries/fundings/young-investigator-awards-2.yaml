comments: The Young Investigator Awards offer career and project support for young
  (generally 35 and younger) proven investigators who have achieved junior faculty
  positions and are committing their lives to the field of prostate cancer. The award
  funds may be used flexibly to advance the career and research efforts of the awardee.
  Every PCF Young Investigator is required to be under the direct supervision of a
  mentor. Applicants should have received no more than $200,000 in current direct
  research funding from all sources including institutional funds. Investigators who
  have specifically received young investigator research support from the NCI, NIH,
  or DoD are still qualified and very much encouraged to apply. Young Investigator
  awardees are required to attend the Annual PCF Scientific Retreat and Young Investigator
  Day, typically held in October, throughout the duration of their award. $225,000
  over three years.
