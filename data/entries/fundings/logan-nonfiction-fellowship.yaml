name: Logan Nonfiction Fellowship
description: The Logan Nonfiction Program offers two fellowship classes per year—one
  in the fall (October-December) and one in the spring (February-April). We welcome
  between 10-20 nonfiction writers, documentary filmmakers, photojournalists, podcasters
  and multimedia creators per class. Fellows are provided lodging, meals, workspace,
  professional guidance and community. Fellowships range between 5-10 weeks and take
  place on the Carey Institute for Global Good’s historic 100-acre campus in upstate
  New York.
