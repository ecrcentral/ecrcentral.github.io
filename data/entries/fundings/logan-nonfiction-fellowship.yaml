comments: The Carey Institute for Global Good is dedicated to making a better world
  by contributing to a strong, educated, and just society. The institute is located
  in the historic hamlet of Rensselaerville, New York — a community of farmers, writers,
  artists and civic advocates — just a two-hour drive from New York City. Nestled
  on a hundred-acre campus in the heart of a pristine nature reserve, it is an inspiring
  place where journalists, policy makers, artists, agricultural innovators, entrepreneurs,
  and other change makers who seek sustainable solutions to local and global challenges
  can advance their work. Particular areas of emphasis relate to the most pressing
  issues of our day, including but not limited to war and conflict; social justice
  and human rights; science, health, agriculture, environment and technology; biography,
  history, and government; education; journalism and the media; and economics and
  business.
