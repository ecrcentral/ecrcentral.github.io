comments: Fichter Research Grants are awarded annually by ASR to members of the Association
  involved in promising sociological research on women in religion or on the intersection
  between religion and gender or religion and sexualities.  A total of $12,000 is
  available to be awarded annually, and this amount is usually distributed among several
  of the leading applications in the year’s competition. Dissertation research qualifies
  for funding, as does postdoctoral research by junior and senior scholars.  Although
  these grants are open to scholars who are pursuing or currently have a Ph.D. in
  a range of disciplines, the proposed research must be sociological in nature.  Applicants
  must also be members of the Association for the Sociology of Religion at the time
  of application.
