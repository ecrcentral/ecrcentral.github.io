comments: Provides support for mentored research and training to full-time junior
  faculty, typically within the initial four years of their first independent appointment.
  The goal is for these beginning investigators to become independent researchers
  as either clinician scientists or cancer control and prevention researchers. Awards
  are for up to five years and for up to $135,000 per year (direct costs), plus 8%
  allowable indirect costs. A maximum of $10,000 per year for the mentor(s) (regardless
  of the number of mentors) is included in the $135,000. (click PDF for updated RFP)
  ($675,000 total max)
