comments: 'The Johns Hopkins Discovery Award will provide grant awards to cross-divisional
  teams, comprised of faculty and/or non-faculty members from at least two schools
  or affiliates of the university, who are poised to arrive at important discoveries
  or creative works. The expectation is that these awards will spark new, synergistic
  interactions between investigators across the institution and lead to work of the
  highest quality and impact. These awards are not intended to support already established
  projects or minimal extensions of ongoing research or professional programs. There
  are two different categories of Discovery Awards: Category 1: Cross-divisional Collaborative
  Projects (up to $100,000) & Category 2: Program Project Planning Funds (up to $150,000).
  Early-career faculty are encouraged to apply.'
