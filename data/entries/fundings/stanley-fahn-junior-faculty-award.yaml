comments: The award acts as a bridge to ensure promising early career scientists stay
  in the Parkinson’s research field, helping us solve, treat and end the disease.
  In today’s funding environment, as young scientists navigate the path from mentored
  to independent research, they face a “valley of death” between their scientific
  potential and the funding they need to make it happen. This award can stem Parkinson’s
  research talent loss. In conjunction with their institution’s commitment, the award
  gives junior investigators the support they need to develop their own independent
  funding source (such as an NIH R01 award) and stay in the PD research field. Becoming
  an independent research leader with his or her own research space is the ultimate
  goal.
