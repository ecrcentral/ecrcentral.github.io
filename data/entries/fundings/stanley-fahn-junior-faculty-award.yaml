name: Stanley Fahn Junior Faculty Award
description: The Parkinson’s Foundation seeks clinical, pre-clinical or basic research
  proposals that will directly impact the understanding of Parkinson’s or its treatment
  from promising early career scientists. Successful projects should include novel
  PD research hypotheses and be inventive in methodology or approach.
