name: Gabrielle's Angel Foundation for Cancer Research Medical Research Award
description: Gabrielle’s Angel Foundation funds cutting-edge research in the fields of leukemia, lymphoma, and related cancers of the blood. We support research that focuses on cancer prevention, detection, and treatments that are most likely to be translated into clinical trials within a 3 – 5 year period. The Foundation not only funds mainstream scientific research but also projects that combine integrative (complementary) therapies or botanical agents. These annual Medical Research Awards total $225,000 and are given over a three-year period.
