comments: "Researchers should have been in their positions for less than 5 years.\r\
  \n\r\nOur invitation-only grant process is sent out annually each spring to National\
  \ Cancer Institute (NCI) designated institutions only. Please consult your institution\
  \ to see if you are eligible to apply. Submissions are due to the Foundation office\
  \ in August after which they undergo rigorous peer review by the Foundation’s Medical\
  \ Advisory Board.\r\n\r\nThis panel of experts, led by Stephen D. Nimer, MD, Director\
  \ of the Sylvester Comprehensive Cancer Center, selects only the nation’s most promising\
  \ projects for funding. More than 80% of our grantees go on to obtain further funding\
  \ thanks to early career support from Gabrielle’s Angel Foundation.\r\n\r\nDeterminations\
  \ are made and all applicants notified by the first quarter of the year following\
  \ application submission, if not sooner."
