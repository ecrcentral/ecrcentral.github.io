name: NCI Mentored Research Scientist Development Award to Promote Diversity (K01)
description: The purpose of the NCI Mentored Research Scientist Development Award
  (K01) is to enhance the diversity of the pool of the NCI-funded cancer research
  workforce by supporting eligible individuals from groups that have been shown to
  be nationally underrepresented in the biomedical, behavioral, social and clinical
  sciences. This FOA provides salary and research support for a sustained period of
  "protected time" for intensive research career development under the guidance of
  an experienced mentor.
