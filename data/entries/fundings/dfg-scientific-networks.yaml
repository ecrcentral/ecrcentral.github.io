name: DFG Scientific Networks
description: DFG Scientific Networks enables researchers who have completed their
  doctorate (or are doctoral candidates) to establish thematic scientific networks
  of 10 to 20 members for multi-year collaborative exchange. Supports workshops,
  international travel, coordination, and publication costs. International researchers
  may comprise up to 50% of members. Rolling submissions accepted at any time.
