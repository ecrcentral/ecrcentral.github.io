comments: 'LIMITED SUBMISSION (limit 1 per division from JHU): An essential element
  of the mission of the National Institute of Environmental Health Sciences (NIEHS)
  is the support and career promotion of the next generation of exceptionally talented
  and creative new scientists who will further the understanding of the impact of
  environmental exposures on human health. The Outstanding New Environmental Scientist
  (ONES) Award is designed to identify the best new biomedical investigators across
  the spectrum of science supported by the NIEHS (i.e., including basic mechanistic,
  clinical and population based researchers) and facilitate their establishing a vibrant,
  independent research program in the environmental health sciences.  NIEHS uses this
  FOA to support the NIEHS goal of assuring a continuing cadre of productive environmental
  health science investigators.'
