name: Leuphana Institute for Advanced Studies Post-Doctoral Fellowships
description: The Leuphana Institute for Advanced Studies in Culture and Society at Leuphana University Lüneburg invites applications for 12-month fellowships in residence for 2026/27 starting April 1, 2026 and ending March 31, 2027. We invite post-doctoral researchers in the social sciences and humanities who completed their PhD no less than two and no more than ten years ago to investigate the historical, contemporary, socio-cultural, epistemological, political-economic, legal, and technical-scientific conditions of living together in a globalized, entangled world. The deadline for applications is 15. December 2024. For more information on terms of eligibility, applicatrion modalities and benefits, please consult the call for applications on the website.
