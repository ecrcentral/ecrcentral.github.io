comments: 'LIMITED SUBMISSION (limit 1 application from JHU): Pediatric Oncology:
  These are for research projects which are hypothesis driven and focus on areas related
  to the supportive care of children and adolescents with cancer. Examples include
  studies related to symptom clusters, patient-reported outcomes/quality of life,
  health communication, health promotion, and psychosocial support across the trajectory
  from diagnosis to survivorship or end-of-life care. While the average grant is $50,000
  or less, the proposed budget must be realistic for the project. Applicant should
  hold at least a M.D./D.O. or Ph.D. degree by the date the award becomes effective.
  Eligibility: Fellows; Applicants should hold an M.D. or D.O. degree by the date
  the grant becomes effective; Fellows must have completed at least two years of fellowship
  training prior to becoming a St. Baldrick’s Fellow. 100% salary and benefits for
  three to five years; Salary and benefits (yearly maximum is $97,500 inc. 30% fringe.)'
