comments: 'The Foundation is currently interested in basic research in neurobiology,
  defined as follows: Invertebrate and vertebrate (excluding clinical) neurobiology,
  specifically investigations of neural mechanisms involved in sensory, motor, and
  other complex functions of the whole organism as these relate to behavior. The overall
  goal should be to better understand behavioral output or brain mechanisms of behavior.
  The Grants-in-Aid program is designed for researchers at the assistant professor
  level who experience difficulty in competing for research funds because they have
  not yet become firmly established. Grants-in-Aid can also be made to senior scientists.
  All applications will be judged on the scientific merit and innovative aspects of
  the proposal, as well as on past performance and evidence of the applicant’s continued
  productivity. Grants-in-Aid are awarded for a one-year period and do not exceed
  $30,000.'
