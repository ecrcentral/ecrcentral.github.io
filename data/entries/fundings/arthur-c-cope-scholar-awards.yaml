comments: 'The Arthur C. Cope Scholar Awards recognize and encourage excellence in
  organic chemistry. Ten Arthur C. Cope Scholars will be named annually in three categories:
  two who have less than ten years of experience since their terminal degree will
  receive the Arthur C. Cope Early Career Scholars Award; four who have 10 to 25 years
  of experience since their terminal degree will receive the Arthur C. Cope Mid Career
  Scholars Award; and four who have 25 plus years of experience since their terminal
  degree will receive the Arthur C. Cope Late Career Scholars Award. Nature: The award
  consists of $5,000, a certificate, and a $40,000 unrestricted research grant to
  be assigned by the recipient to any university or nonprofit institution. The recipient
  is required to deliver an awards address at the Arthur C. Cope Symposium. Up to
  $2,500 for travel expenses to the fall national meeting will be reimbursed.'
