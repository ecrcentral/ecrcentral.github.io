name: Arthur C. Cope Scholar Awards
description: "Sponsor: The Arthur C. Cope Fund\r\n\r\nPurpose: To recognize and encourage\
  \ excellence in organic chemistry.\r\n\r\nNature: The award consists of $5,000,\
  \ a certificate, and a $40,000 unrestricted research grant to be assigned by the\
  \ recipient to any university or nonprofit institution. The recipient is required\
  \ to deliver an awards address at the Arthur C. Cope Symposium. Up to $2,500 for\
  \ travel expenses to the fall national meeting will be reimbursed.\r\n\r\nThe recipient\
  \ may also be invited to make a presentation at an ACS regional meeting during the\
  \ year after the Cope Award and Cope Scholar Award Symposium. In support of this\
  \ presentation, the ACS Division of Organic Chemistry will provide a $500 honorarium\
  \ and reasonable travel expenses to the regional meeting."
