name: Mentored Research Scientist Development Award (Parent K01 - Independent Clinical
  Trial Not Allowed)
description: "The purpose of the NIH Mentored Research Scientist Development Award\
  \ (K01) is to provide support and “protected time” (three to five years) for an\
  \ intensive, supervised career development experience in the biomedical, behavioral,\
  \ or clinical sciences leading to research independence. Although all of the participating\
  \ NIH Institutes and Centers (ICs) use this support mechanism to support career\
  \ development experiences that lead to research independence, some ICs use the K01\
  \ award for individuals who propose to train in a new field or for individuals who\
  \ have had a hiatus in their research career because of illness or pressing family\
  \ circumstances. Other ICs offer separate K01 FOAs intended to increase research\
  \ workforce diversity.\r\n\r\nThis Funding Opportunity Announcement (FOA) is designed\
  \ specifically for applicants proposing research that does not involve leading an\
  \ independent clinical trial, a clinical trial feasibility study, or an ancillary\
  \ study to a clinical trial. Applicants to this FOA are permitted to propose research\
  \ experience in a clinical trial led by a mentor or co-mentor. Applicants proposing\
  \ a clinical trial or an ancillary study to an ongoing clinical trial as lead investigator,\
  \ should apply to the companion FOA (PA-18-363)."
