name: Theodore Blau Early Career Award for Outstanding Contribution to Professional
  Clinical Psychology
description: "This award honors a clinical psychologist for accomplishments and promise\
  \ in clinical psychology. Accomplishments may include:\r\n\r\nPromoting the practice\
  \ of clinical psychology through professional service.Innovation in service delivery.Novel\
  \ application of applied research methodologies to professional practice.Positive\
  \ impact on health delivery systems.Development of creative educational programs\
  \ for practice.Other novel or creative activities advancing the service of the profession.\r\
  \nFunding is available up to $2,000 and is sponsored by the American Psychological\
  \ Foundation (APF)."
