name: ESRC Policy Fellowships 2021
description: <p>The new ESRC Policy Fellowships call provides 25 fellowship opportunities
  across 10 hosts within UK and devolved governments. Offering an exciting opportunity
  to early and mid-career researchers to develop their career and enhance their understanding
  of applying research in government contexts. Fellows will spend up to 18 months
  collaborating with their host organisation to co-design research to inform policy
  on a priority policy area, and to help improve the exchange of knowledge between
  policy and academic institutions.</p>
