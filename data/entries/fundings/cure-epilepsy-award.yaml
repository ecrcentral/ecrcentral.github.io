comments: 'The CURE Innovator Award supports the exploration of a highly innovative,
  often risky new concept or untested theory that addresses an important problem relevant
  to epilepsy. The Innovator Award proposed research must reflect ideas substantially
  different from those being pursued by anyone in the epilepsy research field. The
  program is not intended to support the logical progression of an already established
  research project but, instead, allows Principal Investigators (PIs) the opportunity
  to pursue radically unconventional, paradigm-shifting hypotheses. CURE AwardsThis
  award mechanism supports high-risk studies that have the potential to reveal entirely
  new areas of epilepsy research. Research completed through an Innovator Award must
  provide sufficient preliminary data to enable the PI to prove or disprove their
  groundbreaking, original, and/or unconventional hypothesis and have the potential,
  if the scope of work is successful, to move epilepsy research forward by leaps rather
  than by incremental steps. Areas of Interest: This program awards seed grants to
  researchers submitting innovative proposals that will provide new directions for
  epilepsy disease modifying therapies, prevention and, ultimately, a cure. We specifically
  encourage studies that may not be currently fundable by other agencies or other
  mechanisms because of their preliminary, innovative or unconventional nature.'
