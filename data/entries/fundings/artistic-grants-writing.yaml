name: Artistic Grants (Writing)
description: "The Elizabeth George Foundation provides grants to short story writers,\
  \ poets, unpublished novelists, emerging playwrights and unpublished creative non-fiction\
  \ writers.  This one-time funding enables writers to live and work for a period\
  \ of time not to exceed a year.\r\n\r\nGrant funds may be used for living expenses,\
  \ travel for research, artistic residencies,  writers' conferences, necessary enrichment\
  \ or creative growth classes, or tuition in accredited MFA programs in the United\
  \ States.\r\n\r\nThe Elizabeth George Foundation also provides grants to organizations\
  \ that we have previously funded to benefit disadvantaged youth, particularly in\
  \ the area of the arts."
