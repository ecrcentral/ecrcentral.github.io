description: The Pew Latin American Fellows Program in the Biomedical Sciences provides
  support for young scientists from Latin America to receive postdoctoral training
  in the United States. The program gives these individuals an opportunity to further
  their scientific knowledge by promoting exchange and collaboration between investigators
  in the United States and Latin America resulting in advances in research in Latin
  America.
