name: Australia India Research Students Fellowship Program
description: Applications are now open for the new Australia India Research Students Fellowship (AIRS Fellowship) program. The bilateral program, run by the Australia India Institute and funded by the Australian Government Department of Education, supports emerging researchers from India and Australia to undertake short-term research exchanges. 70 fellowships of up to AUD 10,000 are available, with 35 awards available to applicants from higher education institutions in each country. The program is open to eligible research students and post-doctoral scholars (early-career researchers) across all disciplines. AIRS Fellows will undertake a research project during an exchange of 4 to 8 weeks, to be completed by mid-October 2023. Applications close 13 November .
