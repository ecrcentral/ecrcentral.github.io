comments: "Grant Types\r\n\r\nThe Graham Foundation offers two types of grants to\
  \ individuals: Production and Presentation Grants and Research and Development Grants.\r\
  \n\r\nProduction and Presentation Grants:\r\n\r\nThese grants assist individuals\
  \ with the production-related expenses that are necessary to take a project from\
  \ conceptualization to realization and public presentation. These projects include,\
  \ but are not limited to, publications, exhibitions, installations, films, and new\
  \ media projects.\r\n\r\nProjects must have clearly defined goals, work plans, budgets,\
  \ and production and dissemination plans.\r\n\r\nCommitted Producers: Individuals\
  \ applying for Production and Presentation Grants should have a Committed Producer(s)\
  \ for the project, that is, an entity committed to producing and/or presenting the\
  \ project with the individual, such as a publisher, exhibition venue, etc.\r\n\r\
  \nGrant amount: Production and Presentation Grants to individuals do not exceed\
  \ $20,000 and are likely to be less. Given the demand for funding, the Graham Foundation\
  \ is not always able to fund projects at the full request amount.\r\n\r\nGrant period:\
  \ Production and Presentation Grants must be completed within two years. Applicants\
  \ should allow sufficient time to plan, implement, close out their project, and,\
  \ if funded, acknowledge Graham Foundation support in all published media.\r\n\r\
  \n\r\nResearch and Development Grants:\r\n\r\nThough the majority of our grantmaking\
  \ focuses on Production and Presentation Grants, we recognize that projects may\
  \ require support at early stages of formation. Research and Development Grants\
  \ assist individuals with seed money for research-related expenses such as travel,\
  \ documentation, materials, supplies, and other development costs. Projects must\
  \ have clearly defined goals, work plans, and budgets.\r\n\r\nUpon completion of\
  \ research projects, recipients of Research and Development Grants must complete\
  \ a research report and provide documentation that can be archived at the Graham\
  \ Foundation and/or presented on our website.\r\n\r\nA recipient of a Research and\
  \ Development Grant is eligible to apply for a Production and Presentation Grant\
  \ for the same project once the first grant has been satisfied, however, future\
  \ funding is not guaranteed.\r\n\r\nGrant amount: Research and Development Grants\
  \ do not exceed $10,000 and are likely to be less. Given the demand for funding,\
  \ the Graham Foundation is not always able to fund grantees at the full request\
  \ amount.\r\nGrant period: Research and Development Grants must be completed within\
  \ one year. Applicants should allow sufficient time to plan, implement, close out\
  \ their project, and, if funded, acknowledge Graham Foundation support in all published\
  \ media."
