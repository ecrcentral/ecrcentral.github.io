name: Graham Foundation Individual Grants
description: "For individuals, our priorities are to:\r\n\r\n    Provide opportunities\
  \ to create, develop, and communicate a project about architecture and the designed\
  \ environment that will contribute to their creative, intellectual, and professional\
  \ growth at crucial or potentially transformative stages in their careers.\r\n \
  \   Support their efforts to take positions, develop new forms of expression, and\
  \ engage debate.\r\n    Help them communicate their work in the public realm and\
  \ reach new and wider audiences.\r\n    Support new voices by giving priority to\
  \ first-time applicants.\r\n\r\nOverall we are most interested in opportunities\
  \ which enable us to provide critical support at key points in the development of\
  \ a project or career."
