comments: The Alzheimer’s Association Research Grant (AARG) aims to fund investigators
  who are less than 15 years past their doctoral or medical degree or investigators
  that are new to Alzheimer’s and related dementia field of research. The purpose
  of this program is to provide newly independent investigators with funding that
  will allow them to develop preliminary or pilot data, to test procedures and to
  develop hypotheses. The intent is to support early-career development that will
  lay the groundwork for future research grant applications to the National Institutes
  of Health, National Science Foundation and other funding agencies and groups, including
  future proposals to the Alzheimer's Association. Each award is limited to $150,000
  over up to 3 years.
