name: Postdoctoral Fellow in Population Biology
description: The goal of the Population Biology-POE Postdoctoral Fellowship is to
  stimulate synergistic interactions between faculty and postdoctoral scholars broadly
  interested in the area of Population Biology. We are seeking applicants who have
  recently completed, or will soon complete, their PhD and who conduct cutting edge
  research related to faculty research areas in the Ecology, Evolution & Behavior
  (EEB) section in the School of Biological Sciences (https://biosci.unl.edu/research-areas).
  POE postdoctoral fellows pursue a research program under the sponsorship of an EEB
  faculty member and are expected to enhance graduate education, serve as a model
  for graduate students in career development, and promote interactions among faculty
  at UNL. While in residence, the postdoctoral fellow is expected to lead a seminar,
  symposium or outreach project that will appeal to Population Biologists across campus.
