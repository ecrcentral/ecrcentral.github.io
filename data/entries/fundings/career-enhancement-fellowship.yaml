comments: The Career Enhancement Fellowship Program seeks to increase the presence
  of minority junior faculty members and other faculty members committed to eradicating
  racial disparities in core fields in the arts and humanities. The Fellowship, funded
  by the Andrew W. Mellon Foundation, supports the Mellon Foundation's mission to
  strengthen, promote, and, where necessary, defend the contributions of the humanities
  and the arts to human flourishing and to the well-being of diverse and democratic
  societies. The Fellowship, funded by the Andrew W. Mellon Foundation, provides each
  Fellow with a six-month or one-year sabbatical grant; a research, travel, or publication
  stipend; and participation in an annual conference/retreat. A total of 30 Fellowships
  are awarded each year.
