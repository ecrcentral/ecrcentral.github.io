name: NLM Career Development Award in Biomedical Informatics and Data Science (K01)
description: The purpose of the NLM Career Development Award (K01) in Biomedical Informatics
  and Data Science is to provide support and "protected time" (up to three years)
  for an intensive career development experience in biomedical informatics and data
  science leading to research independence. NLM invites K01 applications from junior
  investigators, who have either a health professional or research doctorate and who
  are in the first three years of their initial faculty positions. Candidates who
  received their training at one of NLM's university-based biomedical informatics
  training programs are encouraged to apply.
