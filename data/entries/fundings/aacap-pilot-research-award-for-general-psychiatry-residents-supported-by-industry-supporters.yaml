description: The AACAP Pilot Research Award, supported by Industry Supporters offers
  $15,000 for general psychiatry residents who have an interest in beginning a career
  in child and adolescent mental health research. Up to two awards are provided to
  general psychiatry residents for pilot research programs. Award recipients are encouraged
  to work with a child and adolescent psychiatric investigator with expertise in their
  particular area of interest.
