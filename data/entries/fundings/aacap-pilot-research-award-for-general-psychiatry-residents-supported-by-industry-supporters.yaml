comments: 'The AACAP Pilot Research Award, supported by Industry Supporters offers
  $15,000 for general psychiatry residents who have an interest in beginning a career
  in child and adolescent mental health research. By providing up to two awards to
  general psychiatry residents for pilot research programs, AACAP support these young
  investigators at a critical stage, encouraging future careers in child and adolescent
  psychiatry research. Candidates must be enrolled in a general psychiatry residency.
  Candidates must not have any previous significant, individual research funding in
  the field of child and adolescent mental health. These include the following: NIMH/NIH
  funding (Small Grants, R-01) or similar foundation or industry research funding.
  Candidates who have received or are currently receiving "T32" funding support are
  eligible to apply. Candidates must either be AACAP members or have a membership
  application pending (not paid by the award).'
benefits: The recipient has the opportunity to submit a poster presentation on his
  or her research for AACAP’s Annual Meeting. The award also includes the cost of
  attending the AACAP Annual Meeting for five days.
