comments: Earlier.org - Friends For An Earlier Breast Cancer Test® is a non-profit
  organization dedicated to promoting awareness and education and to raising funds
  for research into earlier detection of breast cancer. Since its inception in 1995,
  Friends has awarded nearly $4 million in seed grants to qualifying projects. We
  continue to offer several grants to be used for pilot projects in the area of early
  breast cancer detection. We award up to $40,000 over a 1-3 year period. We are requesting
  applications for pilot projects that focus on new methods to improve detection of
  early breast cancer and are especially interested in the development of new techniques
  in the areas of biological or immunologic methods of early detection. It is our
  hope that pilot projects will provide preliminary data that leads to applications
  for more substantial peer-reviewed funding.
