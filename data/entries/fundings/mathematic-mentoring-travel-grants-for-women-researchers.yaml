comments: Enabling women mathematicians to attend conferences in their fields provides
  them a valuable opportunity to advance their research activities and their visibility
  in the research community. Having more women attend such meetings also increases
  the size of the pool from which speakers at subsequent meetings may be drawn and
  thus addresses the persistent problem of the absence of women speakers at some research
  conferences. The Mathematics Travel Grants provide full or partial support for travel
  and subsistence for a meeting or conference in the applicant’s field of specialization.
  All awards will be determined on a competitive basis by a selection panel consisting
  of distinguished mathematicians appointed by the AWM. These travel funds are provided
  by the Division of Mathematical Sciences (DMS) of the National Science Foundation.
  A maximum of $2,300 for domestic travel and of $3,500 for foreign travel will be
  funded.
