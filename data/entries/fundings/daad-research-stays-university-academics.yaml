name: DAAD Research Stays for University Academics and Scientists
description: DAAD Research Stays enable international academics and scientists to
  conduct short-term research visits of 1 to 3 months at German state-run or state-recognised
  universities and non-university research institutes. Open to junior and senior researchers
  who generally hold a doctorate. Covers a monthly payment of EUR 2,000 to EUR 2,150
  plus travel allowance.
