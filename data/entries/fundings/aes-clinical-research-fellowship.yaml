comments: The AES Clinical Research Fellowship provides one year of mentored support
  for qualified individuals who intend to pursue patient-oriented clinical research
  in epilepsy, including epidemiologic or behavioral studies, clinical trials, studies
  of disease mechanisms, the development of new technologies, and health services
  and outcomes research. Applicants may be epilepsy fellows, postdoctoral fellows,
  or newly appointed junior faculty and should propose a research project and training
  program designed to develop clinical and scientific skills and preliminary data
  in preparation for an independent research career. This award provides up to $50,000
  for stipend (at least 50% effort) and travel support for one year.
