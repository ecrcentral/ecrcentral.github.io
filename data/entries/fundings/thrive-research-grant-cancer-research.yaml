comments: THRIVE is designed to provide seed funding to investigators for the testing
  of initial hypotheses and collecting of preliminary data for cancer research projects,
  with the goal of help those projects secure long-term funding from the National
  Institutes of Health and/or other major granting institutions. Through the program,
  HESI will award as many as five grants of up to $50,000 over twenty-four months.
  However, most awards will range between $20,000 and $40,000. Letters of Intent must
