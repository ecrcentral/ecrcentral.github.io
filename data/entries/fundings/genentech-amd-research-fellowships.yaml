comments: 'As many as 11 million people in the United States have some form of age-related
  macular degeneration. This number is expected to double to nearly 22 million by
  2050. The impact of age-related macular degeneration on the global aging population
  is enormous as people are deprived of their economic livelihoods and independence.
  The Genentech Age-related Macular Degeneration (AMD) Research Fellowships offers
  two grants: (1) basic research in the understanding of AMD and (2) translational
  AMD research focusing on therapeutics (not yet in clinical trials).'
