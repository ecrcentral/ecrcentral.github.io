name: Genentech AMD Research Fellowships
description: 'The Genentech Age-related Macular Degeneration (AMD) Research Fellowships offers two grants: basic research in the understanding of AMD and translational AMD research focusing on therapeutics (not yet in clinical trials) Each research fellowship (basic and translational) is $40,000. This award, which was established in 2011, is supported by Genentech through the ARVO Foundation.'
