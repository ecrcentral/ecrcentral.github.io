comments: "Fellowships provide month-long, in-residence programming delivered by a\
  \ faculty of global experts who work closely with each cohort of fellows. Fellows\
  \ attend dynamic sessions, participate in collaborative and independent projects,\
  \ and enjoy a rich, multifaceted experience. In addition, fellows have the opportunity\
  \ to work directly with principles and practices that can improve the way we interpret\
  \ and respond to complex environmental conservation problems. Kinship's curriculum\
  \ uses a case study approach to directly experience and evaluate market-driven conservation\
  \ practices through expert-led interactive discussions, systems-thinking exercises,\
  \ role-play, skills practice, peer-learning sessions, and field visits that provide\
  \ the opportunity to work directly with principles and practices to improve how\
  \ practitioners interpret and respond to complex environmental conservation problems.\
  \ Each fellow will receive a $6,000 stipend and lodging for one month.\r\n\r\nA\
  \ key part of the Fellows application is a proposed project describing an environmental\
  \ issue related to the applicant's work and the plans to develop a solution using\
  \ market approaches.\r\n\r\nSuccessful applicants will be familiar with business\
  \ and economic principles and work in a setting where these principles can be integrated\
  \ with conservation work. 18 applicants are selected to participate in the training\
  \ program.\r\n\r\nIn order to be considered for the program, applicants must meet\
  \ the following requirements:\r\n\r\n    Possess a minimum of a four-year U.S. college\
  \ degree (or its equivalent).\r\n    Have a minimum of five years relevant work\
  \ experience, after completing a degree.\r\n    Be proficient in spoken and written\
  \ English.\r\n    Be a conservation practitioner (rather than an academic or researcher)."
