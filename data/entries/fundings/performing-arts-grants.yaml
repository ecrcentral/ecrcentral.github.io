comments: The MAP Fund is founded on the principle that exploration drives human progress,
  no less in art than in science or medicine. MAP supports live performance projects
  that embody a spirit of deep inquiry. MAP is particularly interested in supporting
  artists that question, disrupt, complicate, and challenge inherited notions of social
  and cultural hierarchy across the current American landscape. The program pursues
  its mission by welcoming the widest range of artistic points of view to apply and
  employing a comparably wide range of evaluators and panelists in the grant selection
  process. Organizations and artists must demonstrate at least 2 years professional
  experience. MAP supports only projects that contain a live performance. Eligible
  projects must not have premiered anywhere in the world before the first date of
  the current grant activities period. Current employees or board members of Creative
  Capital, the Doris Duke Charitable Foundation or the Andrew W. Mellon Foundation,
  or immediate family members of such persons may not apply for a MAP grant. Up to
  40 grants per annual cycle, ranging from $10,000 to $45,000. The average award amount
  is $25,000.
