name: Five 2-year Postdoctoral Fellowships at the Zukunftskolleg
description: "<p><strong>Five 2-year Postdoctoral Fellowships at the Zukunftskolleg</strong>\
  \ (Fulltime, E 13 TV-L) Reference No: 2023/167</p>\r\n<p>The preferred start date\
  \ is <strong>April 1st, 2024</strong>. Conditionally on the submission of an external\
  \ grant, the position can be extended for an additional year. In principle, the\
  \ position can be divided into two half-time positions. The University of Konstanz\
  \ is one of eleven Universities of Excellence in Germany. Since 2007 it has been\
  \ successful in the German Excellence Initiative and its follow-up programme, the\
  \ Excellence Strategy. The Zukunftskolleg is an Institute for Advanced Study for\
  \ early career postdoctoral researchers in the natural sciences, humanities and\
  \ social sciences. It is a central component of the university's strategy \"creative.together\"\
  .</p>\r\n<p>The Zukunftskollegs promotes interdisciplinary discourse between distinguished\
  \ researchers from Germany and abroad, and provides them with the resources to conduct\
  \ their research independently and free from administrative constraints.</p>\r\n\
  <p>The working language is English.</p>\r\n<p>Each fellow is a member of both a\
  \ university department and the Zukunftskolleg.</p>\r\n<p>Additionally, fellows\
  \ of the Zukunftskolleg can be affiliated to the Clusters of Excellence at the University\
  \ of Konstanz: \"Politics of Inequality\" or \"Centre for the Advanced Study of\
  \ Collective Behaviour\".</p>\r\n<p>Up to two Cluster-Zukunftskolleg Fellowships\
  \ related to the study of collective behaviour can be funded by the \"Centre for\
  \ the Advanced Study of Collective Behaviour\" directly. The target group consists\
  \ of excellent postdoctoral researchers at the early career level, with leadership\
  \ abilities and a capacity for teamwork, so that they can reasonably be expected\
  \ to take up leading roles in academia.</p>\r\n<p>The applications are evaluated\
  \ in a two-stage process by international reviewers. The candidates will be informed\
  \ about the decision around mid-February 2024.</p>\r\n<p><strong>Your Responsibilities\
  \ </strong></p>\r\n<ul>\r\n<li>&nbsp;Develop and implement your research project</li>\r\
  \n<li>&nbsp;Build up your own research profile</li>\r\n<li>&nbsp;You are expected\
  \ to participate actively in the regular weekly meetings of the Zukunftskolleg (and/or\
  \ the respective Cluster of Excellence) and to contribute to the Zukunftskolleg\
  \ in creating a team of exciting interdisciplinary postdoctoral researchers</li>\r\
  \n<li>&nbsp;Have your place of residence in Konstanz or its surroundings</li>\r\n\
  </ul>\r\n<p>&nbsp;</p>\r\n<p><strong>Your Competencies</strong></p>\r\n<ul>\r\n\
  <li>You should be in possession of a doctoral degree granted between October 31,\
  \ 2021 and December 31, 2023. Earlier graduation dates can be accepted in case of\
  \ maternity/paternity leave, or working contracts outside academia</li>\r\n<li>Candidates\
  \ must not hold a permanent professorship, or have a habilitation or equivalent\
  \ (Venia legendi). Candidates with their own position funded by another program,\
  \ which can be transferred to Konstanz, are also eligible</li>\r\n<li>Applicants\
  \ must propose a research project that ties in with a discipline represented at\
  \ the University of Konstanz. They are invited to include in their motivation letter\
  \ a reflection note on how their research relates to the 17 SDGs of the UN</li>\r\
  \n<li>Applicants should contact potential Local Academic Partners among the researchers\
  \ at the University of Konstanz in order to ensure appropriate affiliation. Support\
  \ from a department strengthens the application.</li>\r\n<li>International experience\
  \ in teaching or research, and a strong interest in interdisciplinary topics are\
  \ desirable.</li>\r\n</ul>\r\n<p>&nbsp;</p>\r\n<p><strong>We Offer</strong></p>\r\
  \n<ul>\r\n<li>&nbsp;Professional infrastructure and an appropriate workplace for\
  \ conducting research</li>\r\n<li>&nbsp;Individual Research Allowance</li>\r\n<li>&nbsp;Access\
  \ to a pool for funding cooperative projects, research assistants, travel, and equipment\
  \ purchases</li>\r\n<li>&nbsp;Funds for mutual research visits to international\
  \ collaborators</li>\r\n<li>&nbsp;The possibility of attracting senior research\
  \ partners to Konstanz through the senior fellowship and the mentorship program</li>\r\
  \n<li>&nbsp;The opportunity to benefit from a variety of career development measures,\
  \ including the University of Konstanz&rsquo;s Academic Staff Development and Research\
  \ Support offices</li>\r\n<li>&nbsp;No teaching obligation, but an opportunity to\
  \ teach in collaboration with your department at the University of Konstanz</li>\r\
  \n<li>&nbsp;An international and interdisciplinary community of peers.</li>\r\n\
  </ul>\r\n<p>More information on the Zukunftskolleg and current Fellows, as well\
  \ as a special section devoted to the application and selection process (online\
  \ application process, required documents, guidelines on eligibility, evaluation\
  \ criteria, the timeline and the stages of the selection process) are available\
  \ on our website at: http://zukunftskolleg.uni-konstanz.de .</p>\r\n<p>All applications\
  \ and supporting materials (letter of motivation, research proposal, curriculum\
  \ vitae, writing sample and two letters of reference) must be submitted in English\
  \ via our Online Application Portal. Questions can be directed via e-mail to: zukunftskolleg-application@uni-konstanz.de.</p>\r\
  \n<p><strong>We look forward to receiving your application until 10 October 2023,\
  \ 11:00 am (Konstanz time).</strong></p>"
