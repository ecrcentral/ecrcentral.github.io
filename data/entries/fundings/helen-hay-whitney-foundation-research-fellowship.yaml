description: The Helen Hay Whitney Foundation supports early postdoctoral research
  training in all basic biomedical sciences. To attain its ultimate goal of increasing
  the number of imaginative, well-trained and dedicated medical scientists, the Foundation
  grants financial support of sufficient duration to help further the careers of young
  men and women engaged in biological or medical research.
