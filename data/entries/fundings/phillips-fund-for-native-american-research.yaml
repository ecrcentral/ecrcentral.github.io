comments: The Phillips Fund of the American Philosophical Society provides grants
  for research in Native American linguistics, ethnohistory, and the history of studies
  of Native Americans, in the continental United States and Canada. Grants are not
  made for projects in archaeology, ethnography, psycholinguistics, or for the preparation
  of pedagogical materials. The committee distinguishes ethnohistory from contemporary
  ethnography as the study of cultures and culture change through time. The grants
  are intended for such costs as travel, tapes, films, and consultants' fees but not
  for the purchase of books or permanent equipment or to pay income tax on the award.  The
  average award is about $2,500; grants do not exceed $3,500. Grants are given for
  one year following the date of the award.
