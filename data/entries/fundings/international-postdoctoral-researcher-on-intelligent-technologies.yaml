name: International Postdoctoral researcher on Intelligent Technologies
description: "We are looking for candidates with a PhD in Computer Science, Computer\
  \ Engineering, Mathematics, Physics or related fields, and a good record of scientific\
  \ publications in top conferences and scientific journals, within the topics of\
  \ interest shown below. We also expect self-motivated candidates who are able to\
  \ work both independently as well as in a team. Fluent English is essential.\r\n\
  \r\nWe are willing to support applications related to one of our Scientific Programmes:\r\
  \n\r\n    Machine Learning\r\n    Advanced Computing\r\n    Approximate Processing\r\
  \n    e-Health\r\n    Personal Robots\r\n    Semiconductor Devices and Autonomous\
  \ Sensors\r\n    Natural Language Technologies\r\n    Artificial Vision\r\n\r\n\
  \ Desirable skills\r\n\r\n    Scientific leadership.\r\n    Highly motivated candidates\
  \ with an excellent scientific track-record.\r\n    Fluent English is essential.\r\
  \n    The ideal candidate will be organized, hard-working and have the ability to\
  \ work in a team and interdisciplinary environment.\r\n    Good communication skills."
