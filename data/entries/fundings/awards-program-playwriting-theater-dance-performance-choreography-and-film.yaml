description: Dedicated to Identifying and Nurturing Emerging Artists in Theater, Dance, and Film The Princess Grace Awards identifies and nurtures emerging artistic excellence. Scholarships, apprenticeships, and fellowships give artists, who are at outset of their careers or early stages of professional development, the financial assistance and encouragement to focus on artistic excellence. Artists are nominated by non-profit 501 (c)(3) schools or organizations; nominators may only submit 1 candidate per category (i.e., scholarship, apprenticeship, fellowship). Nominating organizations whose artists are selected to receive Princess Grace Awards receive a modest grant in addition to the Princess Grace Award grant funds.
