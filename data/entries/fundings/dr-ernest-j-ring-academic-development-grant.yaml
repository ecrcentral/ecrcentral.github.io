name: Dr. Ernest J. Ring Academic Development Grant
description: This grant program, named after Ernest J. Ring, MD, the founder of the
  SIR Foundation, is designed to provide support to junior Interventional Radiology
  faculty members early in their academic careers to allow time for the conduct of
  research. The goal of this program is to have the grant recipient subsequently obtain
  additional funding from other sources, e.g., National Institutes of Health (NIH)
  grants.
