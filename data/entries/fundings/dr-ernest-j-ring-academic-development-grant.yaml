comments: "Eligibility: Junior Faculty with a MD, DO, PhD, or equivalent degree in\
  \ educational institutions in the United States and Canada; should be members of\
  \ SIR but not mandatory. $100,000 over two years. \r\n\r\nApplicants should be individuals\
  \ who have not yet been recognized as independent investigators or recipients of\
  \ major grant support (i.e., current grants exceeding $50,000). Those in residencies\
  \ or fellowships or those generally considered advanced students in training rather\
  \ than full-time faculty are not eligible for this grant. Applicants must be within\
  \ the first five years of their initial faculty appointment after having completed\
  \ all formal training. Only applicants holding a position up to and including the\
  \ assistant professor level at the time of application are eligible.\r\n\r\nApplications\
  \ will be accepted from citizens of the United States or Canada or those who have\
  \ permanent resident status therein. Permanent residents must submit documentation\
  \ of their status. If an applicant is at an institution in the US or Canada and\
  \ is on a visa, a letter from the department chair guaranteeing completion of the\
  \ project will be required."
