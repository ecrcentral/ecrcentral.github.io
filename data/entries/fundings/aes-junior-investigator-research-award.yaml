name: AES Junior Investigator Research Award
description: Junior Investigator Research Awards support epilepsy research by recently
  independent investigators and are intended to facilitate successful competition
  for subsequent longer-term support from the NIH or other sources. Proposals are
  welcome across the spectrum of basic, translational, or clinical research into the
  causes, treatment, and consequences of epilepsy, seizures, and related disorders
  and their treatment.This award provides up to $50,000 for one year to support the
  direct costs of research.  In addition, the award includes complimentary registration
  to the AES Annual Meeting and one year of complimentary membership to AES. The number
  of awards granted each year is contingent upon available funds.
