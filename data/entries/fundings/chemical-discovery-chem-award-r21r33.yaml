name: Chemical Discovery (CHEM) Award (R21/R33
description: The purpose of this FOA is to support the development of chemical probes
  that aid basic research investigations on substance use disorders (SUDs) or identify
  new lead chemical scaffolds with potential for structure activity relationship (SAR)
  studies on SUDs. In the long term, it is hoped that these lead chemical scaffolds
  will provide a greater number of pharmacological tools for basic research and possible
  drug candidates for medications development.
