comments: This announcement is intended to encourage early career chemists (or chemists
  new to NIH) to develop probes that aid basic research investigations on drug abuse
  and/or identify new or better templates as lead compounds with potential for conducting
  structure activity relationship (SAR)-function studies. Importantly, this includes
  the identification of new chemical entities (NCEs) with therapeutic potential for
  drug abuse and addiction. Applicants responding to this FOA should explain their
  rationale for the proposed work, the inclusion of pharmacologic assessments, and
  the relationship of the research proposed in the context of a broader medications
  development pipeline (e.g., Target Identification > Probe/ligand screening > Synthesis
  of ligands > Assay development > Proof of concept > Lead optimization, etc.). A
  New Investigator is an NIH research grant applicant who may not yet have competed
  successfully for a substantial, NIH research grant. For example, a PD/PI who has
  previously received a competing NIH R01 research grant is no longer considered a
  New Investigator. However,  a PD/PI who has received a small grant (R03) or an Exploratory,
  Developmental Research Grant Award (R21) retains his or her status as a New Investigator.
  For the R21 award, direct costs are limited to $250,000 over a two-year period,
  with a maximum of $200,000 allowed in any single year. The R33 award will be limited
  to $250,000 in direct costs per year.
