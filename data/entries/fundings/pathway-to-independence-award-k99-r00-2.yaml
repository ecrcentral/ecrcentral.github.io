comments: The overall goal of the NIH Research Career Development program is to help
  ensure that a diverse pool of highly trained scientists is available in appropriate
  scientific disciplines to address the Nation's biomedical, behavioral, and clinical
  research needs. In addition to this opportunity, NIH Institutes and Centers (ICs)
  support a variety of other mentored career development programs designed to foster
  the transition of new investigators to research independence. These other programs
  may be more suitable for particular candidates.  NIH also supports non-mentored
  career development programs for independent investigators. The total cost for the
  independent phase (R00) may not exceed $249,000 per year. This amount includes salary,
  fringe benefits, research costs, and applicable indirect costs. The total project
  period may not exceed 5 years.
