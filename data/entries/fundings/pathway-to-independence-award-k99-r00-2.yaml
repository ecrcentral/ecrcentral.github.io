name: Pathway to Independence Award (K99-R00)
description: The purpose of the NIH Pathway to Independence Award (K99/R00) program
  is to increase and maintain a strong cohort of new and talented, NIH-supported,
  independent investigators. This program is designed to facilitate a timely transition
  of outstanding postdoctoral researchers with a research and/or clinical doctorate
  degree from mentored, postdoctoral research positions to independent, tenure-track
  or equivalent faculty positions. The program will provide independent NIH research
  support during this transition in order to help awardees to launch competitive,
  independent research careers.
