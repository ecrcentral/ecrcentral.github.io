comments: 'The DuPont Young Professor Grant Program is a global program designed to
  help young faculty members, within five years of full-time appointment, begin their
  research careers. The hope is that these unrestricted grants will lead to a fruitful
  relationship beneficial to both parties and could include future research partnerships,
  student hiring, etc.  Professors are nominated by a member of the DuPont technical
  staff. The nominator serves as the liaison between the company and the faculty member.
  The DuPont Fellows Forum, which includes the company’s top scientists, selects the
  award winners each year. During the two-year award, each grant recipient is invited
  to present a seminar on his or her work to the DuPont research community in Wilmington,
  Del. The DuPont Young Professor program is administered by the DuPont Center for
  Collaborative Research & Education. Funding varies annually: about $45,000 over
  two years. The grants may be used to obtain matching funds through the National
  Science Foundation or other organizations.'
