name: Postsecondary Education Applied Research (PEAR) Fellowship
description: "<p>The Postsecondary Education Applied Research (PEAR) Fellowship provides\
  \ doctoral students with training in advanced quantitative analysis and the practical\
  \ skills needed for a career in applied research in postsecondary education.</p>\r\
  \n<p>Fellows will emerge from the program ready to engage in original, high-impact\
  \ research and partner effectively with policymakers and practitioners to inform\
  \ change.</p>\r\n<p>Fellows receive generous benefits, including full tuition support\
  \ and an annual stipend of $34,000, to engage in the training program and complete\
  \ a relevant doctoral degree.</p>\r\n<p>Coursework is supplemented by practical\
  \ training in the nuts and bolts of research, including applying for funding, developing\
  \ partnerships in the field, and communicating findings. Fellows participate in\
  \ research apprenticeships with scholars at Teachers College and the Community College\
  \ Research Center. They also complete yearlong practice or policy apprenticeships\
  \ at state higher education agencies, large urban postsecondary systems, or nonprofit\
  \ applied research organizations.</p>\r\n<p>The fellowship is supported by the Institute\
  \ of Education Sciences at the U.S. Department of Education, with additional funding\
  \ from Teachers College. It is jointly administered by the Department of Education\
  \ Policy and Social Analysis (EPSA) and the Community College Research Center (CCRC)\
  \ at Teachers College. Faculty from other relevant departments, including Organization\
  \ and Leadership, also contribute to the program.</p>"
