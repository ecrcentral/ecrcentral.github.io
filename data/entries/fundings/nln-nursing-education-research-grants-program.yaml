comments: The annual program is designed to support high-quality studies that contribute
  to the development of the science of nursing education, promote the diversity of
  research topics, and encourage investigators who demonstrate rigor and innovative
  approaches to advance the field of nursing education research. Grants of up to $25,000
  will be awarded to  projects focused on building links between practice and education,
  developing more rigorous and robust research designs and evaluation protocols, and
  creating leadership opportunities for faculty and nursing education research scholars.
  To be eligible, principal investigators must be a current NLN member, either through
  their school or through the payment of individual dues.
