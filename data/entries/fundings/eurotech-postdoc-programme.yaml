name: EuroTech Postdoc Programme
description: Successful applications propose bottom-up collaborative research projects
  with one of the EuroTech Universities as main host and a second EuroTech University
  as co-host, fitting the applicants’ own original research ideas. Whereas a host
  and a co-host is mandatory, additional collaboration with a third partner institution
  from the non-academic or industrial sector is encouraged. Collaboration can be implemented
  by virtual means, short visits or research stays of up to 6 months.
