name: NIWA Postdoctoral Fellowships
description: "NIWA offers Post-Doctoral Fellowships each year, usually during August/September.\
  \ These positions support NIWA’s research programmes and provide valuable experience\
  \ for early career researchers.  The Post-Doctoral Fellows undertake a major research\
  \ project in a defined area of science under the guidance of a senior scientist,\
  \ as well as gaining wider experience by contributing to other research and consulting\
  \ projects. \r\n\r\nThe Post-Doctoral Fellowships are usually full time, fixed term\
  \ for two years with flexible start dates. \r\n\r\nTo be eligible, applicants will\
  \ need to hold a PhD in a relevant area of science (or will do so by the time they\
  \ take up the offer) and have a desire to make a practical contribution to resource\
  \ management in New Zealand using their science knowledge and skills. Preference\
  \ will be given to those applicants with an exemplary academic record, skills in\
  \ writing and publication of scientific papers and client reports, and some past\
  \ experience in giving oral presentations at conferences, workshops or to clients.\r\
  \n\r\nIf you are interested in a Post-Doctoral Fellowship with NIWA, please register\
  \ for job alerts on our careers page (https://niwa.co.nz/about/careers-at-niwa-0)\
  \ and we will contact you when a vacancy arises."
