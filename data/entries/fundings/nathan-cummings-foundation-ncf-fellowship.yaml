name: Nathan Cummings Foundation (NCF) Fellowship
description: 'The Nathan Cummings Foundation (NCF) Fellows are bold leaders with visionary ideas to create a more just, vibrant, democratic and sustainable society. Each fellow receives up to $150,000, and over the course of an 18-month non-residential Fellowship, works to turn an inspired idea in the field of social justice into a world-changing reality. Their work reflects NCF’s identity and DNA, and relates to at least one of the two major challenges NCF is dedicated to addressing – the climate crisis and inequality. Their projects align with at least one of the Foundation’s four focus areas, which work together to advance our vision of a healthy planet and democracy: Inclusive Clean Economy Racial + Economic Justice Corporate + Political Accountability Voice, Creativity + Culture'
