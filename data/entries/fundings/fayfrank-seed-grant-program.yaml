comments: 'Pending invitation; LIMITED SUBMISSION (limit 2 applications from JHU):
  The objective of the BRF Seed Grant Program is to support new and innovative projects,
  especially those of junior faculty, who are working in new research directions.
  The BRF Seed Grant awards are not intended to supplement existing grants. Funding
  Preferences: 1.) Funding is to be directed at pilot research projects that are both
  innovative and will likely lead to successful grant applications to NIH and other
  public and private funding entities. 2.) Assistant Professor – Junior faculty with
  a new research project that will generate pilot data that will lead to RO1 funding
  or a comparable outside grant will be first priority. 3.) Associate Professor –
  Faculty who are pursuing new research directions. Must explain how the project is
  a new research direction. $80,000 over two years.'
