description: 'Inspired by efforts to increase racial diversity in environmentally-related
  sectors, the Roger Arliner Young (RAY) Diversity Fellowship Program supports two
  cohorts of Fellows per year: RAY Conservation Fellows and RAY Clean Energy Fellows.
