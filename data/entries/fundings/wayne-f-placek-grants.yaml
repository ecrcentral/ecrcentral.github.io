comments: 'The Wayne F. Placek Grant encourages research to increase the general public''s
  understanding of homosexuality and sexual orientation, and to alleviate the stress
  that lesbian women, gay men, bisexual women, bisexual men and transgender individuals
  experience in this and future civilizations. Since 1995, the Placek Fund has granted
  more than $1 million. The Wayne F. Placek Grant encourages research that addresses
  the following topics: Heterosexuals'' attitudes and behaviors toward lesbian, gay,
  bisexual and transgender (LGBT) people, including prejudice, discrimination and
  violence. Family and workplace issues relevant to LGBT people. Special concerns
  of sectors of the LGBT population that have historically been underrepresented in
  scientific research.  $15,000 to support empirical research from all fields of the
  behavioral and social sciences on any topic related to lesbian, gay, bisexual or
  transgender issues.'
