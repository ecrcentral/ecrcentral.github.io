name: AGA-Takeda Pharmaceuticals Research Scholar Award in Inflammatory Bowel Disease
description: The objective of the AGA Research Foundation Research Scholar Award (RSA)
  is to support early-career investigators working toward independent and productive
  research careers in digestive diseases by ensuring that a major proportion of their
  time is protected for research (i.e., a minimum of 75 percent effort dedicated to
  the proposed project). The award will support junior faculty (not fellows) who have
  demonstrated exceptional promise and have some record of accomplishment in research
  pertaining to inflammatory bowel disease.
