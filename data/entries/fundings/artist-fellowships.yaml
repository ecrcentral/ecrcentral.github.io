comments: Lighthouse Works' is accepting applications for its fellowship program.
  Fellowships are six weeks in length and occur year-round. Fellows are provided with
  housing, food, studio space, a $250 travel allowance, and a stipend of $1,500 to
  defray the costs of shipping materials, the purchase of art supplies, and other
  expenses incurred in making art in a remote location. The organization's belief
  is that no artist should have to spend money to accept the opportunity of a fellowship.
  While fellows' primary obligation is to the solitary pursuit of their creative projects,
  every artist is expected to participate in a single studio tour, reading, or performance
  for the public at the conclusion of their fellowship. In addition, fellows have
  the chance (though they are not required) to teach workshops, mentor students, or
  invite them for studio visits. While the program accepts artists working in a wide
  range of disciplines, it is best able to accommodate visual artists, writers, and
  musicians. Artistic excellence is the primary criterion for acceptance as a Lighthouse
  Works fellow.
