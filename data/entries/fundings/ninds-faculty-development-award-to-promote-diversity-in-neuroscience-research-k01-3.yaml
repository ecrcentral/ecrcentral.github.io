name: NINDS Faculty Development Award to Promote Diversity in Neuroscience Research
  (K01)
description: The purpose of the NINDS Faculty Development Award to Promote Diversity in Neuroscience Research (K01) is to diversify the pool of independent neuroscience research investigators by providing junior faculty with research cost support, protected research time and career stage appropriate professional development mentorship in neuroscience research. Individuals from backgrounds underrepresented in biomedical research are eligible for support under this award if they have doctoral research degrees (Ph.D. or equivalent) and are in the first 3 years of a faculty tenure track or equivalent position at the time of application. This Funding Opportunity Announcement (FOA) is designed specifically for applicants proposing research that does not involve leading an independent clinical trial, a clinical trial feasibility study, or an ancillary study to a clinical trial. Applicants to this FOA are permitted to propose research experience in a clinical trial led by a mentor or co-mentor. Applicants proposing a clinical trial or an ancillary study to an ongoing clinical trial as lead investigator, should apply to the companion FOA (FOA PAR-18-486).
