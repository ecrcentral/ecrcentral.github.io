comments: The purpose of the Faculty Development Award to Promote Diversity in Neuroscience
  Research is to support an intensive, supervised career development and scientific
  mentoring experience for promising junior investigators (defined as = 3 years of
  a first time tenure track or equivalent faculty position) from backgrounds underrepresented
  in biomedical research. The proposed career development experience is expected to
  substantially contribute to the research capabilities of the applicant, provide
  protected time from teaching/other duties and provide resources to hone skills in
  grant writing and publication of high impact research. IH will contribute up to
  $ 85,000   per year toward the salary of the career award recipient and $100,000  per
  year toward the research development costs of the award recipient. Award for up
  to 3 years.
benefits: "NINDS will contribute up to $ 95,000 per year toward the salary of the\
  \ career award recipient. Further guidance on budgeting for career development salaries\
  \ is provided in the SF424 (R&R) Application Guide.\r\nNINDS will contribute $100,000\
  \ per year toward the research development costs of the award recipient, which must\
  \ be justified and consistent with the stage of development of the candidate and\
  \ the proportion of time to be spent in research or career development activities.\r\
  \n\r\nReasonable Accommodations: As part of this award, funds may be requested to\
  \ make changes or adjustments in the research setting that will make it possible\
  \ for a qualified individual with a disability to perform the essential functions\
  \ associated with his/her role on the project. The accommodations requested under\
  \ this program must be directly related to the performance of the proposed role\
  \ on the research project and must be appropriate to the disabilities of the individual.\
  \ Some types of accommodations that might be provided under this award include:\
  \ specialized equipment, assistive devices, and personnel such as readers, interpreters,\
  \ or assistants. In all cases, the total funds for accommodations requested must\
  \ be reasonable.\r\n\r\nIndirect Costs (also known as Facilities & Administrative\
  \ [F&A] Costs) are reimbursed at 8% of modified total direct costs."
