comments: With the goal of encouraging research independence immediately upon obtaining
  one's first academic position after receipt of the PhD, the Directorate for Computer
  and Information Science and Engineering (CISE) will award grants to initiate the
  course of one's independent research. Understanding the critical role of establishing
  that independence early in one's career, it is expected that funds will be used
  to support untenured faculty or research scientists (or equivalent) in their first
  two years in a primary academic position after the PhD, but not more than a total
  of five years after completion of their PhD. One may not yet have received any other
  grants in the PI role from any institution or agency, including from the CAREER
  program or any other award post-PhD. Each award will be up to $175,000 for up to
  24 months.
