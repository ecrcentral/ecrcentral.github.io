comments: The objective of the NIH Mentored Research Scientist Development Award (K01)
  is to provide salary and research support for a sustained period of “protected time”
  (3 years) for intensive research career development under the guidance of an experienced
  mentor, or sponsor, in the biomedical, behavioral or clinical sciences that leads
  to research independence. The National Library of Medicine (NLM) Career Development
  Award in Biomedical Informatics (K01) is intended to provide support for promising
  junior investigators as they launch their research careers in biomedical informatics
  research. NLM supports research career development in clinical/public health informatics,
  bioinformatics, translational informatics and consumer health informatics. We define
  informatics as the intersection of computer, information and behavioral sciences
  with one or more application domains. Application domains of interest include health
  care delivery, basic biomedical research, clinical and translational research, public
  health and others. NIH will contribute up to $85,000 plus fringe benefits  per year
  toward the salary of the career award recipient and $50,000  per year toward the
  research development costs of the award recipient. $405,000 max over three years.
