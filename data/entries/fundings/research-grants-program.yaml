comments: The Myocarditis Foundation (MF) accepts fellowship grant applications on
  an annual basis for innovative basic, clinical or translational research relevant
  to the cause or treatment of myocarditis. MF’s fellowship grant program is designed
  to provide seed funding to investigators for the testing of initial hypotheses and
  collecting preliminary data to help secure long-term funding by the National Institute
  of Health (NIH) and other major granting institutions. Funding is available at US
  $40,000 for salary only. Grant award decisions are made through a peer review process
  by our Medical Advisory Board. Scientific excellence and relevance to myocarditis
  are the basic criteria for selecting the supported research project. The award is
  designed to support training and career development of physician-scientists in myocarditis
  research.
