comments: Currently, the foundation is accepting proposals for the Gordon L. Snider
  Scholar Award. The award is named after Gordon L. Snider,  one of the most influential
  researchers in alpha-1. Snider not only made seminal scientific contributions clarifying
  alpha-1-related lung disease, but also laid the groundwork for the foundation’s
  research program. Grants of up to $225,000 over three years will be awarded to provide
  career development support for outstanding young investigators who have continued
  to conduct research in Alpha-1-related lung or liver disease after completion of
  their postdoctoral fellowship. It is expected that the award will provide an incentive
  for a career in Alpha-1 research.
