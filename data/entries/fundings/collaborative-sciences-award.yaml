slug: collaborative-sciences-award
name: Collaborative Sciences Award
description: "To foster innovative collaborative approaches to research projects that\
  \ propose novel pairings of investigators from at least two broadly disparate disciplines.\
  \ The proposal must focus on the collaborative relationship, such that the scientific\
  \ objectives could not be achieved without the efforts of at least two co-principal\
  \ investigators and their respective disciplines.\r\n\r\nThe combination and integration\
  \ of studies may be inclusive of basic, clinical, population, behavioral, and/or\
  \ translational research. Projects must include at least one Co-PI from a field\
  \ outside cardiovascular disease and stroke.\r\n\r\nThis award is also intended\
  \ to foster collaboration between established and early- or mid-career investigators.\r\
  \n\r\nApplications by existing collaborators are permitted, provided that the proposal\
  \ is for a new and novel idea or approach that has not been funded before."
