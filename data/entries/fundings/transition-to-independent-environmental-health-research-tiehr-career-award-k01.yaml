comments: The overall goal of the NIH Research Career Development program is to help
  ensure that a diverse pool of highly trained scientists is available in appropriate
  scientific disciplines to address the Nation's biomedical, behavioral, and clinical
  research needs. The Transitions to Independent Environmental Health Research (TIEHR)
  Career Development Award is a 3-year bridge scholar development program for newly
  independent faculty.  This award is intended to provide newly independent investigators
  (within 3 years of their first independent faculty appointment) the pilot funding
  and salary support during this critical period of career development so that he/she
  can further develop his/her independent research program. NIEHS will contribute
  up to $75,000 plus fringe benefits per year toward the salary of the career award
  recipient and $50,000 per year toward the research development costs of the award
  recipient. $375,000 max over three years.
