name: Transition to Independent Environmental Health Research (TIEHR) Career  Award  (K01)
description: "The Transitions to Independent Environmental Health (TIEHR) Career Award\
  \ is a 3-year bridge scholar development program for newly independent faculty who\
  \ intend to pursue research careers in environmental health sciences. At the conclusion\
  \ of the career development period the candidates are expected to demonstrate they\
  \ can successfully compete for research funding in the environmental health sciences.\r\
  \n\r\nNote: This Funding Opportunity Announcement (FOA) is designed specifically\
  \ for applicants proposing research that does not involve leading an independent\
  \ clinical trial, a clinical trial feasibility study, or an ancillary study to a\
  \ clinical trial. Applicants to this FOA are permitted to propose research experience\
  \ in a clinical trial led by a mentor or co-mentor. Applicants proposing a clinical\
  \ trial or an ancillary study to an ongoing clinical trial as lead investigator,\
  \ should apply to the companion FOA (PAR-18-261). Applicants to this FOA are permitted\
  \ to propose research experience in a clinical trial led by a mentor or co-mentor."
