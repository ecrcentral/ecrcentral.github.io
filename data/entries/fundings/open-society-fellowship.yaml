comments: The Open Society Fellowship was founded in 2008 to support individuals pursuing
  innovative and unconventional approaches to fundamental open society challenges.
  The fellowship funds work that will enrich public understanding of those challenges
  and stimulate far-reaching and probing conversations within the Open Society Foundations
  and in the world. Once chosen, fellows will work on projects of their own design.
  At the same time, they are expected to take advantage of the intellectual and logistical
  resources of the Open Society Foundations and contribute meaningfully to the foundations’
  thinking. Fellows also will have opportunities to collaborate with one another as
  a cohort. It is hoped that the fellowship will not only nurture theoretical debate
  but also bring about policy change and reform. Open Society fellows produce work
  outputs of their own choosing, including books, journalistic or academic articles,
  art projects, a series of convenings, etc. In addition, fellowship cohorts may develop
  a joint work product of some sort.See website for current areas of interest.
