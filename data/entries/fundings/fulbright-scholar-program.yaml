name: Fulbright Scholar Program
description: Fulbright is the most widely recognized and prestigious international
  exchange program in the world, supported for more than half a century by the American
  people through an annual appropriation from the U.S. Congress and by the people
  of partner nations. The program—working with universities, schools, binational Fulbright
  commissions, government agencies, nongovernmental organizations and the private
  sector—actively seeks out individuals of achievement and potential who represent
  the full diversity of their respective societies and selects nominees through open,
  merit-based competitions.
