comments: The purpose of the NIH Mentored Research Scientist Development Award (K01)
  is to provide support and “protected time” (three, four, or five years) for an intensive,
  supervised career development experience in the biomedical, behavioral, or clinical
  sciences leading to research independence. The candidate must have a research or
  a health professional doctorate or its equivalent, and must have potential for productive
  independent research. The candidate must identify a mentor with extensive research
  experience, and must be willing to spend a minimum of 75 percent of full-time professional
  effort conducting research and research career development during the entire award
  period. The candidate must demonstrate and justify the need for a three, four, or
  five year period of additional supervised research. Current principal investigators
  on NIH career awards are not eligible. Candidates must be U.S. citizens or non-citizen
  nationals, or must have been lawfully admitted for permanent residence. The total
  salary requested must be based on a full-time 12 months staff appointment.
