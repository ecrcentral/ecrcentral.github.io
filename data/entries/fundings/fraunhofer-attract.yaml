name: Fraunhofer Attract
description: Fraunhofer Attract enables accomplished scientists to create innovative
  research groups within Fraunhofer Institutes through industrial collaboration. Applicants
  should hold a PhD and preferably have postdoctoral experience. Awards of up to EUR
  2.5 million over 5 years cover research staff, equipment, and the group leader
  salary. Two calls per year are issued. Joint applications from the scientist and
  an institute director are required.
