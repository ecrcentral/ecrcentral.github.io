name: Fulbright Scholar Program for Pakistan
description: The Fulbright Scholar Program funds up to 12 months of lectureship, post-doctoral
  research, or a combination of the two at a U.S. college or university with one fully
  covered dependent. Persons selected are expected to share information about Pakistani
  society and culture with students, colleagues and community groups in the U.S. On
  returning to Pakistan, Fulbright scholars are expected to make a significant contribution
  to Pakistan's development and share their U.S. experiences with students, colleagues
  and community groups in Pakistan.
