name: Philipp Schwartz Initiative
description: The Philipp Schwartz Initiative by the Alexander von Humboldt Foundation
  enables German universities and research institutions to host researchers at risk.
  It supports postdoctoral researchers and advanced scholars who face concrete threats
  in their home countries. Fellows are offered fixed-amount fellowships or contractual
  employment at German host institutions for 24 months, with the possibility of a
  12-month extension.
