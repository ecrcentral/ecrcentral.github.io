comments: The NIH Independent Scientist Award (K02) is intended to foster the development
  of outstanding scientists and enable them to expand their potential to make significant
  contributions to their field of research. It provides three, four, or five years
  of salary support and “protected time” for newly independent scientists who can
  demonstrate the need for a period of intensive research focus as a means of enhancing
  their research careers. Candidates must hold a doctoral degree, independent peer
  reviewed research support at the time the award is made, and commit a minimum of
  9 person-months (75% of full-time professional effort) conducting research and relevant
  career development activities during the period of the award. Depending on the sponsoring
  Institute or Center (IC), scientists whose work is primarily theoretical may apply
  for this award in the absence of external research grant support. It is expected
  that candidates for a K02 award will have research support at the time of the award.
  There are some research specialties, however, in which only minimal research support
  is needed, i.e., theoreticians, statisticians, and computer scientists. In such
  cases, depending on the participating IC, applicants may request in their application
  additional funds to cover incidental research expenses. The participating NIH Institutes
  and Centers will provide salary and fringe benefits for the award recipient for
  up to 5 years.
