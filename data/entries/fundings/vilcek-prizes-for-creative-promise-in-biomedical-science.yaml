comments: The Vilcek Foundation will award three prizes of $50,000 each to young foreign-born
  biomedical scientists who demonstrate outstanding early achievement. Eligible work
  may be in basic, applied, and/or translational biomedical science. A panel of distinguished
  jurors—scientists and science/medical writers or editors—will evaluate each application
  based primarily on the individual’s research contributions to progress in biomedical
  sciences, as demonstrated in the quality and significance of his/her research and
  publication record. The individuals chosen will have demonstrated exceptional independence
  and creativity by their 38th birthday. In addition, the applicants will also be
  judged on their ability to communicate the significance of their research to a scientifically
  literate audience.
