name: ALSF ''A Award' Grants
description: Attracting and retaining the best and brightest early career scientists
  is critical to the future of childhood cancer research. Funding at this stage will
  encourage and steer promising researchers toward long-term careers in pediatric
  oncology investigation. The ‘A’ Award is a four-year grant designed for the early
  independent career scientist who wants to establish a career in pediatric oncology
  research.
