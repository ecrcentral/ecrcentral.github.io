comments: ALSF is committed to creating opportunities for new and innovative research
  into treatments and cures for childhood cancers. The Babich Family Foundation (runx1.com)
  is dedicated to advancing areas of research of particular importance to families
  affected by familial platelet disorders (FPDs) leading to acute myeloid leukemia
  (AML) due to germline RUNX1 mutations with the ultimate goal of developing effective
  therapies to prevent the onset of AML.The purpose of the grant is to fund research
  in strategies leading to the development of therapies to prevent the transition
  from pre-leukemia to leukemia for patients with FPD/AML. Projects should focus on
  leukemia caused by familial RUNX1 mutations rather than sporadic AML with somatic
  RUNX1 mutations.
