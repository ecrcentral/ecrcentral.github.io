name: Leverhulme Early Career Fellowship
description: "For early career researchers, with a research record but who have not\
  \ yet held a full-time permanent academic post, to undertake a significant piece\
  \ of publishable work.\r\nFellowships can be held at universities or at other institutions\
  \ of higher education in the UK. \r\n\r\nThe Fellowships are intended to assist\
  \ those at a relatively early stage of their academic careers, and it is hoped that\
  \ the appointment would lead to a more permanent position for the individual, either\
  \ within the same or another institution."
