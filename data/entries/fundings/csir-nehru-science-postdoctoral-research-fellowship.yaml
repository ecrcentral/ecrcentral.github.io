name: CSIR-Nehru Science Postdoctoral Research Fellowship
description: “CSIR-Nehru Science Postdoctoral research Fellowship Scheme” has been
  instituted to identify promising young researchers with innovative ideas and provide
  them with training and research opportunities in niche areas of basic science, engineering,
  medicine and agriculture. The scheme aims at facilitating their transition from
  mentored to independent research career. CSIR intends to offer one hundred (100)
  such fellowships every year to promising fresh PhD holders for working in CSIR laboratories
  with state-of-art R&D facilities.
