name: New Investigator Grant
description: New investigator research grants are meant to stimulate younger members into a career of investigation in spinal deformity. Open to SRS Candidate Fellows or investigators who have not previously received an SRS Standard Grant, ORS, OREF, USA Federal grant (or OUS equivalent) and have completed 10 years or less of practice or at the committee’s discretion. Preliminary data is not required nor is it expected. The work must be both conceptualized and executed by the young investigator. Reviewers will consider the extent of which the project seems to be the young investigator’s own work rather than that of a more senior collaborator. Involvement, however, of an experienced mentor in an advisory role is encouraged and will be viewed positively. Applications with achievable goals and clear direction for subsequent work after the completion of the project will be viewed favorably.
