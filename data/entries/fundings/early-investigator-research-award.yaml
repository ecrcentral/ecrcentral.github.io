name: Early Investigator Research Award
description: "<p>Decrease the clinical impact of neurofibromatosis Neurofibromatosis\
  \ (NF) is a group of three genetically distinct disorders that cause tumors to grow\
  \ in the nervous system. It also produces other abnormalities in the skin and bones.\
  \ There are three types of NF: 1) Neurofibromatosis Type 1 or NF1 affects 1 in 3500\
  \ people worldwide and is caused by a mutation in the neurofibromin gene, 2) Neurofibromatosis\
  \ Type 2 or NF2 affects 1 in 25,000 people and is caused by mutations in the Merlin\
  \ gene, 3) Schwannomatosis is much rarer, affecting 1 in 40,000 people, and although\
  \ mutations in the SMARCB1/INI1 gene have been associated with the disease, we do\
  \ not fully understand the underlying cause to many of the symptoms of the disorder.</p>\r\
  \n<p>The Neurofibromatosis Research Program (NFRP) was established in 1996 when\
  \ the efforts of NF advocates led to a congressional appropriation to fund research\
  \ in NF. <span style=\"text-decoration: underline;\">The investigator must:</span>\
  \ <strong>Be involved in a postdoctoral training or medical residency program; Possess\
  \ up to 4 years of continuous postdoctoral research experience by application submission\
  \ deadline; and Possess a doctoral degree (i.e., Ph.D., M.D./Ph.D., D.O./Ph.D.)\
  \ or a clinical doctoral degree (i.e., M.D./D.O. or Ph.D. in a clinical discipline)\
  \ from an accredited organization or program. Must commit at least 50% of effort\
  \ to the project.</strong></p>"
