comments: The Pittsburgh Center for HIV Protein Interactions (PCHPI) is seeking collaborators
  to further our mission – to understand the early cellular events of HIV infection
  through characterization of HIV-host cell protein interactions/complexes at a high-resolution,
  molecular level. Early cellular events include those that occur after engagement
  of cell surface receptors and membrane fusion through to genome integration (intracellular
  trafficking, uncoating, restriction, reverse transcription, nuclear import, etc).
