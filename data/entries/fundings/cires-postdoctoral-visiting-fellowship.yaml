name: CIRES Postdoctoral Visiting Fellowship
description: CIRES sponsors a prestigious Visiting Fellows program, inviting scientists
  to join the thriving community of researchers in Boulder, Colorado. CIRES Visiting
  Fellowships are intended to stimulate interdisciplinary research across the institute
  through engagement with CIRES researchers on campus and in Boulder’s NOAA Laboratories.
  Sponsored by CIRES Fellows, Visiting Fellows work with CIRES researchers on a wide
  range of environmental science topics. The CIRES Visiting Fellows Program has attracted
  more than 350 scientists from around the world over the past 50 years; many have
  gone on to lasting careers in CIRES and NOAA. We encourage applications from members
  of groups under-represented in the environmental sciences and related disciplines.
