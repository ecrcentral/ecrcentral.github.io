comments: •The fellowships carry a salary of $60,000 per year, full Cornell University
  employee benefits, and $15,000 per year for research- and travel-related expenses.
  •The fellowship term is two years. The second year is contingent on performance
  and mutual agreement between the fellow, the adviser, and the Atkinson Center.•Fellows
  are expected to spend time at the Atkinson Center in Rice Hall. They are also expected
  to participate in a series of professional development workshops around science
  communication, collaboration, policy, and career design as part of the Atkinson
  Sustainability Leadership Program.
