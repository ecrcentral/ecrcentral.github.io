name: Young Investigator Award
description: "The Young Investigator Award (YIA) provides funding to promising investigators\
  \ to encourage and promote quality research in clinical oncology. The purpose of\
  \ this grant is to fund physicians during the transition from a fellowship program\
  \ to a faculty appointment.\r\n\r\nThe Young Investigator Award is a one-year grant\
  \ totaling $50,000 to pay for personnel and/or research expenses, and travel to\
  \ attend the Conquer Cancer Grants and Awards Ceremony at the ASCO Annual Meeting.\
  \ The number of YIA grants in each funding cycle is not predetermined by Conquer\
  \ Cancer. Awards are given based on individual merit and availability of funds."
