comments: "The support of a UK based host organisation is essential for all applications\
  \ to the Future Leaders Fellowships scheme. To apply to the FLF scheme, the organisation\
  \ must be eligible to receive Research Council funding or be a UK based business\
  \ or Catapult eligible to receive Innovate UK funding. (Further information on organisations\
  \ eligible to receive funding)\r\n\r\nApplicants from both the UK and elsewhere\
  \ are welcome to apply for a fellowship supported by a UK host organisation.\r\n\
  \r\nFuture Leaders Fellowships support applicants from diverse career paths, including\
  \ those returning from a career break or following time in other roles. We also\
  \ encourage applications from those wishing to work part-time. Our assessors will\
  \ take into account time spent outside an active research or innovation environment,\
  \ whether through career breaks, flexible working or time spent working in other\
  \ roles. \r\n\r\nThis is a single scheme which covers the entire UK Research and\
  \ Innovation remit, with no ringfenced budgets for specific areas and no barriers\
  \ to interdisciplinary or cross-sector research."
