name: UKRI Future Leader Fellowships
description: "This cross-UK Research and Innovation (UKRI) scheme will support early\
  \ career researchers and innovators with outstanding potential in universities,\
  \ UK registered businesses, and other research and user environments including research\
  \ councils' institutes and laboratories.\r\n\r\nThe FLF scheme welcomes applications\
  \ from both UK and international applicants and individuals should use the person\
  \ specification to assess and justify their suitability for the scheme. The support\
  \ of the institution will a be critical component of all fellowships which will\
  \ enable the fellow to transition to or establish their research/innovation independence\
  \ in any area supported by UKRI."
