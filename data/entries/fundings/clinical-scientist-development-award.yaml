comments: 'The Doris Duke Clinical Scientist Development Award provides grants to
  junior physician scientists to facilitate their transition to independent clinical
  research careers. Pre-proposals are being sought from junior physician-scientist
  faculty conducting clinical research in any disease area. It is recommended that
  applicants have significant research experience and strong publication records consistent
  with the assistant professor rank. In keeping with the wishes expressed in Doris
  Duke''s will, experiments that use animals or primary tissues derived from animals
  will not be supported by this program. Eligibility: Assistant Professor with an
  M.D., D.O. or foreign equivalent degree from an accredited institution; must have
  a valid, active U.S. medical license at the time of application, but do not have
  to be U.S. citizens; must not be the principal investigator of a multi-year grant
  with annual direct funding in the amount of $225,000 or higher, or on a National
  Institutes of Health R01 research grant or equivalent, with start date prior to
  and inclusive of July 1, 2016. $495,000 over three years ($150,000 direct cost and
  $15,000 indirect costs per year) .'
