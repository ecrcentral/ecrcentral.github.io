name: Joint-funded encephalitis clinical research training PhD fellowships
description: <p>The Medical Research Council collaborates with Encephalitis International
  to offer a jointly funded clinical research training fellowship. Encephalitis International
  will support one clinical research training fellowship to undertake UK-based research
  that contributes to improving the detection, diagnosis, treatment, and, or rehabilitation
  of patients. Suitable applicants will be in clinical training in neurology, infectious
  diseases, neurorehabilitiation, or allied specialities.</p>
