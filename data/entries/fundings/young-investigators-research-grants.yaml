comments: Research grants are provided for teams of scientists from different countries
  who wish to combine their expertise in innovative approaches to questions that could
  not be answered by individual laboratories. Emphasis is placed on novel collaborations
  that bring together scientists preferably from different disciplines to focus on
  problems in the life sciences. Young Investigators’ Grants are awarded to teams
  of researchers, all of whom are within the first five years after obtaining an independent
  laboratory (e.g., assistant professor, lecturer or equivalent).  $250,000 for a
  team of 2; $350,000 for a team of 3; $450,000 for a team of 4 or more. These figures
  represent the amount awarded to the whole team per year for a period of 3 years.
