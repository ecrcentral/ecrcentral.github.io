comments: NBF will award grants for investigator-initiated original research on all
  aspects of blood banking, transfusion medicine, cellular therapies, and patient
  blood management. Grants of up to $75,000 will support research projects of one
  or two years in duration. Awards will not be made to increase the funding available
  for currently funded research projects. NBF grants are intended to provide seed
  funding that enables the principal investigator to enhance his/herpreliminary data
  —  data that may then be useful in applying for larger grants. An application fee
  of $160 must accompany the application unless the primary investigator is an AABB
  individual member.
