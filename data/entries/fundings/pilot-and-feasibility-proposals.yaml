description: The Pilot & Feasibility (P&F) Program will provide eligible investigators
  with support to embark on innovative lines of inquiry related to Polycystic Kidney
  Disease (PKD). It is anticipated that these pilot awards will allow investigators
  to generate sufficient preliminary data to pursue additional external grant funding
  (e.g., NIH R01 grant).
