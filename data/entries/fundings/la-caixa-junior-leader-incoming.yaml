name: La Caixa Junior Leader - Incoming
description: "The Postdoctoral Junior Leader fellowships programme is aimed at hiring\
  \ excellent researchers, of any nationality, who wish to continue their research\
  \ career in Spain or Portugal. The objectives of this programme are to foster high-quality,\
  \ innovative research in Spain and Portugal and to support the best scientific talent\
  \ by providing them with an attractive, competitive environment in which to conduct\
  \ excellent research.\r\n\r\nPostdoctorate Junior Leader – Incoming: 30 postdoctoral\
  \ fellowships for researchers of all nationalities. They will be offered a three-year\
  \ employment contract to conduct a research project at accredited centres with the\
  \ Severo Ochoa or María de Maeztu excellence award, Institutos de Investigación\
  \ Sanitaria Carlos IIII and units evaluated as excellent by the Fundação para a\
  \ Ciência e Tecnologia of Portugal.\r\nFor Spanish institutions, candidates must\
  \ have resided in Spain less than 12 months in the last three years while for Portuguese\
  \ institutions, candidates must have resided in Portugal less than 12 months in\
  \ the last three years."
