comments: "The foundation’s Behavioral Economics program supports research that uses\
  \ behavioral insights from psychology, economics, sociology, political science and\
  \ other social sciences to examine and improve social and living conditions in the\
  \ United States. Appropriate projects will demonstrate explicit use of psychological\
  \ concepts in the motivation of the research design and the preparation of the results.\
  \ Experimental projects that do not have substantial behavioral content (such as\
  \ market experiments testing neoclassical ideas) or substantial economic content\
  \ (such as psychology experiments with no economic choices or strategic or market\
  \ implications) will not be considered.\r\n\r\nFor example, to what extent can choice\
  \ architecture improve decision making in various social, economic, political, and\
  \ educational contexts? To what extent do behavioral biases affect the use of welfare\
  \ programs and recipients' wellbeing? More detailed examples of the types of research\
  \ topics of interest are highlighted in the Behavioral Economics RFP and a description\
  \ of recent grants can be found here.\r\n\r\nThere is a $8,500 lifetime limit for\
  \ the BE Small Grants. BE Small Grants applications are accepted on a rolling basis.\
  \ We expect to fund up to 10-12 proposals each year.\r\n\r\nIn line with the foundation’s\
  \ mission, all projects must focus on the United States. In some exceptional cases,\
  \ RSF may consider data collected outside the U.S. (e.g., experimental data, survey\
  \ data, etc.) if the researcher can demonstrate that the data needed for the project\
  \ is not available in the U.S., and that the data has direct and strong relevance\
  \ to understanding social and living conditions in the U.S."
