description: The Kenneth B. and Mamie P. Clark Fund supports research and demonstration
  activities that promote the understanding of the relationship between self-identity
  and academic achievement with an emphasis on children in grade levels K-8. This
  grant will alternate every other year between an early career psychologist and a
  graduate student.
