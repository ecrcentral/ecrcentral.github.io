name: Advances in Patient Safety through Simulation Research (R18)
description: The Agency for Healthcare Research and Quality (AHRQ) announces the availability
  of grants to develop, test, and evaluate the impact of various simulation approaches
  for the purpose of improving the safe delivery of health care. As a training technique,
  simulation in health care uses a variety of approaches – mannequins, task trainers,
  virtual reality, in situ scenarios, hybrid configurations, and standardized patients
  – to expose individuals and teams to realistic clinical challenges. A distinguishing
  feature of simulation is that it allows participants to experience, in real- or
  near real-time, the consequences of their decisions and actions as they learn new
  skills and address system anomalies in an environment that does not put patients
  at risk. Simulation also can be used as a test-bed to identify failure modes and
  other areas of concern in new clinical processes, procedures, and technologies that
  might threaten patient safety. Another use of simulation is as a vehicle to help
  establish performance competency benchmarks of interest to credentialing and certification
  initiatives. AHRQ is seeking applications that address a variety of clinical settings.
  Yet other investigators have used computerized modeling as a way of representing
  a system that is infeasible to study directly for the purpose of forecasting the
  effect of changes under different conditions. The projects funded under this funding
  opportunity announcement (FOA) will inform providers, health educators, payers,
  policy makers, AHRQ, patients, and the public about the effective use of simulation
  in improving patient safety.
