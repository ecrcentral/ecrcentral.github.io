comments: 'The ISSCR Outstanding Young Investigator Award recognizes the exceptional
  achievements of an investigator in the early part of his or her independent career
  in stem cell research who will be honored with the award at the ISSCR Annual Meeting.
  Eligibility: Nominees must be five or fewer years out from their first full-time
  assistant professorship or equivalent position in an academic, industrial or clinical
  research setting. Comparable titles in the international academic community might
  include but are not limited to Lecturer, Senior Scientist or Team Leader. Nominees
  must be an ISSCR member in good standing. Nominees must be independent investigators
  conducting original research in basic science or clinical development and translation
  in the field of stem cell research. Nominees must be nominated by two (or more)
  ISSCR members in good standing. Nominees must be available to attend the ISSCR Annual
  Meeting if they are selected as the award recipient. Amount: $7,500 USD personal
  award plus a complimentary registration to the ISSCR Annual Meeting where they will
  be honored. The award recipient will have the opportunity to give a featured presentation.'
