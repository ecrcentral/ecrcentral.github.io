comments: DSF’s Research Grant Program offers funding for research directly related
  to Dravet syndrome and associated disorders. These grants fund initial research
  hypotheses that have not been fully explored. The results extracted from this type
  of research will help bring untested research to the point that it can qualify for
  larger governmental funding. Research applications are judged principally on novelty
  of the hypotheses, innovative approaches with a direct relevance and application
  to Dravet syndrome and related epilepsies, scientific quality, strength of approach, and
  likelihood of success. Research Grant Awardees are required to give updates on their
  work throughout the grant cycle and present their findings at our annual Research
  Roundtable meeting.
