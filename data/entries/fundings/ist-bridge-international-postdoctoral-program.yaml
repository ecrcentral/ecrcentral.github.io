description: 'The IST-BRIDGE program at Institute of Science and Technology Austria (ISTA) offers fully funded (two-year) postdoctoral fellowships for highly qualified candidates who have completed or will soon complete their PhD or equivalent in the natural or computer sciences, mathematics or any related discipline. IST-BRIDGE postdocs'' careers will be enhanced by a flexible ''career-tracks'' training program and optional non-academic secondments, placements in ISTA research support units, and academic secondments to outstanding international BRIDGE Network partners.'
