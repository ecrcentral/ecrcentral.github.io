description: 'MART is accepting applications for the 2020 Singapore-MIT Undergraduate Research Fellowships (SMURF) Fellowship programme. The fellowship enables undergraduates from MIT, NTU, NUS and SUTD to spend up to eight contiguous weeks in Singapore participating in a research project at a MIT Faculty Member''s Singapore laboratory. As a fellowship recipient, you will have the opportunity to interact with students and faculty from diverse backgrounds. A SMART researcher will be assigned to you to mentor you throughout the attachment. Research at the SMART Centre is organised into Interdisciplinary Research Groups (IRGs). To view the list of projects within the IRGs, click the links below.'
