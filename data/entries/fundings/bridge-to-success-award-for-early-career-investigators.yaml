comments: The American Sleep Medicine Foundation (ASMF) “Bridge to Success” awards
  are designed to provide ‘bridge’ funding to promising early-career sleep scientists
  who have applied for a career development award such as a K-award grant from the
  NIH, a Career Development Award from the VA, or an equivalent career development
  grant from another federal or non-federal entity. Individuals who previously submitted
  an application for review, but whose applications are unlikely to be within the
  funding range, are eligible to apply. The intent of these awards is to provide support
  during the period of time needed for revision and resubmission of a promising application
  or to provide funds to support collection of preliminary or pilot data in response
  to reviewer critiques.
