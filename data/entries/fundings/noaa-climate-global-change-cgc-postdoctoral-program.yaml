name: NOAA Climate & Global Change (C&GC) Postdoctoral Program
description: The overarching purpose of the program is to help create and train the
  next generation of leading researchers needed for climate studies. The program focuses
  on observing, understanding, modeling, and predicting climate variability and change
  on seasonal and longer time scales. This includes the documentation and analysis
  of past, current, or possible future climate variability and change as well as the
  study of the underlying physical, chemical, and biological processes.
