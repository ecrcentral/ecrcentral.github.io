comments: 'The objective of the NIH Mentored Patient-Oriented Research Career Development
  Award (K23) program is to provide salary and research support for a sustained period
  of “protected time” (3-5 years) to ensure a future cadre of well-trained scientists
  conducting NIH-supported Patient-Oriented Research (POR). The specific objectives
  of the Mentored Patient-Oriented Research Career Development Award are to: Encourage
  research-oriented clinicians to develop independent research skills and gain experience
  in advanced methods and experimental approaches needed to become independent investigators
  conducting patient-oriented research. Increase the pool of clinical researchers
  who can conduct patient-oriented studies, capitalizing on the discoveries of biomedical
  research and translating them to clinical settings. (&) Support the career development
  of investigators who have made a commitment to focus their research endeavors on
  patient-oriented research. For the purposes of the K23 award, Patient-Oriented Research
  is defined as research conducted with human subjects (or on material of human origin
  such as tissues, specimens and cognitive phenomena) for which an investigator (or
  colleague) directly interacts with human subjects. This area of research includes:
  1) mechanisms of human disease; 2) therapeutic interventions; 3) clinical trials,
  and; 4) the development of new technologies. The participating NIH Institutes and
  Centers will provide salary and fringe benefits for the award recipient and research
  development support for the award recipient for up to 5 years.'
