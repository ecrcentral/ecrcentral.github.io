name: Gallagher Health Policy Scholar Program
description: In 2007, the AUA Board of Directors approved the launch of this annual
  scholar program in honor of former executive director, G. James Gallagher. The Gallagher
  Health Policy Scholar Program hopes to attract those urologists who have demonstrated
  a commitment to or have a keen interest in the field of health policy and who are
  dedicated to advancing urology's health policy agenda.
