comments: The objective of the OREF/Goldberg Arthritis Research Grant is to encourage
  new investigators by providing seed and start-up funding for promising research
  projects that address issues related to the treatment of arthritis with an emphasis
  on arthroplasty.  Clinical relevance must be clearly noted in the abstract and specific
  aims, and be obvious from the title and the study design.  Both basic science and
  clinical projects are eligible, with clinical relevance explicitly and clearly described.  $50,000
  for one year.
