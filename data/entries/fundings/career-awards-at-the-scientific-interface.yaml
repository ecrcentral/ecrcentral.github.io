comments: 'These grants are intended to foster the early career development of researchers
  who have transitioned or are transitioning from undergraduate and/or graduate work
  in the physical/mathematical/computational sciences or engineering into postdoctoral
  work in the biological sciences, and who are dedicated to pursuing a career in academic
  research. Eligibility: Candidates must hold a Ph.D. degree in one of the fields
  of mathematics, physics, chemistry, computer science, statistics, or engineering.
  Candidates must have completed at least 12 months but not more than 48 months of
  postdoctoral research by the date of the full invited application deadline. Candidates
  who are not titled “postdoctoral” fellows may be eligible if (1) you have at least
  12 months, but not more than 48 months of postdoctoral research experience, including
  time as, for example, an instructor, research associate, or non-tenure track research
  faculty, and (2) you meet all other eligibility requirements.$500,000 over five
