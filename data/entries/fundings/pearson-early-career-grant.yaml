comments: 'The Pearson Early Career Grant encourages early career clinicians to work
  in an area of critical societal need. Pearson partnered with APF to ensure psychology
  addresses critical needs in society. One $12,000 grant is available. The program''s
  goals are to support psychology''s efforts to improve areas of critical need in
  society, including but not limited to innovative scientifically based clinical work
  with serious mental illness, serious emotional disturbance, incarcerated or homeless
  individuals, children with serious emotional disturbance (SED) and adults with serious
  mental illness (SMI); and to encourage early career psychologists to devote their
  careers to under-served populations. Applicants should be: Psychologists with an
  EdD, PsyD or PhD from an accredited university; no more than ten years postdoctoral.
  $12,000 to support early career psychologists to work in an area of critical social
  need.'
