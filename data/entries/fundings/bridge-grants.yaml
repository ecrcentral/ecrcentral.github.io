comments: "The National Psoriasis Foundation (NPF) is offering Bridge Grants to support\
  \ researchers who have submitted meritorious but unfunded K- and R- applications\
  \ to the National Institutes of Health (NIH) with a focus on psoriatic disease or\
  \ related comorbidities. Through this special opportunity, NPF provides a critical\
  \ year of additional support so that applicants can collect data to strengthen future\
  \ NIH application. In line with NPF’s mission, Bridge Grants will provide important\
  \ support to the careers of psoriatic disease researchers who will go on to make\
  \ discoveries that bring us closer to a cure for psoriatic disease.\r\n\r\nThe project\
  \ proposed must have been submitted as an unfunded application for either a K- or\
  \ R- award to NIH focused on psoriasis, psoriatic arthritis, or related comorbidities."
