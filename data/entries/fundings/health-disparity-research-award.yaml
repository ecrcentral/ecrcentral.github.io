comments: The Health Disparity Research Award supports promising research ideas that
  have high potential to make a significant impact in eliminating disparities in prostate
  cancer incidence, morbidity, mortality, and survivorship. The PCRP is interested
  in research that addresses all different aspects that contribute to health disparity
  in prostate cancer, including, but not limited to, social, cultural, and/or biological
  contributors. Proposed research ideas should be innovative, but primary emphasis
  will be placed on the potential impact of the proposed work.
