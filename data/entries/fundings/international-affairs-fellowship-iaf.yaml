comments: Launched in 1967, the International Affairs Fellowship (IAF) is a distinguished
  program offered by the Council on Foreign Relations (CFR) to assist mid-career scholars
  and professionals in advancing their analytic capabilities and broadening their
  foreign policy experience. The program aims to strengthen career development by
  helping outstanding individuals acquire and apply foreign policy skills beyond the
  scope of their professional and scholarly achievements. The distinctive character
  of the IAF Program lies in the contrasting professional experiences fellows obtain
  through their twelve-month appointment. Selected fellows from academia and the private
  sector spend fellowship tenures in public service and policy-oriented settings,
  while government officials spend their tenures in a scholarly atmosphere free from
  operational pressure. CFR awards approximately ten fellowships annually to highly
  accomplished individuals who have a capacity for independent work and who are eager
  to undertake serious foreign policy analysis. Approximately half of the selected
  IAFs each year spend their tenures working full-time in government; the remaining
  half are placed at academic institutions, think tanks, or nonprofit organizations.
  Stipend of $95,000 over 1 year.
