name: International Affairs Fellowship (IAF)
description: The IAF Program is only open to mid-career professionals who have a demonstrated
  commitment to a career in foreign policy. The program welcomes applicants from a
  broad range of professional, academic, and personal backgrounds. Although a PhD
  is not a requirement, selected fellows generally hold an advanced degree and possess
  a strong record of work experience as well as a firm grounding in the field of foreign
  policy. The program does not fund pre- or postdoctoral research, work toward a degree,
  or the completion of projects on which substantial progress has been made prior
  to the fellowship period. Qualified candidates must be U.S. citizens.
