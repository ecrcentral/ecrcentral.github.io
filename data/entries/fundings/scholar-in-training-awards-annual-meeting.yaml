comments: Since its inception in 1986, the AACR Annual Meeting Scholar-in-Training
  Award program has provided more than 4,700 grants to young investigators and has
  received support from more than forty cancer research foundations, corporations,
  individuals, and other organizations dedicated to the fight against cancer. Scholar-in-Training
  Awards are highly competitive and are presented to fewer than ten percent of applicants.
  Scholar-in-Training Awards recognize outstanding young investigators presenting
  meritorious proffered papers at the AACR Annual Meeting. Applicants must be the
  first author and presenter of an abstract submitted for presentation at the Annual
  Meeting. Applicants must be an Associate Member of the AACR in good standing (dues
  paid through 2015).
