name: Post-Doctoral fellowships from the de Duve Institute
description: '<p><span style="font-size: 16px; caret-color: #333333; color: #333333;
  font-family: Quicksand, Arial, Tahoma; text-align: justify;">The de Duve Institute
  is on the list of institutions recognized by the Belgian government to be eligible
  for tax-exempt prizes and subsidies. The Institute awards 1-year fellowships, which
  are renewable once, to young scientists who in principle have not obtained their
  PhD degree at a Belgian University and who wish to carry out their post-doctoral
  research within one of our research groups. Candidates must hold a PhD or MD degree,
  and must be in a situation of “international mobility”, i.e. they should in principle
  not have resided or carried out their main activity (work, studies, etc.) in Belgium
  for more than 12 months in the 3-year period before submission of their application
  for a de Duve Institute fellowship.</span></p>'
