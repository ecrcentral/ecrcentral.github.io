name: NIDCR Small Grant Program for New Investigators (R03)
description: The NIDCR Small Grant Program for New Investigators (R03) supports basic
  research conducted by scientists who are in the early stages of establishing their
  independent research career in oral, dental and craniofacial research. This program
  supports pilot or feasibility studies and developmental research projects with the
  intention of obtaining enough preliminary data for a subsequent investigator-initiated
  Research Project Grant (R01) or equivalent application.
