comments: 'CCR Grants provide unique opportunities for scientists who have held faculty
  positions for no more than six years at the time of full application to achieve
  research independence. CCR grants provide support for hypothesis-driven research
  projects that have significant potential to advance our understanding of breast
  cancer, lead to reductions in breast cancer incidence and/or mortality, and move
  us toward the goal of a world without breast cancer. There are two research focus
  areas: Basic/Translational and Clinical. Eligibility: Must have a doctoral degree,
  including MD, PhD, DrPH, DO, or equivalent; Must not have held any faculty appointment,
  including non-tenure and tenure track appointments combined, for more than a total
  of 6 years at the time of Full Application submission. Must not currently be a Principal
  Investigator on an existing R01 research grant or Komen IIR grant. $450,000 combined
  direct and indirect costs.'
