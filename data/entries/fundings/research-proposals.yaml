name: Research Proposals
description: The Angelman Syndrome Foundation announces biannual calls for research proposals to be awarded in support of Angelman syndrome research. Applications will be accepted on a continual basis, with submission deadlines for subsequent review occurring annually on October 15 and April 15. Angelman syndrome is a neurodevelopmental disorder caused by deficiency of the ubiquitin protein ligase UBE3A in the brain. Applications in the preclinical, translational and clinical research areas that investigate all aspects of Angelman syndrome will be considered. Highest priority will be given to pilot projectsto test new ideas about pathogenesis and therapeutics of Angelman syndrome, translational research and clinical research studies. Of particular interest to the ASF are studies related to communication, behavioral issues and identification of issues and treatments that impact the daily life of people with Angelman syndrome and their families. Researchersfrom all countries are encouraged to apply.
