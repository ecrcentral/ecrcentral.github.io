comments: Applications have to be made jointly by the candidate and the potential
  host, who must be an ETH Zurich professor and willing to act as the mentor of the
  fellow. There must be convincing synergies between the host (group) and the ETH
  Fellow. The fellowships are intended as early support towards academic independence,
  hence priority will be given to applicants who propose their own projects. Thus,
  it is important that applicants come up with their own ideas and draft the application
  themselves and that the applicant and mentor have not closely collaborated prior
  to the fellowship.
