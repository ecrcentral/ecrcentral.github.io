comments: The purpose of this FOA is to support small grants in primary immunodeficiency
  diseases focusing on ex vivo studies with human specimens and on studies with current
  or new animal models, including novel clinical strategies for detecting, identifying
  the molecular basis of, or developing innovative therapies for, primary immunodeficiency
  diseases.  Typical grants propose pilot and feasibility studies, secondary analysis
  of existing data, small, self-contained research projects, development of research
  methods, or development of new research technology. A budget for direct costs of
  up to $50,000 per year may be requested (i.e., a maximum of $100,000 over two years).
