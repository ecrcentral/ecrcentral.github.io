comments: The Academy of Finland funds part-time research by physicians and other
  researchers engaged in clinical practice. The aim is to promote clinical research
  careers in cooperation with, for example, university hospitals, and to encourage
  medical doctors working in clinical practice to engage in research so that they
  can continue pursuing their research career while in specialist training, alongside
  clinical practice.
