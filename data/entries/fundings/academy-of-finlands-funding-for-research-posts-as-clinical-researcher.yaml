name: Academy of Finland’s funding for research posts as clinical researcher
description: Funding for a clinical researcher post may be applied for by a medical doctor with a doctoral degree working in clinical practice or some other healthcare professional with a doctoral degree engaged in clinical practice. The funding is granted towards salary costs to support part-time research (20–50% of working hours) by clinical researchers. The applicant and the site of research must agree the salary based on the pay system at the site of research.
