name: ZUKOnnect Fellowships for Scholars from Africa, Asia and Latin America
description: Up to 4 (post-)doctoral stipends for an on-campus research stay at the
  Zukunftskolleg are available for up to 3 months (with justification for up to 4
  months). The start date is between 1 September 2022 and 16 October 2022. The on-site
  stipends are complemented by a digital fellowship extending it to a 12-month ZUKOnnect
  Fellowship.
