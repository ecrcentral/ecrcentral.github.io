comments: 'The NIH Midcareer Investigator Award in Patient-Oriented Research (K24)
  award is designed to enable mid-career clinician scientists to: Devote more time
  to augment their capabilities in Patient-Oriented Research (POR); and Provide mentoring
  to new clinical investigators in the conduct of POR (see below for definition).
  The K24 award is intended to provide protected time to mid-career clinical investigators
  who are typically at the Associate Professor level or the equivalent (see Section
  III, Eligible Individuals) and who have their own independent peer-reviewed research
  support to provide mentoring to junior clinical investigators, particularly K23
  grantees, in POR and to stabilize the careers of these investigators so that they
  could continue to conduct POR and be available as mentors in POR. The NIH Midcareer
  Investigator Award in Patient-Oriented Research (K24) will provide salary for levels
  of effort between 3-6 person-months (or 25 and 50% full-time professional effort).
  The NIH will provide up to $50,000 per year for the following expenses: (a) research
  expenses, such as supplies, equipment and technical personnel for the PD/PI and
  the mentees; (b) travel to research meetings or training; (c) statistical services
  including personnel and computer time.'
