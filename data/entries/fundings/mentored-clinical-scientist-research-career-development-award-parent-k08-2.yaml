comments: The objective of the NIH Mentored Clinical Scientist Research Career Development
  Award (K08) program is to provide salary and research support for a sustained period
  of “protected time” (3-5 years) to support didactic study and/or mentored research
  for individuals with clinical doctoral degrees (e.g., MD, DDS, DMD, DO, DC, OD,
  ND, DVM, PharmD, or PhD in clinical disciplines). The K08 provides support for an
  intensive, mentored research career development experience in biomedical or behavioral
  research, including translational research. For the purpose of this award, translational
  research is defined as application of basic research discoveries toward the diagnosis,
  management, and prevention of human disease. The participating NIH Institutes and
  Centers will provide salary and fringe benefits for the award recipient and research
  development support for the award recipient for up to 5 years.
