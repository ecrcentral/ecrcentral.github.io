comments: 'These grants function similarly to the NIH Exploratory & Developmental
  Research Grant Program (R21).  The R21 grant mechanism is intended to encourage
  exploratory or developmental research by providing support for the early and conceptual
  stages of project development. The AFSH seeks to award a Special Emphasis grant
  in the following areas: opioid education/pain management strategy, simulation/novel
  training models, Touching Hands/outcomes research, and firearm safety.'
