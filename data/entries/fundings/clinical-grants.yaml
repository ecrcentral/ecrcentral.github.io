name: Clinical Grants
description: The American Society for Surgery of the Hand (ASSH) and the American
  Foundation for Surgery of the Hand (AFSH) have established grant funding to encourage
  investigators to perform clinical research studies. Their goal is to enable investigators
  to initiate pilot projects that will lead to subsequent funding from other sources
  such as the National Institutes of Health (NIH).
