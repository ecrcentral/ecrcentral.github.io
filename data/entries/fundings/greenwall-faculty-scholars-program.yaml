name: Greenwall Faculty Scholars Program
description: "The Greenwall Faculty Scholars Program in Bioethics is a career development\
  \ award to enable junior faculty members to carry out innovative bioethics research.\
  \ It supports research that goes beyond current work in bioethics to help resolve\
  \ pressing ethical issues in clinical, biomedical, and public health decision-making,\
  \ policy, and practice, and creates a community that enhances future bioethics research\
  \ by Scholars and Alumni/ae.\r\n\r\nEach year, the Foundation selects approximately\
  \ three Greenwall Faculty Scholars to receive 50 percent salary support for three\
  \ years to enable them to develop their research program. Applicants must be junior\
  \ faculty members at a university or non-profit research institute that has tax-exempt\
  \ status in the United States. Applicants must hold a faculty appointment (or other\
  \ long-term research position outside a university) that allows at least 50 percent\
  \ of their effort to perform research (often this is a faculty position with at\
  \ least a 60 percent appointment in a tenure-track position or its equivalent).\
  \ Priority will be given to applicants who have not yet been considered for tenure\
  \ or an equivalent promotion; whose research will have an impact on clinical, biomedical,\
  \ and public health decision-making, policy, and practice; and who will make important\
  \ contributions to the field of bioethics over their careers."
