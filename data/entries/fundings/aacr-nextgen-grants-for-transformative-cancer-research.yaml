comments: The annual program is designed to stimulate highly innovative research from
  young investigators. Three-year grants of up to $450,000 will be awarded to promote
  and support creative, paradigm-shifting cancer research that may not be funded through
  conventional channels. Research projects must represent a highly innovative approach
  to a major contemporary challenge in cancer research. The research, which can be
  in any area of basic, translational or clinical science, must have the potential
  to lead to groundbreaking discoveries in the field and transform  understanding
  of the tumorigenesis process and/or our ability to treat, detect, or prevent cancer.
