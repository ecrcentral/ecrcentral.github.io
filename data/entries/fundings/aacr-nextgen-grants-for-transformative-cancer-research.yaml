name: AACR NextGen Grants for Transformative Cancer Research
description: The AACR NextGen Grants for Transformative Cancer Research represent the AACR’s flagship funding initiative to stimulate highly innovative research from young investigators. This grant mechanism is intended to promote and support creative, paradigm-shifting cancer research that may not be funded through conventional channels. It is expected that these grants will catalyze significant scientific discoveries and help talented young investigators gain scientific independence. The grants provide $450,000 over three years for expenses related to the research project, which may include salary and benefits of the grant recipient, postdoctoral or clinical research fellows, graduate students (including tuition costs), and research assistants, research/laboratory supplies, equipment, travel applicable to the research project, publication charges for manuscripts that pertain directly to the funded project, other research expenses, and indirect costs.
