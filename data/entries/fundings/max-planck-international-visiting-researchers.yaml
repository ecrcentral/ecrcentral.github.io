name: Max Planck International Visiting Researchers
description: The Max Planck Society enables international scientists with outstanding
  qualifications to conduct independent research at Max Planck Institutes. PhD students
  may visit for up to 6 months; postdoctoral researchers for up to 2 years. Funding
  includes a grant and travel allowances. Applications are made directly to individual
  Max Planck Institutes as positions arise.
