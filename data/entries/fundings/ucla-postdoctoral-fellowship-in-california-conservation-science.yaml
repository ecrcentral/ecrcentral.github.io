name: UCLA Postdoctoral Fellowship in California Conservation Science
description: Seeking to hire one or more postdoctoral scholars who conduct innovative
  biological research at the interface of applied and basic science. The Center's
  long-term goal is to help fund a cadre of innovative young scientists who will work
  closely with UCLA faculty, help broaden the mission of conservation science for
  the campus, and lead to long-term collaborations between our academic scientists
  and applied conservation practitioners that will direct and lead California conservation
  efforts. The Fellowship is for two years. The position offers a competitive salary,
  full benefits, and a research/travel allowance of $7500.
