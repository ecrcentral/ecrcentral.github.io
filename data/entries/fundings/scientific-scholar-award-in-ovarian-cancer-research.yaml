comments: The Marsha Rivkin Center for Ovarian Cancer Research is announcing funds
  for approximately three Scientific Scholar awards to be allocated based on scientific
  merit. Scientific Scholar Awards are intended to assist promising laboratory and
  clinical scientists in pursuing a career as an independent investigator in ovarian
  cancer research. Potential candidates will have an MD, PhD, or equivalent degree
  with career goals focused on ovarian cancer. Clinicians will have completed their
  residency. Candidates should be at the post-doc/fellow, instructor, research assistant,
  or assistant professor level with no more than 3-4 years in any of these positions.
  Established, outstanding scientists without prior focus in ovarian cancer but looking
  to focus in this disease area are also encouraged to apply. One-year grants at $60,000
  each.
