name: Bridging Excellence Postdoctoral Fellowships
description: "Make your mark as a transatlantic scientist!\r\n\r\nThe EMBL | Stanford\
  \ Life Science Alliance invites researchers to submit an application to the Bridging\
  \ Excellence Postdoctoral Program. With a network of over 50 labs from across EMBL\
  \ and Stanford University, we believe in working together to leverage the know-how,\
  \ technologies and opportunities at both leading institutions to accelerate biological\
  \ research. \r\n\r\nOur Bridging Excellence Fellowships support ambitious and creative\
  \ joint projects, defined by postdoctoral applicants. The fellowships provide funding\
  \ for a 3-year EMBL stipend, lab consumables, a generous travel and accommodation\
  \ supplement for visit(s) to Stanford, and funds for presenting at an international\
  \ conference.\r\n\r\nYour role\r\nWe invite all eligible researchers to submit a\
  \ proposal describing a collaboration between at least one lab at EMBL and one faculty\
  \ member from the Stanford University School of Medicine or the Stanford University\
  \ School of Humanities and Sciences. This collaboration should build on the strengths\
  \ of the partner laboratories, as well as the researchers own expertise. Fellowships\
  \ will be awarded to researchers, who take up a position as a postdoctoral fellow\
  \ at EMBL for 3 years. During this time, fellows will spend up to one year visiting\
  \ their collaborators in Stanford to work on the joint research project (multiple\
  \ visits totalling 1 year are permitted). In addition to benefitting from the mentorship\
  \ from two expert supervisors, fellows will also be able to take advantage of  postdoctoral\
  \ training opportunities from both institutions.\r\n\r\nFunding\r\nSuccessful postdoctoral\
  \ researchers will be awarded three-year fellowships from the EMBL | Stanford Life\
  \ Science Alliance. Postdocs will be employed at EMBL for the duration of their\
  \ fellowship and spend up to one year visiting their collaborators at Stanford University.\
  \ The visits to Stanford can be distributed throughout the duration of the fellowship\
  \ (i.e. multiple visits totaling up to 1 year are possible). \r\n\r\nThe fellowship\
  \ includes funding for:\r\n• A standard 3 year EMBL stipend\r\n  (including family\
  \ allowances and social security benefits: more information here).\r\n• A contribution\
  \ towards lab consumables.\r\n• A travel and accommodation supplement for visit(s)\
  \ to Stanford.\r\n• Funds for attending an international conference.\r\n\r\n Eligibility\r\
  \nWe invite applications in all fields, from any eligible researcher regardless\
  \ of nationality, gender, or scientific background.  Postdocs who have held their\
  \ PhD degree no more than 2 years before the application are eligible for a fellowship.\
  \ Students who are currently pursuing their PhD are able to apply, provided you\
  \ have been awarded your PhD before taking up the fellowship. \r\nPlease read the\
  \ applicant guideline provided on our website for full eligibility criteria."
