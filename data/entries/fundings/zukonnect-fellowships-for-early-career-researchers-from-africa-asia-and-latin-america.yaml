name: ZUKOnnect Fellowships for early career researchers from Africa, Asia and Latin
  America
description: "<p>The Zukunftskolleg Konnect Fellowships support early career researchers\
  \ from Africa, Asia and Latin America related to one of the thirteen departments\
  \ of the University of Konstanz. As ZUKOnnect Fellow, you can use this time to extend\
  \ your research networks and to get to know the research environment at the University\
  \ of Konstanz, without losing your ties to your home university.</p>\r\n<p>As these\
  \ fellowships can build a first bridge to the German and European academic system,\
  \ we also encourage doctoral students in their last year to apply. The Zukunftskolleg\
  \ will not offer employment contracts for ZUKOnnect Fellows.</p>\r\n<p><strong>Up\
  \ to 4 (post-)doctoral stipends for an on-campus research stay at the Zukunftskolleg\
  \ are available for up to 3 months (with justification for up to 4 months).</strong></p>\r\
  \n<p>The on-site ZUKOnnect Fellowships are complemented by a digital affiliation\
  \ extending it to a duration of 12-months. <strong>The start date for the digital\
  \ affiliation is summer 2023. The preferred start date for the on-site ZUKOnnect\
  \ Fellowships is between 15 September 2023 and 15 October 2023.</strong></p>\r\n\
  <p>&nbsp;&nbsp;</p>\r\n<p><strong>We Offer:</strong></p>\r\n<p>- During the on-campus\
  \ research stay, a stipend of &euro; 1,200/month for doctoral students and &euro;\
  \ 2,000/month for postdoctoral researchers (following DAAD guidelines)</p>\r\n<p>-\
  \ Standard expenses for one economy-class trip to Konstanz and back</p>\r\n<p>-\
  \ The chance to participate in events organized by the Zukunftskolleg</p>\r\n<p>-\
  \ Access to library resources - Access to IT services - Access to research support\
  \ services (via Research Support)</p>\r\n<p>- After the on-campus research stay\
  \ at the Zukunftskolleg, ZUKOnnect Fellows will benefit from a digital fellowship\
  \ extending the total funding period to 12 months. The digital affiliation will\
  \ be supported with up to &euro; 900 (lump sum).</p>\r\n<p><strong>Your Responsibilities</strong></p>\r\
  \n<p>- You will live in Konstanz or nearby throughout the on-site ZUKOnnect Fellowship\
  \ (the Welcome Centre at the University of Konstanz will support you with all organizational\
  \ aspects of relocating to Konstanz).</p>\r\n<p>- During the digital affiliation\
  \ and the on-campus research stay, you will actively contribute to the interdisciplinary\
  \ dialogue at the Zukunftskolleg, e.g. during weekly Jour fixe meetings (in the\
  \ semester)</p>\r\n<p>- You will interact with fellows and researchers in relevant\
  \ departments at the University of Konstanz.</p>\r\n<p>- You will give a presentation\
  \ in a seminar or a public lecture.</p>\r\n<p>- You will acknowledge the Zukunftskolleg&rsquo;s\
  \ support in any publications resulting from the stay.</p>\r\n<p>- You will write\
  \ a short report on your activities and achievements (within 6 months of completing\
  \ your ZUKOnnect Fellowship).</p>\r\n<p><strong>The Requirements</strong></p>\r\n\
  <p>- You are educated AND currently work in Latin America, Asia and/or Africa.</p>\r\
  \n<p>- You hold a doctorate (max. 2 years of postdoctoral experience) OR are a doctoral\
  \ student in your last year.</p>\r\n<p>- Your doctorate was/ is going to be completed\
  \ at a university in Latin America, Asia or Africa. - You do not hold a permanent\
  \ professorship, nor do you have a habilitation or equivalent qualification (Venia\
  \ legendi).</p>\r\n<p>- Your research project fits to one of the disciplines represented\
  \ at the University of Konstanz.</p>\r\n<p>- You should name a researcher at the\
  \ University of Konstanz &ndash; possibly a current Fellow of the Zukunftskolleg\
  \ &ndash; with whom you intend to collaborate (please do not contact person(s) in\
  \ advance).</p>\r\n<p>Please submit your application documents in English as separate\
  \ PDF files via our online application portal. The reference number is 2022/289.</p>\r\
  \n<p>&nbsp;</p>\r\n<p><strong>Applications should include:</strong></p>\r\n<p>-\
  \ A letter of motivation (including your objectives for the research stay at the\
  \ Zukunftskolleg and an explanation of how your research ties in with the research\
  \ landscape at the university; maximum 2 pages)</p>\r\n<p>- Short summary of your\
  \ ongoing research project (maximum 3 pages incl. references)</p>\r\n<p>- A detailed\
  \ work and time plan for your on-campus research project at the Zukunftskolleg (maximum\
  \ 2 pages)</p>\r\n<p>- Relevant certificates (doctoral certificate OR a letter from\
  \ your doctoral supervisor confirming the status of your doctoral thesis)</p>\r\n\
  <p>- One academic letter of reference, ideally on official letterhead paper and\
  \ signed by the respective reviewer</p>\r\n<p>Other additional certificates and\
  \ documents uploaded to the application platform will not be considered and will\
  \ manually be removed during the eligibility check.</p>\r\n<p>More information is\
  \ available online, where you will also find an extensive FAQ document.</p>\r\n\
  <p>Further questions can be directed via e-mail: zukonnect@uni-konstanz.de.</p>\r\
  \n<p>We also offer an online info session on the 1 February 2023 at 13:00 (CET).</p>\r\
  \n<p>If the budget situation permits, the Zukunftskolleg can grant financial support\
  \ for family members who accompany the ZUKOnnect Fellows during the scholarship.</p>"
