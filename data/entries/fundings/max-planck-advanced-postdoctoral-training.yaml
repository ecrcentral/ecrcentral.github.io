name: Max Planck Grants for Advanced Postdoctoral Training
description: Max Planck Grants for Advanced Postdoctoral Training enable early-career
  researchers to develop expertise at a Max Planck Institute. Positions are open to
  researchers who completed an outstanding doctorate within the last 10 years and
  have at least 2 years of research experience. Funding is provided as an employment
  contract based on collective agreement, up to 4 years.
