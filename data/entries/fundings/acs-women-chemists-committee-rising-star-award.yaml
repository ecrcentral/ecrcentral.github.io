name: ACS Women Chemists Committee Rising Star Award
description: Established in 2011, the WCC Rising Star Award recognizes exceptional
  early to mid-career women chemists across all areas of chemistry on a national level.
  Given annually, the award also is intended to help promote the retention of women
  in science. The WCC Rising Star Award recognizes up to ten outstanding women scientists
  at the mid-point of their careers who have demonstrated outstanding promise for
  contributions to their respective fields. The award includes the opportunity to
  present the awardee's contributions at a WCC-sponsored symposium at the spring ACS
  national meeting; a $1,000 stipend to cover spring national meeting travel expenses;
  and visibility and networking opportunities at the meeting.
