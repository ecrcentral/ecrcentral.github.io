comments: 'The Career Development Award (CDA) provides research funding to clinical
  investigators, who have received their initial faculty appointment, as they work
  to establish an independent clinical cancer research program. This research must
  have a patient-oriented focus, including a clinical research study and/or translational
  research involving human subjects. Proposals with a predominant focus on in vitro
  or animal studies (even if clinically relevant) are not allowed. Eligibility: Be
  an ASCO member; Must be a physician (MD, DO of international equivalent) with a
  valid medical license; be in the first to third year of a full-time primary faculty
  appointment in a clinical department at an academic medical institution at the time
  of grant submission; applicants holding Instructor/Lecturer appointments are eligible
  to apply with institutional support; Should not have any current career development
  awards (i.e. K23, K08, or any other type of career development award) and have not
  been a Principal Investigator on any large project grants (i.e. R01 or international
  equivalent, or private foundation grants); $200,000 over three years to pay for
  personnel and/or research expenses, and travel to attend the CCF Grants and Awards
  Ceremony at the ASCO Annual Meeting.'
