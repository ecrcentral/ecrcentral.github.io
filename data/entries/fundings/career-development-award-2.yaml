name: Career Development Award
description: The Career Development Award (CDA) provides research funding to clinical
  investigators, who have received their initial faculty appointment, as they work
  to establish an independent clinical cancer research program. This research must
  have a patient-oriented focus, including a clinical research study and/or translational
  research involving human subjects. Proposals with a predominant focus on in vitro
  or animal studies (even if clinically relevant) are not allowed.
