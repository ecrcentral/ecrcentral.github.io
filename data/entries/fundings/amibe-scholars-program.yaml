comments: The AIMBE Scholars Program is a highly competitive program, consisting of
  one-year immersion experiences from October 1 to September 31 in the Center for
  Devices and Radiological Health (CDRH) within the U.S. Food and Drug Administration
  (FDA) on the White Oak Campus in Silver Spring, MD. AIMBE facilitates the Scholars
  experience throughout the program year.  The program includes an orientation to
