comments: 'In an effort to advance research relevant to the mission of the National
  Institutes of Health (NIH), which includes basic biomedical, clinical biomedical,
  bioengineering, bioimaging, and behavioral research, the participating Institutes
  and Centers (ICs) encourage applications for the NIH Mentored Quantitative Research
  Career Development Award (K25).  The K25 mechanism is meant to attract to NIH-relevant
  research those investigators whose quantitative science and engineering research
  has thus far not been focused primarily on questions of health and disease.  Examples
  of quantitative scientific and technical backgrounds considered appropriate for
  this award include, but are not limited to: mathematics, statistics, economics,
  computer science, imaging science, informatics, physics, chemistry, and engineering.
  The NIH is especially interested in increasing the number of scientists trained
  to conduct high-quality research that combines insights derived from, and cuts across,
  different scientific, technical, and biomedical areas. Former PDs/PIs on NIH research
  project (R01), program project (P01), center grants, FIRST Awards (R29), sub-projects
  of program project (P01) or center grants, other career development awards (K–awards),
  or the equivalent are not eligible. Former PDs/PIs of an NIH Small Grant (R03),
  Exploratory/Developmental Grant (R21), Dissertation Awards (R36), or SBIR/STTR (R41,
  R42, R43, R44) remain eligible. The NIH will cover the recipient''s salary and other
  program-related expenses for up to 5 years.'
