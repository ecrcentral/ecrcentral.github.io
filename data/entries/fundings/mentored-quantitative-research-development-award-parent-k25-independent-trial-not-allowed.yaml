name: Mentored Quantitative Research Development Award (Parent K25 - Independent Trial
  Not Allowed)
description: "The purpose of the Mentored Quantitative Research Career Development\
  \ Award (K25) is to attract to NIH-relevant research those investigators whose quantitative\
  \ science and engineering research has thus far not been focused primarily on questions\
  \ of health and disease.  The K25 award will provide support and \"protected time\"\
  \ for a period of supervised study and research for productive professionals with\
  \ quantitative (e.g., mathematics, statistics, economics, computer science, imaging\
  \ science, informatics, physics, chemistry) and engineering backgrounds to integrate\
  \ their expertise with NIH-relevant research.\r\n\r\nThis Funding Opportunity Announcement\
  \ (FOA) is designed specifically for applicants proposing research that does not\
  \ involve leading an independent clinical trial, a clinical trial feasibility study,\
  \ or an ancillary study to a clinical trial. Applicants to this FOA are permitted\
  \ to propose research experience in a clinical trial led by a mentor or co-mentor.\
  \ Applicants proposing a clinical trial or an ancillary study to an ongoing clinical\
  \ trial as lead investigator, should apply to the companion FOA (PA-18-395)."
