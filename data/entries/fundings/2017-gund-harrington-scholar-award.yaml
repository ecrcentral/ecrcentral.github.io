comments: In 2017, HDI will award five grants of up to $900,000 each over three years
  through the program. Grant recipients also will receive committed drug development
  and project management support through HDI's  Innovation Support Center. Areas of
  interest include treatment strategies that are not gene specific but might be broadly
  applicable across many patients; therapies that may be effective in later stages
  of disease; the development of gene-delivery vectors or gene-modifying strategies
  that can be used as a general platform to target specific retinal cell types, deliver/correct
  genes with large coding regions, specifically target outer retinal cells, and impact
  cells across the entire retinal area; therapies that address juvenile macular degeneration;
  regenerative medicine therapies that focus on stem cells differentiated into photoreceptor
  cells; and novel targets to address unmet need. Of particular interest is the targeting
  of pathways and processes that might affect retinal dystrophies and vision, with
  the ultimate goal of advancing translation of research into drugs and cell-based
  therapies. In most cases, device development is not supported.
