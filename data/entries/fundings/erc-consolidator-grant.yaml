name: ERC Consolidator Grant
description: The ERC Consolidator Grant supports outstanding researchers who are consolidating
  their independence by establishing or strengthening their research teams. Open to
  researchers of any nationality who completed their PhD 7 to 12 years ago and are
  building a promising independent research career. Awards up to EUR 2 million over
  5 years, with exceptional funding up to EUR 3 million.
