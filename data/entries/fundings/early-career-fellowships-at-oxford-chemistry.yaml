description: 'Cabin, sans-serif; line-height: 1.1; margin: 0px 0px 0.5em; font-size: 1.75rem; padding-top: 16px; padding-bottom: 8px; font-variant-ligatures: normal; orphans: 2; widows: 2; text-decoration-thickness: initial;">Apply for Early Career and Postdoctoral Fellowships The Department of Chemistry is part of the University of Oxford''s Mathematical, Physical and Life Sciences (MPLS) Division. Early Career Fellowships aim to provide career development opportunities for those who are at a relatively early stage of their academic careers, but who have a proven record of research. Each year the Faculty supports a limited number of applications for projects across the fields of Physical, Organic and Inorganic Chemistry. Examples of fellowships that we support include but are not limited to the EPSRC Open Fellowship, ERC Starting Grant, Royal Society University Research Fellowship and Dorothy Hodgkin Fellowship, Cancer Research UK – Career Development Award, Wellcome Trust – Early Career Award and Career Development Award, Daphne Jackson Fellowship and the MRC Career Development Award.'
