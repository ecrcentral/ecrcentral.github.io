comments: 'LIMITED SUBMISSION: This initiative addresses the need to support and facilitate
  research that can be completed within a limited time frame and budget. Competitive
  proposals should aim to help us to better understand how to prevent and treat knee
  osteoarthritis, one of the most common causes of disability in adults. Successful
  applicants will have demonstrated experience in their fields. Clinical relevance
  must be clearly noted in the abstract and specific aims. The title and the study
  design must be obvious. Proposed projects are expected to generate results that
  have a practical application. All proposed projects are expected to generate results
  that have a practical application. It is expected that upon completion of the proposed
  project, the principal investigator will be poised to pursue NIH/DOD or the equivalent
  large-scale funding to continue to advance the area of research.'
