name: Drug Abuse Dissertation Research (R36)
description: The goal of this FOA is to enhance the diversity of the drug abuse research
  workforce by providing dissertation awards on topics related to the study of basic
  and clinical neuroscience, development, epidemiology, prevention, treatment, services,
  or women and sex/gender differences as they relate to drug abuse. This support will
  enhance the pool of highly talented drug abuse scientists who conduct research within
  the funding priority areas (http://www.drugabuse.gov/funding/funding-priorities)
  or in the NIDA strategic plan (https://www.drugabuse.gov/about-nida/2016-2020-nida-strategic-plan).
  Applications are encouraged from doctoral candidates in a variety of academic disciplines
  and programs. This program will ultimately facilitate the entry of promising new
  investigators into the field of drug abuse research and promote transdisciplinary
  collaborations. This award is for up to two years of support for the completion
  of the doctoral dissertation research project.
