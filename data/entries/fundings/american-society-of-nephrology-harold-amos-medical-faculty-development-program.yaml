comments: "he award will provide four years of research support, including an annual\
  \ stipend of up to $75,000 and an annual grant of $30,000 toward the support of\
  \ research activities.\r\nEach ASN-AMFDP scholar will spend at least 70 percent\
  \ of his or her time in research activities in association with a senior faculty\
  \ member located at an academic medical center. The scholar is responsible for identifying\
  \ this mentor at their institutions to work with them and give them research and\
  \ career guidance."
