name: American Society of Nephrology-Harold Amos Medical Faculty Development Program
description: The American Society of Nephrology-Harold Amos Medical Faculty Development Program (ASN-AMFDP) Award aims to increase diversity among future leaders in nephrology by supporting the research and career development of a kidney scholar and future health care leader from a historically disadvantaged background. ASN has partnered with the Harold Amos Medical Faculty Development Program (AMFDP) of the Robert Wood Johnson Foundation to address the shortage of minority scholars with academic and research appointments in the field of nephology. The AMFDP was created to increase the number of faculty from historically disadvantaged backgrounds who can achieve senior rank in academic medicine or dentistry and who will encourage and foster the development of succeeding classes of such physicians and dentists. The program offers four-year postdoctoral research awards.
