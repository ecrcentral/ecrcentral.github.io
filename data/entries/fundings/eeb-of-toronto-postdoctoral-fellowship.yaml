name: EEB of Toronto Postdoctoral Fellowship
description: We encourage applications from highly motivated postdoctoral fellows with broad interests in ecology and evolutionary biology. The Fellow may collaboratewith a single or multiple advisors on research in ecology and evolution. To facilitate interactions within the department, the Fellow will co-organize a seminar series in the first yearand organize a workshop on a topic related to the Fellow’s interest for graduate students,postdocs and faculty in the second year. Although broad interactions within the department are expected, there is an emphasis on candidates with independence and innovative ideas, compared to more traditional post-docs who are expected to become members of a single lab and its research program. Given this independence, there will be access to a small research supplement to support the successful candidate’s research. Prior to applying, we do encourage candidates to contact faculty members with shared interests about potential research activities.
