comments: Artplace America has announced that it is accepting applications for its
  National Creative Placemaking Fund. Grants of up to $500,000 will be awarded for
  projects that work with artists and arts organizations to help build stronger, healthier
  communities anywhere in the United States. Eligible projects must focus on a neighborhood
  (or other geographic community) challenge related to that community in the areas
  of agriculture/food, economic development, education/youth, environment/energy,
  health, housing, immigration, public safety, transportation, or workforce development.
  Projects also must use artists, arts organizations, and/or arts activities to help
  address that challenge.
