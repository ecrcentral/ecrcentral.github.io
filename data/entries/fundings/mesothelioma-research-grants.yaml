comments: The Meso Foundation (formerly the Mesothelioma Applied Research Foundation)
  is accepting applications for its 2016 cycle of mesothelioma research grant funding.  Encouraged
  projects include but are not limited to investigations of strategies for early detection
  of new or progressive disease, definition of targetable differences between normal
  and transformed mesothelium, and development of novel strategies for treatment,
  therapeutic intervention, and determination of clinical/molecular determinants for
  prognosis.Scientists of all levels and degrees are encouraged to apply.Grants of
  up $100,000 over two years will be awarded to qualified investigators for projects
  related to benchwork, translational, or clinical research that is not presently
  funded and/or is pending review and is conducted through any nonprofit academic,
  medical, or research institution.
