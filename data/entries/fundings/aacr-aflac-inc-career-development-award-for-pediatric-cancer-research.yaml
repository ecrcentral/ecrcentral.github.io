comments: ​The AACR-Aflac, Inc. Career Development Award for Pediatric Cancer Research
  represents a joint effort to encourage and support junior faculty who have completed
  their most recent doctoral degree or medical residency within the past 11 years
  at the start of the grant term to conduct pediatric cancer research and establish
  successful career paths in this field. ​Research projects may be in any discipline
  of basic, clinical, translational, or epidemiological research with direct applicability
  and relevance to pediatric cancer. $100,000 over two years.
