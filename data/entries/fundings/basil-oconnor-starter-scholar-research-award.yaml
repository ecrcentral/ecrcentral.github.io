name: Basil O’Connor Starter Scholar Research Award
description: Basil O’Connor Starter Scholar Research Awards (BOC) support young physicians/scientists committed to the mission of the March of Dimes. March of Dimes leads the fight for the health of all moms and babies. Applications focused on preterm birth and birth defects are prioritized. All applications are mandated to have a direct link to clinical translation. The eventual goal to cure or greatly mitigate conditions that adversely impact the health of pregnant women and newborns is required.
