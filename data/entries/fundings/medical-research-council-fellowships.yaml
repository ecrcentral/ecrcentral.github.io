name: Medical Research Council Fellowships
description: "MRC’s fellowships support the development of talented individuals to\
  \ strengthen the UK research base and enable the scientific community to respond\
  \ effectively to current and future grand challenges in medical research.\r\n\r\n\
  The MRC has a leading national role in training researchers across a range of biomedical,\
  \ clinical and health disciplines. At any one time, the MRC supports around 1,900\
  \ PhD students (including pre-doctoral fellows) and 200 postdoctoral fellows. Our\
  \ aim is to:\r\n\r\ntrain and develop the next generation of research leaders\r\n\
  support excellent individuals at critical points of their careers\r\nhelp address\
  \ national strategic research skills needs identified with partners.\r\nMRC fellowships\
  \ are personal awards for talented researchers to support key transition points\
  \ in their careers. Many of today's leading biomedical and health researchers look\
  \ back on their MRC fellowship as a significant stepping stone in developing their\
  \ career. We offer a range of fellowships to meet diverse needs, allowing training\
  \ placements in the UK, abroad or in industry."
