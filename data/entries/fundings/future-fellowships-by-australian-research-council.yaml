comments: 'Up to 100 four-year Future Fellowships may be awarded each year, providing
  a salary awarded at one of three salary levels and up to $60,000 per annum project
  funding. Project funding may be used for: personnel, postdoctoral research associates
  and research assistants, technicians and laboratory attendants; access to research
  and infrastructure facilities and technical workshop services; essential field research;
  expert third party services; equipment and consumables; publication and dissemination
  of project research outputs and outreach activities; specialised computer equipment
  and software; travel costs essential to the project for up to $100,000 over the
  life of the project; web hosting and development; workshops, focus groups and conferences;
  and reasonable essential costs for researchers who are carers or who themselves
  require care.'
