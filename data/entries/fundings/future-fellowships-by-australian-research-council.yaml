name: Future Fellowships by Australian Research Council
description: "Future Fellowships reflects the Australian Government’s commitment to\
  \ excellence in research by supporting excellent mid-career researchers to undertake\
  \ high quality research in areas of national and international benefit.\r\n\r\n\
  At present many highly qualified mid-career researchers choose to work overseas\
  \ to further their careers due to lack of opportunities in Australia. The Future\
  \ Fellowships scheme addresses this problem and will expand knowledge base and research\
  \ capacity in Australia; and economic, commercial, environmental, social and/or\
  \ cultural benefits for Australia. \r\n\r\nFuture Fellowships provide four-year\
  \ fellowships to outstanding Australian mid-career researchers. In addition, the\
  \ ARC may award the Administering Organisation up to $60,000 of non-salary funding\
  \ per annum which may be used for personnel, equipment, travel and field research\
  \ costs directly related to the Future Fellow's research."
