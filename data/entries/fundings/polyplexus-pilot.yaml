comments: The Defense Sciences Office (DSO) at the Defense Advanced Research Projects
  Agency (DARPA) is seeking participants for a pilot program designed to utilize modern
  connectivity to rapidly develop promising basic research pathways and then efficiently
  develop basic research proposals. DSO’s intent is to fund some of the research proposals
  resulting from this pilot program. As with other recent DARPA/DSO opportunity announcements,
  the intent of this program is to deliver research proposals that seek to investigate
  innovative approaches to enable revolutionary advances in science, devices, or systems.
  Specifically excluded is research that primarily results in evolutionary improvements
  to the existing state of practice.
