comments: Proposed research projects should be directed toward the molecular biology
  of pain and/or basic science topics related to the development of new analgesics
  for the management of pain due to terminal illness. Eligible candidates will have
  completed their training and be able to provide persuasive evidence of distinguished
  achievement or extraordinary promise in basic science research in pain. Candidates
  should be in the early stages of their career with an appointment at the faculty
  level. To be eligible, the applicant must demonstrate the strong support of the
  appropriate administrators and department chair or institute head; have been on
  a tenure track for no more than three years (support will be reconsidered if a Rita
  Allen Foundation Scholar is awarded tenure); and must conduct the research at an
  institution in the United States or Canada. The program will award two grants in
  the amount of $50,000 a year, for a period of up to three years. The entire award
  is to be allocated to projects specifically chosen by the recipient. Institutional
  overhead is not supported. Eligible grant expenses may include the principal investigator's
  salary.
