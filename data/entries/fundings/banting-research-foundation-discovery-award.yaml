name: Banting Research Foundation Discovery Award
description: The Discovery Award is a one-year grant of up to $25,000 for innovative health and biomedical research projects by outstanding new investigators at universities and research institutes in Canada who are within the first three years of their first academic appointment. The intent is to provide seed funding so that applicants are able to gather pilot data to enhance their competitiveness for other sources of funding. At least 6 awards are funded per year.
