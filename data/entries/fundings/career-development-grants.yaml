comments: The goal of the foundation's Career Development Award is to provide young
  surgeons with the support necessary for the initiation and development of an academic
  career in colorectal surgery. The CDA focuses on career development and mentorship
  of the individual rather than solely on the research proposal. The award is intended
  for the academic investigator demonstrating significant creativity in research relevant
  to the pathophysiology or management of diseases of the small bowel, colon, rectum,
  or anus. Grants of up to $75,000 per year for two years will be awarded through
  the program.
