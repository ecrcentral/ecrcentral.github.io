comments: Supported by the Gruber Foundation, the annual award program recognizes
  two young neuroscientists for outstanding research and educational pursuits in an
  international setting. Recipients will receive a $25,000 cash prize and complimentary
  registration, transportation (economy air or ground), and two nights hotel accommodations
  for the SfN annual meeting. To be eligible, nominees must be a graduate student,
  postdoctoral fellow, or research associate who is a citizen/permanent resident of
  the United States and studying or working at an institution located outside the
  United States. In addition, applicants must be actively engaged in research at the
  time the award is given. Self-nominations will not be accepted.
