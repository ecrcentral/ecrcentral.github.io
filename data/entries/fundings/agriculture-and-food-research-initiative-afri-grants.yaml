name: Agriculture and Food Research Initiative (AFRI) Grants
description: The Agriculture and Food Research Initiative (AFRI) is the nation’s leading
  competitive grants program for agricultural sciences. The National Institute of
  Food and Agriculture (NIFA) awards AFRI research, education, and extension grants
  to improve rural economies, increase food production, stimulate the bioeconomy,
  mitigate impacts of climate variability, address water availability issues, ensure
  food safety and security, enhance human nutrition, and train the next generation
  of the agricultural workforce.
