comments: 'LIMITED SUBMISSION (limit 1 application per department from JHU): The purpose
  of this program is to support junior faculty members who have completed the conventional
  resident/fellowship training program(s); but have not yet been recognized as independent
  investigators. The purpose of the funding is to help establish the recipient as
  an independent investigator, and to collect preliminary data that could lead to
  further funding through established mechanisms such as the NIH. Recipients will
  devote a minimum of 40% of their time in the approved research project. Any area
  of research related to the radiologic sciences, from hypothesis-driven basic science
  and clinical investigations to topics such as drug, device, and therapy development;
  comparative effectiveness, evidence-based radiology, ethics and professionalism,
  quality improvement, clinical practice efficiency, and imaging informatics.'
