name: Darwin Postdoctoral Fellowship
description: The Darwin Fellow Program, founded in 1995, brings promising young postdoctoral
  researchers to UMASS Amherst. The two-year position provides a unique combination
  of teaching and research responsibilities and is excellent preparation for academic
  positions. The fellowship program embodies the interdepartmental collaboration that
  characterizes the OEB Graduate Program. Darwin Fellows are active participants in
  OEB, acting as mentors to graduate students, conducting research, leading seminar
  courses, and teaching courses in the Biology Department.
