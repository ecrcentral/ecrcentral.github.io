name: Life Science Research Foundation Postdoc Fellowship
description: "Since 1983, the Life Sciences Research Foundation (LSRF) has funded\
  \ nearly 550 outstanding postdoctoral fellows in all areas of the life sciences,\
  \ and raised more than $50 million from generous industries, foundations and individuals\
  \ to support this effort.\r\n\r\nWe believe that discoveries and application of\
  \ innovations in biology for the public's good depends upon the training and support\
  \ of the highest quality young scientists. Every year our selection committee of\
  \ renowned scientists identify the top 5% of applicants from an international pool\
  \ of more than 1000 postdoctoral applicants. Once chosen, the LSRF collaborates\
  \ with current and potential sponsors to match them with fellows with similar research\
  \ interests. In 2018, twenty-six of these remarkable young scientists were matched\
  \ with sponsors to support their research. Yet even now many excellent scientists\
  \ remain unfunded.\r\n\r\nLSRF offers a single type of award - a three-year postdoctoral\
  \ fellowship. The current award amount is $62,000/year ($186,000 total). Of this,\
  \ $52,000 is allocated for the fellow's salary/stipend and the remaining $10,000\
  \ is a research allowance for the fellow's use. Additional details outlining eligibility\
  \ and fellowship guidelines may be found on the Application page."
