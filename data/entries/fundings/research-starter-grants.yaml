comments: The purpose of the PhRMA Foundation Research Starter Grants is to offer
  financial support to individuals beginning independent research careers at the faculty
  level. The “starter” aspect of the program strives to assist individuals who are
  establishing careers as independent investigators. The program is not offered as
  a means to augment an ongoing research effort. Funds must be used to conduct the
  proposed research. Research Starter Grants support individuals in academia who do
  not have other substantial sources of research funding. Applicants will be judged
  on the scientific merit of the proposed research, and on the degree of financial
  need. Funds may not be used for salary support of the grantee, but may be used to
  support technical assistance. The support of technical assistance may include hourly
  wages of a technician; however, funds may not be used to provide fringe benefits
  or cover indirect costs. This program provides a research grant of $100,000 for
  one year (with the exception of the Research Starter Grant in Adherence Improvement
  which provides $50,000 for one year).
