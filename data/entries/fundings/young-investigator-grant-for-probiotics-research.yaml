comments: Young investigators who are senior fellows with a committed faculty appointment
  or early faculty members within a maximum of 5 consecutive years of his/her first
  faculty appointment (appointments must be in the U.S.) are eligible. Applicants
  must be interested in understanding the health benefits of probiotics and microbiota
  and the relationship between probiotics, gastrointestinal microbiota and the body.
  The annual grant amount is $50,000 per grant recipient with no more than 10% of
  this amount dedicated to overhead costs. Two grants will be funded per year with
  each given to different institutions in the United States.
