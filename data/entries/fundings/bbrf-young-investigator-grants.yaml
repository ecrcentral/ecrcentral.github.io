comments: 'The program is intended to facilitate innovative  research opportunities
  and supports  basic, as well as translational and/or clinical  investigators.Allresearch
  must  be  relevant  to our  understanding, treatment  and  prevention of  serious  psychiatric
  disorders  such  as:  schizophrenia;  bipolar;  mood  and  anxiety  disorders(for  a  complete  list,  see  the  front  page  of  the
  application);or early onset brain and behavior disorders. In  addition  tosupporting  the  full  rangesof  relevant  neurobiological  and  psychobiological  basic  science,  we  also  support
  clinical science,which can include careful studies using qualitative research approaches
  or research generating preliminary data to explore a new hypothesis generated by
  clinical experience or large sample studies.'
