name: BBRF Young Investigator Grants
description: BBRF Young Investigator Grants provide each scientist with up to $35,000
  per year for two years totaling $70,000 to enable promising investigators to either
  extend research fellowship training or begin careers as independent research faculty.
  The Brain & Behavior Research Foundation awarded the first Young Investigator Grant
  in 1987. The goal of the YI program is to help researchers launch careers in neuroscience
  and psychiatry and gather pilot data to apply for larger federal and university
  grants. Since 1987, we have awarded more than $243 million in Young Investigator
  Grants around the world.
