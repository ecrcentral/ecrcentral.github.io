name: Postdoctoral Research Fellowship
description: 'The Postdoctoral Research Fellowship Programs of the AMNH are designed
  to advance the training of each participant by having them pursue a specific, time-limited
  project in association with Museum professionals in the Museum setting. The applicant''s
  project must fit into one or more of the main research areas of interest in the
  Museum''s Scientific Divisions: Anthropology, Invertebrate Zoology, Paleontology,
  Physical Sciences (Astrophysics and Earth & Planetary Sciences), or Vertebrate Zoology.'
