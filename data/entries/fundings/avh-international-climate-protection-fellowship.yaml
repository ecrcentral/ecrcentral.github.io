name: International Climate Protection Fellowship
description: The Alexander von Humboldt Foundation International Climate Protection
  Fellowship supports postdoctoral researchers and young professionals from non-European
  emerging economies and developing countries to conduct long-term research projects
  in Germany addressing climate protection, biodiversity, and sustainability. Fellows
  receive a monthly stipend of EUR 2,670 plus allowances for travel, language courses,
  and family.
