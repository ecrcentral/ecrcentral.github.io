name: 'Plant Genome Research Program (PGRP): Early Career Investigator Awards in Plant
  Genome Research'
description: 'The Plant Genome Research Program (PGRP) supports genome-scale research that addresses challenging questions of biological, societal and economic importance. PGRP encourages the development of innovative tools, technologies and resources that empower a broad plant research community to answer scientific questions on a genome-wide scale. Emphasis is placed on the scale and depth of the question being addressed and the creativity of the approach. Data produced by plant genomics should be usable, accessible, integrated across scales and of high impact across biology. Training, broadening participation, and career development are essential to scientific progress and should be integrated in all PGRP-funded projects. Two funding tracks are currently available: 1. RESEARCH-PGR TRACK: Genome-scale plant research to address fundamental biological questions in biology, including economically important processes of societal importance. 2. TRTech-PGR TRACK: Tools, resources and technology breakthroughs that further enable functional plant genomics.'
