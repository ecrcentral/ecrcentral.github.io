name: The China Medical Board (CMB) Postdoctoral Research Fellowship in China
description: "Overview:\r\n\r\nFacilitated by the U-M Medical School and funded by\
  \ the China Medical Board(link is external) (CMB), the CMB Postdoctoral Research\
  \ Fellowship Program places early-career researchers or advanced students (MD, PhD,\
  \ or equivalent) from US institutions into select labs at highly-ranked academic\
  \ institutions in China under the guidance of a local and a U-M mentor.\r\n\r\n\
  Fellows spend 1-2 years training at one of three program host sites: Peking University\
  \ Health Science Center, Central South University Xiangya School of Medicine, or\
  \ Shanghai Technology University. Fellows are provided with NIH-equivalent stipends,\
  \ benefits, and funds to accommodate travel between the US and China. A certificate\
  \ of completion will be awarded upon successful completion of the program.\r\n\r\
  \nEach postdoctoral fellow will be co-mentored by a faculty member from the U-M\
  \ Medical School and the Chinese host institution. Fellows and their mentors will\
  \ work together to develop and submit an individualized mentorship and training\
  \ plan as part of the application process. The fellowship year typically runs July-June\
  \ and begins with a week-long orientation at the NIH with the world’s leading global\
  \ health experts, after which fellows will spend 11-12 months on-site at the host\
  \ institution to carry out a mentored research project and training activities aimed\
  \ at building the trainee’s methodologic skills and content expertise in a field\
  \ relevant to health and biomedical science. \r\n\r\nEligibility:\r\n\r\nCandidates\
  \ for CMB fellowships who meet the following criteria will be eligible to apply\
  \ for this program: \r\n1. US citizen or Permanent Resident\r\n2. Have completed\
  \ a doctoral degree, or equivalent degree in a relevant field (e.g., M.D., Ph.D.,\
  \ DDS, PharmD, DVM, etc.) or are currently enrolled in a doctoral program (completed\
  \ qualifying exams or equivalent)\r\n3. Accepted as a training fellow at the US\
  \ grantee institution\r\n4. Available to spend 11-12 months at research site in\
  \ China, extendable to 2 years\r\n5. Able to submit a research proposal describing\
  \ their research and mentoring/career development plans during the fellowship\r\n\
  6. A working knowledge of Chinese language is helpful but not essential \r\n\r\n\
  How to Apply\r\n\r\nApplications are accepted on a rolling basis. Prospective participants\
  \ are encouraged to reach out to Amy Huang (yanhuang@umich.edu),  Director of Asia\
  \ Programs at the University of Michigan Medical School, to discuss their interest\
  \ and to explore connections to relevant mentors/labs. Candidates are asked to submit\
  \ the following in a single PDF file:\r\n1. NIH-formatted biosketches for the applicant\
  \ and proposed co-mentors\r\n2. Statement of career goals (maximum 800 words)\r\n\
  3. Proposed project (including project title, abstract, background, specific aims,\
  \ methods, and significance; maximum 1500 words)\r\n4. Three letters of recommendation\
  \ from current mentors/supervisors"
