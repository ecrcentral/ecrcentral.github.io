comments: The Alan T. Waterman Award is the highest honor awarded by the National
  Science Foundation. Since 1975, when Congress established the award to honor the
  agency’s first director, the annual award has been bestowed upon individuals who
  have demonstrated exceptional individual achievement in scientific or engineering
  research of sufficient quality to place them at the forefront of their peers. The
  annual award recognizes an outstanding young researcher in any field of science
  or engineering supported by the National Science Foundation. In addition to a medal,
  the awardee receives a grant of $1,000,000 over a five year period for scientific
  research or advanced study in the mathematical, physical, biological, engineering,
  social or other sciences at the institution of the recipient’s choice.
