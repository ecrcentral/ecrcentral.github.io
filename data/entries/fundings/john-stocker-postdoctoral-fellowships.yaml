name: John Stocker Postdoctoral Fellowships
description: The Postdoctoral Fellowships are named after Dr John Stocker. As Chairman
  of the Board of CSIRO, Dr Stocker was instrumental in the rejuvenation of the SIEF
  in 2009. As former Chief Executive of CSIRO he provided strong support for the development
  of the WLAN technology which ultimately delivered the resources for the rejuvenation
  of the SIEF. Preferentially, research projects for Postdoctoral Fellowships were
  collaborative projects between PRFAs and universities with a strong preference for
  end-user/industry engagement in the project.
