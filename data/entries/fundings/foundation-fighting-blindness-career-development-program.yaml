name: Career Development Program (CDA)
url: https://www.fightingblindness.org/career-development-program-cda
description: The Career Development Program supports clinician-scientists in their first three years of a junior faculty appointment
  who are committed to advancing research on inherited retinal degenerative diseases. The award funds laboratory and clinical research 
  to elucidate the mechanisms, pathogenesis, and innovative treatment strategies for retinal degenerative diseases. Individuals from 
  underrepresented racial, ethnic, and gender groups, as well as individuals with disabilities, are encouraged to apply.
