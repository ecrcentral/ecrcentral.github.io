comments: "\uFEFFThe CSL Centenary Fellowships are awarded to Australian mid-career\
  \ researchers looking to pursue research opportunities at an Australian medical\
  \ research institute or Australian University.   It is a requirement that all applicants\
  \ have an agreement with an Australian medical research institute (MRI)/University\
  \ which allows that should they be awarded the fellowship the institute/universitywould\
  \ be prepared to employ them and that they would be appropriately supported to undertake\
  \ their nominated research project at that institution.   Note that the fellowships\
  \ monies are paid to the employing institute/university."
