comments: "There are various award categories which vary in degree requirement and\
  \ funding. Please refer to the website for more details.\r\n\r\nClinical and Basic\
  \ Research Awards\r\n\r\nAny individual affiliated with a facility that carries\
  \ out research in inherited bleeding disorders, or provides care to patients with\
  \ these disorders, may make a request for these awards. Such facilities may include\
  \ medical universities, hospitals, treatment centers, blood centers and laboratories.\r\
  \n\r\nFellowship Project Award\r\n\r\nThe applicant will be affiliated with a facility\
  \ that carries out research in inherited bleeding disorders or provides care to\
  \ patients with these disorders. Such facilities may include medical universities,\
  \ hospitals, treatment centers, blood centers and laboratories. The applicant should\
  \ have earned his/her medical degree within the previous eight years. The applicant\
  \ may not have received previous funding from this award category."
