name: Australia to USA Graduate Education Scholarships
description: The American Australian Association (AAA) established its Graduate Education
  Fund in 2002 to provide much needed financial support and assistance to American
  and Australian individuals to undertake innovative and transformational Masters,
  Ph.D. or Postdoctoral study and research in each other’s countries respectively.
  With more than 300 scholars and alumni and US $8.5 million invested to date, the
  AAA is committed to helping advance graduate education, in order to enable our countries
  most valuable resource – human capital – to unlock creative new solutions to global
  challenges and improve the quality of life for all citizens.
