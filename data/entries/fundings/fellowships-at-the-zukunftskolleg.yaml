name: Fellowships at the Zukunftskolleg
description: "<p style=\"caret-color: #222222; color: #222222; font-family: Arial,\
  \ Helvetica, sans-serif;\"><span style=\"font-family: Arial;\">the Zukunftskolleg\
  \ has just opened its 17th call for applications for Research Fellowships and Postdoctoral\
  \ Fellowships. We would be pleased if you help us distribute the call in your network!&nbsp;<br\
  \ /></span></p>\r\n<p style=\"margin: 12px 0px; letter-spacing: 0.9px; font-size:\
  \ 18px; line-height: 20px; font-family: Arial, sans-serif; color: #0098d3; font-weight:\
  \ bold;\">Postdoctoral Fellowships (one position)</p>\r\n<p style=\"caret-color:\
  \ #222222; color: #222222; font-family: Arial;\">We invite researchers in the early\
  \ stages of their careers who plan to develop and implement an independent research\
  \ project to apply for a 2-year Postdoctoral Fellowship. The fellowship is open\
  \ to researchers from all fields represented at the University of Konstanz. We offer\
  \ one 2-year position.<strong>&nbsp;</strong>Furthermore, one&nbsp;<em>Cluster-Zukunftskolleg\
  \ Fellowship</em>&nbsp;related to the study of collective behaviour&nbsp;can&nbsp;be&nbsp;funded&nbsp;by\
  \ the \"<a style=\"color: #1155cc;\" href=\"https://www.exc.uni-konstanz.de/collective-behaviour/engagement/open-positions/\"\
  \ target=\"_blank\" rel=\"noopener\" data-saferedirecturl=\"https://www.google.com/url?q=https://www.exc.uni-konstanz.de/collective-behaviour/engagement/open-positions/&amp;source=gmail&amp;ust=1663751531937000&amp;usg=AOvVaw2rNm8EtEjSIw15uVAw_ZWj\"\
  >Centre for the Advanced Study of Collective Behaviour</a>\"&nbsp;directly. An additional&nbsp;<em>Cluster-Zukunftskolleg\
  \ Fellowship</em>&nbsp;can be funded by the Cluster of Excellence \"<a style=\"\
  color: #1155cc;\" href=\"https://www.exc.uni-konstanz.de/en/inequality/\" target=\"\
  _blank\" rel=\"noopener\" data-saferedirecturl=\"https://www.google.com/url?q=https://www.exc.uni-konstanz.de/en/inequality/&amp;source=gmail&amp;ust=1663751531937000&amp;usg=AOvVaw0YcgIrd48j52BgsoybZMqK\"\
  >Politics of Inequality</a>\" for projects investigating the political causes and\
  \ consequences of inequality.&nbsp;<strong><br /></strong></p>\r\n<p style=\"caret-color:\
  \ #222222; color: #222222; margin: 12px 0px; font-family: Arial, sans-serif;\">You\
  \ will find the call for applications as well as information about the eligibility\
  \ criteria and the application process under:</p>\r\n<p style=\"caret-color: #222222;\
  \ color: #222222; margin: 12px 0px; font-family: Arial, sans-serif;\"><a style=\"\
  color: #1155cc;\" href=\"https://www.uni-konstanz.de/zukunftskolleg/fellowships/postdoctoral-fellowship/\"\
  \ target=\"_blank\" rel=\"noopener\" data-saferedirecturl=\"https://www.google.com/url?q=https://www.uni-konstanz.de/zukunftskolleg/fellowships/postdoctoral-fellowship/&amp;source=gmail&amp;ust=1663751531937000&amp;usg=AOvVaw3ORImY00cLeUFWyKjRZdIo\"\
  >https://www.uni-konstanz.de/<wbr />zukunftskolleg/fellowships/<wbr />postdoctoral-fellowship/</a></p>\r\
  \n<p style=\"caret-color: #222222; color: #222222; margin: 12px 0px; font-family:\
  \ Arial, sans-serif;\">&nbsp;</p>\r\n<p style=\"margin: 12px 0px; letter-spacing:\
  \ 0.9px; font-size: 18px; line-height: 20px; font-family: Arial, sans-serif; color:\
  \ #0098d3; font-weight: bold;\">Research Fellowships (one position)</p>\r\n<p style=\"\
  caret-color: #222222; color: #222222; font-family: Arial;\">Researchers with significant\
  \ work experience at the postdoctoral level are welcome to apply for a 5-year Research\
  \ Fellowship. The fellows build their own academic profile by leading an independent\
  \ research group at the University of Konstanz. 5-year Research Fellowships are\
  \ open to researchers from all fields represented at the University of Konstanz.&nbsp;</p>\r\
  \n<p style=\"caret-color: #222222; color: #222222; font-family: Arial;\">You will\
  \ find the call for applications as well as information about the eligibility criteria\
  \ and the application process under:</p>\r\n<p style=\"caret-color: #222222; color:\
  \ #222222; font-family: Arial;\"><a style=\"color: #1155cc;\" href=\"https://www.uni-konstanz.de/zukunftskolleg/fellowships/research-fellowship/\"\
  \ target=\"_blank\" rel=\"noopener\" data-saferedirecturl=\"https://www.google.com/url?q=https://www.uni-konstanz.de/zukunftskolleg/fellowships/research-fellowship/&amp;source=gmail&amp;ust=1663751531937000&amp;usg=AOvVaw2U3UNJ-f6g6x_nvUvTYhOL\"\
  >https://www.uni-konstanz.de/<wbr />zukunftskolleg/fellowships/<wbr />research-fellowship/</a></p>\r\
  \n<p style=\"caret-color: #222222; color: #222222; font-family: Arial;\">&nbsp;</p>\r\
  \n<p class=\"MsoNormal\" style=\"margin: 0px; caret-color: #222222; color: #222222;\
  \ font-family: Arial, Helvetica, sans-serif; text-align: justify; line-height: 15pt;\"\
  ><span style=\"font-family: Arial;\"><span lang=\"EN-US\">Questions can be directed\
  \ via e-mail:&nbsp;<a style=\"color: #1155cc;\" href=\"mailto:zukunftskolleg-application@uni-konstanz.de\"\
  \ target=\"_blank\" rel=\"noopener\">zukunftskolleg-application@<wbr />uni-konstanz.de</a>.&nbsp;</span><span\
  \ lang=\"EN-US\">We look forward to receiving thr applications until&nbsp;<strong>31\
  \ October 2022</strong>, 11:00 am (Konstanz time)<strong>.</strong></span></span></p>\r\
  \n<p class=\"MsoNormal\" style=\"margin: 0px; caret-color: #222222; color: #222222;\
  \ font-family: Arial, Helvetica, sans-serif; text-align: justify; line-height: 15pt;\"\
  >&nbsp;</p>\r\n<p class=\"MsoNormal\" style=\"margin: 0px; caret-color: #222222;\
  \ color: #222222; font-family: Arial, Helvetica, sans-serif; text-align: justify;\
  \ line-height: 15pt;\">&nbsp;</p>\r\n<p>&nbsp;</p>"
