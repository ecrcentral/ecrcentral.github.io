  \ AAN CDA and other federally fundedcareer development awards (including NIH K awards\
  \ and\r\nVA CDAs) or other career development awards supported by foundations of\
  \ a similar scope simultaneously. To be eligible to apply for this award, applicant’s\
  \ other\r\ngrant source(s) cannot exceed $150,000 annually"
