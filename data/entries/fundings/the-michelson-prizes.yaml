name: The Michelson Prizes
description: The Michelson Prizes are scientific awards of $150,000 given annually to young investigators who are applying disruptive concepts and inventive processes to advance human immunology, vaccine discovery, and immunotherapy research across major global diseases. The Michelson Prizes are open to early-career researchers under 35 at the time of application, and will focus on human immunology, vaccine discovery and immunotherapy research.
