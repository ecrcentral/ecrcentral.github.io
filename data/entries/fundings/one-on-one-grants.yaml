comments: 'Through grants, awards, and other program support, the group aims to strengthen,
  mature, and promote the professional nonprofit American theatre. Leadership U[niversity]
  prepares professionals from all areas of the theatre for greater leadership responsibilities
  and long-term careers in the theatre. The program makes awards in two different
  areas: One-on-One grants of $75,000 plus additional support for early-career leaders
  and Continuing Ed grants of up to $5,000 for mid-career or veteran professionals.
  One-on-One grants of $75,000 will be awarded to six exceptionally talented early-career
  leaders from all areas of theatre for professional development via mentorships at
  a TCG Member Theatre, with an additional $5,000 honorarium for their mentor. Up
  to an additional $10,000 Opportunity Fund will be available for one or more of the
  following: outstanding student loans, approved supplemental activities, and/or life
  needs (i.e. health care, child or elder care, or other medical expenses). An additional
  Travel Fund of up to $4,500 will be available for mentee and mentor travel.'
