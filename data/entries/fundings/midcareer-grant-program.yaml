comments: The program provides support for a year-long program of study for scholars
  interested in advancing their understanding of a compelling problem of education
  by acquiring new skills, substantive knowledge, theoretical perspectives, and/or
  methodological tools. It is not intended to encourage researchers to abandon their
  existing area of expertise, but rather to build on, enrich, and extend that training
  with the acquisition of new methodological tools and/or perspectives about a subject
  to which they have been deeply committed throughout their academic career. Grants
  of up to $150,000 will be awarded for projects focused on the exploration of an
  important problem, or set of problems, of education that is well aligned with the
  applicant's core interests and past scholarship
