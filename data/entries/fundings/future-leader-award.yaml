comments: The ILSI North America Future Leader Award, given annually to promising
  nutrition and food scientists, allows new investigators the opportunity to add to
  an existing project or to conduct exploratory research that might not receive funding
  from other sources or add to an existing project. Consideration will be given to
  individuals proposing research in the areas of experimental nutrition, nutrition
  and toxicology, and nutrition and food science. Grants extend for a period of 2
  years at a funding level of $15,000 USD per year. Funds may not be used for overhead
  or to support the investigator's salary. ($30,000 max)
