name: David Philipps Fellowship
description: The David Phillips Fellowship (DPF) provides support for researchers
  wishing to establish their first independent research group. The DPF will invest
  in scientists who can demonstrate that they are on an upward trajectory and are
  eager to lead their own fully independent programme of research. David Phillips
  Fellows strive for continuous personal and professional development and have a strategy
  for how they will develop themselves and their team over the lifetime of the award.
  As such, the DPF enables BBSRC to supply the UK with highly skilled, professional
  research leaders.
