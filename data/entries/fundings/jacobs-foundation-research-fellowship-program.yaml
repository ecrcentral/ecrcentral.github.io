name: Jacobs Foundation Research Fellowship Program
description: The Jacobs Foundation Research Fellowship Program is a globally competitive
  fellowship program for early career researchers whose work is dedicated to improving
  the development, learning and living conditions of children and youth. The relevant
  disciplines include, but are not limited, to education sciences, psychology, economics,
  sociology, family studies, media studies, political science, linguistics, neurosciences,
  and medical sciences.
