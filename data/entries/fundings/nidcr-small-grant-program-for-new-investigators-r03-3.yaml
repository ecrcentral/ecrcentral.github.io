name: NIDCR Small Grant Program for New Investigators (R03)
description: This NIDCR Small Grant Program for New Investigators supports basic and
  clinical research conducted by scientists who are in the early stages of establishing
  an independent research career in oral, dental and craniofacial research. This R03
  program supports pilot or feasibility studies and developmental research projects
  with the intention of obtaining sufficient preliminary data for a subsequent investigator­
  initiated Research Project Grant (R01) or equivalent application.
