name: Sundance Institute Opportunities
description: Sundance Institute’s artist programs provide dynamic support at every
  step of the creative journey for individuals with distinct voices in film, theatre,
  film composing, episodic storytelling, and emerging media. Each program consists
  of labs, grants, intensives, sessions, and ongoing resources for artists to nurture
  their projects and sustain their careers. Through year-round activities, we provide
  the space for artists to create and share their stories with the world. Since our
  inception, the Institute’s programs have supported more than 11,000 artists and
  fostered a community for independent storytellers to learn, grow, connect, and give
  back.
