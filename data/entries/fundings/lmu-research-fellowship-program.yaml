name: LMU Research Fellowship Program
description: "The LMU Research Fellowships Program was first advertised in 2009 and\
  \ has been a great success: As a result of the first seven calls for applications,\
  \ a total of 66 fellowships have been awarded to highly qualified candidates from\
  \ all over the world and from various disciplines – 38 from the Humanities and Social\
  \ Sciences, 28 from the Natural Sciences and Medicine. 67% of the fellows have come\
  \ from renowned institutions abroad.\r\n\r\nSince 2017, the LMU Research Fellowships\
  \ Program has been co-funded by the Marie Skłodowska-Curie COFUND scheme of the\
  \ European Union’s Horizon 2020 research and innovation program.\r\n\r\nExcellent\
  \ Support for Outstanding Postdocs\r\nThe LMU Research Fellowships support the career\
  \ development of outstanding postdocs from all fields of research. You will benefit\
  \ from:\r\n\r\n1. A two-year fellowship with a competitive salary and substantial\
  \ research budget\r\n2. Managing your own research project with the support of an\
  \ LMU professor\r\n3. Undertaking research stays at international partner organizations\r\
  \n4. An excellent infrastructure and a wide variety of professional training options\r\
  \n5. The vibrant interdisciplinary exchange at the Young Center of LMU’s Center\
  \ for Advanced Studies"
