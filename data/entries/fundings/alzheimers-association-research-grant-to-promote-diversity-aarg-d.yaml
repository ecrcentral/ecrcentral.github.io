comments: The Alzheimer’s Association Research Grant to Promote Diversity program
  award is up to three years, minimum of 2 years to investigators who are currently
  underrepresented at academic institutions in Alzheimer’s or related dementias research.
  The objective of this award is to increase the number of highly trained investigators
  from diverse backgrounds whose basic, clinical and social/behavioral research interests
  are grounded in the advanced methods and experimental approaches needed to solve
  problems related to Alzheimer’s and related dementias in general and in health disparities
  populations.  Each award is limited to $150,000 over up to 3 years.
