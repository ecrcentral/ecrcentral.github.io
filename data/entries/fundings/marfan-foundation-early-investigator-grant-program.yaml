comments: 'Grants support basic or clinical research on Marfan syndrome and related
  disorders. The grant program is designed to provide financial support for early
  investigators studying any or all disciplines involved in this area. Eligibility:
  The principal investigator must hold an MD, DO, PhD, ScD, DDS, DVM, or equivalent
  degree. The investigator must have proven ability to pursue independent research
  as evidenced by original research publications in peer-reviewed journals. Applicants
  must have less than seven years of experience in a faculty position at the time
  of application submission. Appointments associated with clinical house staff/fellowship
  training positions are excluded from the seven-year faculty limit. Award winners
  cannot hold concurrent NIH K award, or similar training grant.Three two-year grants
  for $37,500 per year for a total of $75,000 per grant are awarded for basic or clinical
  research.'
