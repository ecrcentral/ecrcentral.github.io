comments: The recipient will be selected based on the excellence of the full breadth
  of research conducted and published to date, as well as the promise of research
  planned for the next five years. The McGuigan Prize is given biennially to a young
  psychologist engaged in research that addresses any aspect of mental function (e.g.,
  cognition, affect, motivation) and seeks to understand the mind from both a behavioral
  and neural perspective. The prize supports research that aims to advance, both empirically
  and theoretically, a materialistic understanding of the human mind. The research
  may address any aspect of mental function (e.g., cognition, affect, motivation)
  and should utilize behavioral and/or neuroscientific methods. The amount of the
  award is $25,000.
