name: FY2020 JSPS London Call for the Short Term Pre/Postdoctoral Fellowship for Research
  in Japan
description: This programme provides the opportunity for short-term visits for pre- and post-doctoral UK researchers and European, North American and Canadian researchers based in the UK and the Republic of Ireland, for cooperative research with leading research groups at Japanese Universities and Institutions. The programme is designed to provide researchers with first-hand experience of the research and living environment in Japan, whilst expanding academic exchange between Japan and the UK or Republic of Ireland.
