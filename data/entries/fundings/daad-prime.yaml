name: DAAD PRIME — Postdoctoral Researchers International Mobility Experience
description: PRIME (Postdoctoral Researchers International Mobility Experience) is
  a DAAD programme that combines employment at a German university with a research
  stay abroad. Postdocs of all nationalities are employed on a full work contract
  at a German university (TV-L E 13 scale) and spend 12 months conducting research
  outside Germany, followed by a 6-month integration phase in Germany.
