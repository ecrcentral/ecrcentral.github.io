slug: european-flavor-phd-in-research-awards-programme
name: European Flavor PhD in research awards programme
description: "The programme aims to raise the profile of flavor science research in\
  \ Europe by encouraging students of differing scientific disciplines to engage in\
  \ innovative flavor-related research PhD projects and thus to advance the exciting\
  \ and challenging field of flavor science\r\nBest PhD Thesis Award (EUR 5000)\r\n\
  6 Bursaries for 1st year PhD Students (EUR 3000 each)\r\n\r\nThe purpose of this\
  \ project is to promote innovative flavor research amongst PhD candidates across\
  \ European universities and research institutes. PhD students enrolled in Universities\
  \ and research institutes from 32 European countries including 27 European Union\
  \ countries, UK, Switzerland, Norway, Turkey and Russia are eligible to apply in\
  \ the programme. The project targets two different groups of PhD students:\r\n\r\
  \n•\tGroup 1: those who are about to complete their PhD and hence will soon be exploring\
  \ opportunities for employment \r\n\r\n•\tGroup 2: those who are about to commence\
  \ their PhD studies\r\n\r\nThis is translated into the following sub-objectives:\r\
  \n\r\n•\tPublicise the attraction of flavor research to attract high-calibre students\
  \ into appropriate PhD courses and then into industry\r\n\r\n•\tFor Group 1:\r\n\
  −\tSolicit and evaluate innovative flavor research projects \r\n−\tProvide the Annual\
  \ Savory Flavor & Food Industry Conference, organised each spring in Geneva, as\
  \ a platform for the winning student to present his/her work to ‘potential employers’\r\
  \n\r\n•\tFor Group 2:\r\n−\tAward bursaries to a selected number of students who\
  \ are planning to commence their PhD studies in flavors\r\n−\tProvide the 6 winning\
  \ 1st year PhD students with the opportunity of visiting the laboratory of selected\
  \ sponsor companies, by using a part of their winning bursary for their travel and\
  \ stay. This will enable them to obtain a first-hand view of an industry R&D centre"
