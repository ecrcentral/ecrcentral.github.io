name: 2025 Stengl-Wyer Scholars
description: "<p>Stengl-Wyer, the largest endowment in the history of the College\
  \ of Natural Sciences, offers premier support for postdoctoral scientists to serve\
  \ as Stengl-Wyer Scholars. Each scholar researches broadly the diversity of life\
  \ and interactions between living things and their natural environments.</p>\r\n\
  <p>Recent Ph.D.s are invited to apply for distinguished postdoctoral positions to\
  \ study the diversity of life and/or organisms in their natural environments at\
  \ The University of Texas at Austin (UT), one of the top campuses in the country\
  \ for this area of research.</p>\r\n<p>Stengl-Wyer Scholars Program provides up\
  \ to three years of support for talented postdoctoral researchers in the broad area\
  \ of the diversity of life and/or organisms in their natural environments.</p>\r\
  \n<p>Scholars may study any group of organisms at levels from genes to populations\
  \ to communities to ecosystems and may use any combination of approaches. Applications\
  \ that advance research within the Texas Field Station Network or UT Biodiversity\
  \ Collections are highly encouraged given the Stengl-Wyer Endowment&rsquo;s mission.</p>"
