comments: 'LIMITED SUBMISSION (limit 1 application from JHU): Pediatric Oncology:
  This career development award is intended to develop the independent pediatric cancer
  research careers of highly qualified investigators, not to support well-established
  or senior investigators. This award is for a Scholar’s salary and benefits only;
  adjustments may be allowed if the Scholar receives other funds after applying, upon
  Foundation approval. Eligibility: Junior Faculty: Applicants should hold a Ph.D.,
  M.D., D.O., or international equivalent degree by the date the award becomes effective.
  Applicants must be early-career and possibly hold a junior faculty-level position
  at an academic or non-profit research institution or laboratory, and must have held
  such a position for no longer than 5 years at the time of the application deadline.
  $330,000 over three years; opportunity for two additional years at $115,000 per
  year; to be used for Scholar''s salary and benefits only.'
