comments: In the new international competition, HHMI and its partners are seeking
  top early career researchers from a wide variety of biomedical research fields.
  The program’s aim is to help develop scientific talent worldwide. Applicants must
  have started their first independent research position on or after April 1, 2009.
  Awardees will be invited to participate in research meetings with scientists supported
  by the funders. These meetings facilitate the exchange of ideas, stimulate new research,
  and provide an opportunity for collaborative endeavors within the international
  scientific community. $650,000 over five years.
