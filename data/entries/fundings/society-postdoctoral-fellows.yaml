name: Society Postdoctoral Fellows
description: These fellowships foster the academic careers of scholars who have recently
  received their Ph.D. degrees by permitting them to pursue their research while gaining
  mentored experience as teachers and members of the departments and/or programs in
  which they are housed. We seek candidates who are prepared to initiate an innovative
  post-doctoral project.  Applications will be accepted in the various fields of humanities,
  social sciences, sciences, interdisciplinary programs, engineering, business and
  medicine.
