comments: 'SFARI Research Awards: Grants awarded through this category are designed
  for investigators with demonstrated expertise conducting compelling high-impact
  research on an experimental hypothesis for which, in most cases, preliminary data
  has already been gathered. The foundation also will consider projects focused on
  a central hypothesis where success depends on close collaboration between two or
  more labs. The initiative expects to fund proposals for a maximum of $275,000 per
  year (including indirect costs) for up to three years, but under exceptional circumstances
  will consider proposals at higher funding levels.'
