name: ACLS Fellowships
description: ACLS invites research applications from scholars in all disciplines of
  the humanities and related social sciences. Faculty appointments are not required.
  The ultimate goal of the project should be a major piece of scholarly work by the
  applicant, which can take the form of a monograph, articles, digital publication(s),
  critical edition, or other scholarly resources. The ACLS Fellowship program does
  not fund creative work (e.g., novels or films), textbooks, straightforward translation,
  or pedagogical projects.
