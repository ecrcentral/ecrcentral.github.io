comments: The Young Investigator Award recognizes the outstanding achievements and
  contributions by a young neuroscientist who has recently received his or her advanced
  professional degree (within past 10 years). Nominations must be made or endorsed
  by an SfN member. Nominees do not need to be SfN members. Self-nomination is not
  permitted. No person may nominate more than one candidate. Current SfN officers
  and councilors are ineligible for nomination. The recipient receives $15,000 award
  and economy airfare or ground transportation, two nights hotel accommodations and
  complimentary registration for the SfN annual meeting.
