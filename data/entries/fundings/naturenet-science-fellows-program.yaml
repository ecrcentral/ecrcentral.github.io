name: NatureNet Science Fellows Program
description: TNC established the NatureNet Science Fellows Program in partnership
  with a rotating set of the world’s leading universities to create a reservoir of
  new interdisciplinary science talent that will carry out the new work of conservation.
  Fellows and grantees will work with a Nature Conservancy mentor and a hosting senior
  scholar (or scholars) to develop a research program. This joint mentorship model
  allows for fellows and grantees to take fundamental research questions and the traditional
  support provided by universities and embed themselves in the practice of applied
  conservation through TNC networks.
