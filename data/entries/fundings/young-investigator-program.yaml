comments: The Air Force YIP supports scientists and engineers who have received Ph.D.
  or equivalent degrees in the last five years and show exceptional ability and promise
  for conducting basic research. The objective of this program is to foster creative
  basic research in science and engineering; enhance early career development of outstanding
  young investigators; and increase opportunities for the young investigator to recognize
  the Air Force mission and related challenges in science and engineering. Each award
  will be funded at the $170,000 level for three years. Exceptional proposals will
  be considered individually for higher funding levels and longer duration.
