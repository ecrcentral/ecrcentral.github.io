description: '0px 0px; color: #1a1a1a; line-height: 1.2; letter-spacing: -0.5px; font-size: 26px; font-family: Arial, Helvetica, ''Nimbus Sans L'', sans-serif;">Scheme at a glance A Project grant is a research project which supports the development of new 3Rs approaches and technologies. Applications from any area of medical, biological or veterinary research are within remit – those that integrate a range of disciplines or include an industrial partner are particularly encouraged. The amount requested should be dependent on the science. Awards are for up to 36 months and funded at 80% of the full economic cost (fEC). Key dates Key date Details 19 October 2023 Outline application form available on the new Funding Service (TFS) 16.00, 11 January 2024 Deadline for submitting outline on TFS March 2024 Outline assessment meeting Mid-March 2024 Applicants notified of outcome March 2024 Applicant workshop for those invited to submit full application 16.00, 18 April 2024 Full application deadline on TFS July 2024 Panel meeting for full applications Late July 2024 Applicants notified of outcome September 2024 Grant holder introductory meeting 1 October 2024 Last date for commencing projects Who can apply? Establishment eligibility Any UK research establishment including: Higher Education Institutions (HEIs). Independent Research Organisations (IROs). Research Council (RC) Institutes.'
