name: Durham International Junior Research Fellowships
description: The Junior Research Fellowship (JRF) scheme is designed to attract the most talented researchers in Europe and beyond, and build international networks of scholars with a common passion for the deepest theoretical questions and most pressing practical problems facing humanity. The JRF scheme is aimed at researchers with significant post-doctoral experience, but recent doctorands of exceptional ability and researchers who have followed non-traditional academic career paths (such as in public corporations, NGOs or industry) are also encouraged to apply. JRFs will pursue new research ideas of their own design, undertaken in collaboration with academic researchers at Durham University.
