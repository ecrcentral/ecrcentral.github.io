comments: "The Foundation's Young Scientist Awards, selected in partnership with preeminent\
  \ science organizations, aim to recognize brilliant early career scientists from\
  \ around the world. The foundation's Young Scientist Awards, selected in partnership\
  \ with preeminent science organizations, aim to recognize brilliant early career\
  \ scientists from around the world through 4 awards: \r\n\r\n1) International Astronomical\
  \ Union Fellowships; \r\nIn conjunction with the International Astronomical Union\
  \ (IAU), The Gruber Foundation funds a fellowship program for young astronomers.\
  \ A fellowship in the amount of $50,000 is awarded annually to an extremely promising\
  \ young investigator working in any field of astrophysics.\r\n\r\nCandidates are\
  \ selected by a panel from the IAU from applications received from around the world.\r\
  \n\r\n2) Peter and Patricia Gruber International Research Award in Neuroscience;\
  \ \r\nThe Peter and Patricia Gruber International Research Award in Neuroscience\
  \ was established in 2005 to help support promising young neuroscientists to pursue\
  \ education and research at a center of excellence in their field. A Society for\
  \ Neuroscience committee selects two recipients, both young scientists who have\
  \ demonstrated international collaboration based on the best science, to share equally\
  \ the $50,000 Gruber fellowship. The award is presented at the annual meeting of\
  \ the Society for Neuroscience.\r\n\r\nCandidates for the award must be graduate\
  \ students, postdoctoral fellows, or research associates studying or working at\
  \ institutions located in countries other than those in which they hold citizenship\
  \ or permanent residency.\r\n\r\n3) Rosalind Franklin Young Investigator Awards;\
  \ \r\nThe Gruber Foundation funds the Rosalind Franklin Young Investigator Award\
  \ – a career development research award of $75,000 over three years - to two young\
  \ woman geneticists from anywhere in the world. One award will fund genetics research\
  \ in human and non-human mammals, and the other will fund genetics research in model\
  \ organisms. This unrestricted cash award is presented every three years. The successful\
  \ candidate must be in her first one to three years of an independent faculty-level\
  \ position in any area of genetics.\r\n\r\nThe award, which honors the groundbreaking\
  \ contributions of Dr. Rosalind Franklin, is intended to inspire and support new\
  \ generations of women in the field of genetics. It is administered by a committee\
  \ appointed by the Genetics Society of America (GSA).\r\n\r\n4) Weizmann Institute\
  \ Awards. \r\nSupported by personal funds donated by Peter and Patricia Gruber,\
  \ the Gruber Awards are used to fund the research of new scientists at the Weizmann\
  \ Institute and the scientific travel of selected postdoctoral fellows and doctoral\
  \ students through an award of $30,000 per year over a three-year period. A faculty\
  \ committee advises the President of the Institute as to a worthy Gruber Award recipient.\
  \ The inaugural award was presented to Elad Schneidman,a senior scientist in the\
  \ Institute's Department of Neurobiology, in May 2007.\r\n\r\nOne new scientist\
  \ will receive the award annually, so that beginning in 2009 there will be three\
  \ Gruber-sponsored scientists working concurrently with staggered award terms. The\
  \ Award provides vital funding for gifted new scientists at the beginning of their\
  \ research activities, and helps enrich their work.\r\n\r\nSee foundation web site\
  \ for further information. Amount varies- $90,000 is highest."
