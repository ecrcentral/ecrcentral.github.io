name: Pew-Stewart Scholars for Cancer Research Program
description: The Pew-Stewart Scholars for Cancer Research supports assistant professors of outstanding promise in science relevant to the advancement of a cure for cancer. The award provides $300,000 in flexible support—$75,000 per year for a four-year period. For the 2021 award, one nomination will be invited from each of the participating institutions listed at the bottom of this page. In line with The Alexander and Margaret Stewart Trust’s mission to invest in innovative, cutting-edge cancer research that may accelerate and advance progress toward a cure for cancer, applications are invited from nominees conducting cancer research. This program is distinct from the Pew Scholars Program, and it follows a different, but parallel set of guidelines and procedures for nominating an applicant whose research is related to cancer.
