name: DAAD Research Grants — One-Year Grants
description: DAAD one-year research grants enable doctoral candidates who have begun
  their PhD within the last 3 years, or hold an equivalent master's qualification,
  to conduct research stays of 7 to 12 months at German universities or recognised
  research institutions. Covers monthly stipend of EUR 861 to EUR 1,200 plus supplementary
  allowances.
