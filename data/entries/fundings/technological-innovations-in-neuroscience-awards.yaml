comments: These awards encourage and support scientists working on the development
  of novel and creative approaches to understanding brain function. The Endowment
  Fund is interested in how a new technology may be used to monitor, manipulate, analyze,
  or model brain function at any level, from the molecular to the entire organism.
  Technology may take any form, from biochemical tools to instruments to software
  and mathematical approaches. Because the program seeks to advance and enlarge the
  range of technologies available to the neurosciences, research based primarily on
  existing techniques will not be considered. A goal of the Technology Awards is to
  foster collaboration between the neurosciences and other disciplines; therefore,
  collaborative and cross-disciplinary applications are explicitly invited.
