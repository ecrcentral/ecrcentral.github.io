name: Volkswagen Experiment! – In search of bold research ideas
description: The exploration of exceptionally daring new ideas is not yet really a
  focal point of the research agenda in Germany, as far as facing challenges and radically
  transforming common wisdom are concerned. This often requires to establish counterintuitive
  hypotheses as well as unconventional methodologies or technologies, and to focus
  on entirely new research approaches. The Volkswagen Foundation’s funding initiative
  'Experiment!' tries to pave the way for fundamentally new research topics even though
  the outcome may be contingent. A concept failure as well as unexpected findings
  are an acceptable result.
