comments: The program provides awards for research by fellows or junior faculty related
  to child health promotion, health services research, teaching, or patient care.
  Projects must be consistent with the goals of the APA. Proposals submitted should
  address an important area of concern for the health or healthcare of children or
  adolescents. The awards will be one-time awards; multiple-year funding requests
  will not be considered. Preference will be given to those proposals that have the
  potential to lead to projects of a larger or longer-term nature. Up to $10,000 or
  $15,000 (depending upon the specific program).
