comments: 'LIMITED SUBMISSION (limit 1 application total from JHU): The intent is
  to support creative scientists who are starting their careers in diabetes research,
  or who are already established in another field but want to expand their focus to
  diabetes research. The Pathway Program will support innovative basic, clinical,
  translational, epidemiological, behavioral, or health services research relevant
  to any diabetes type, diabetes-related disease state, or diabetes complication.
  The American Diabetes Association seeks exceptional candidates from a broad range
  of disciplines, including medicine, biology, chemistry, engineering, physics, and
  mathematics. 3 types:  Diabetes Research Career Initiator Award (postdoctoral fellow
  or research fellowship) OR Diabetes Research Accelerator Award (early and established
  investigators; may currently hold independent NIH funding (K or R award, including
  an initial NIH R01) but must not have applied for, or received, an NIH R01 renewal
  or a second R01 award) OR Diabetes Research Visionary Award (established faculty
  positions and have not previously received national grant support (NIH, NIDDK, ADA,
  JDRF, etc.), as either a PI or Co-PI, in diabetes or diabetes-related research).
  $1,625,700 over five years for Accelerator Award.'
