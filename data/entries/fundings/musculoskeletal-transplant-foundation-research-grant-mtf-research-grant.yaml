comments: The objective of the OREF/Musculoskeletal Transplant Foundation (MTF) Research
  Grant is to provide seed money for a new investigator conducting research in the
  science of biologic - reconstruction, bone regeneration, transplantation-allografts,
  and including stem cells for grant transplantation.  Clinical relevance must be
  clearly noted in the abstract and specific aims, and be explicit in both the project
  title and the study design.  The principal investigator or the co-principal investigator
  must be an orthopaedic surgeon.  Funds may not be used for salary.  Applications
  for projects of a clinical or basic science nature will be accepted. OREF will fund
  only one Research Grant per institution per year. $98,000 for two years ($49,000
  per year)
