name: Alliance for Cancer Gene Therapy Clinical Translation Grants
description: Candidates must hold an MD, PhD, or equivalent degree and be a tenure-track
  or tenured faculty. The investigator must be conducting original research as an
  independent faculty member. ACGT has no citizenship restrictions. However, research
  supported by the award must be conducted at medical schools and research centers
  in the United States and Canada. Continued support is contingent upon submission
  and approval of a non-competitive renewal application each year.
