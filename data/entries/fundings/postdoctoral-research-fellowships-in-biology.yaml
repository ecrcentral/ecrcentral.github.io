name: Postdoctoral Research Fellowships in Biology
description: The Directorate for Biological Sciences (BIO) awards Postdoctoral Research
  Fellowships in Biology (PRFB) to recent recipients of the doctoral degree for research
  and training in selected areas supported by BIO and with special goals for human
  resource development in biology.  The fellowships encourage independence at an early
  stage of the research career to permit Fellows to pursue their research and training
  goals in the most appropriate research locations regardless of the availability
  of funding for the Fellows at that site.
