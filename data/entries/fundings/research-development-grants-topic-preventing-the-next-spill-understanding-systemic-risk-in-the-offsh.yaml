comments: 'This funding opportunity seeks proposals for projects that break new ground
  in improving the capabilities of communities in coastal regions adjacent to the
  U.S. Outer Continental Shelf to successfully plan for, mitigate, and adapt to environmental
  change–specifically in the context of how these changes may affect or be affected
  by offshore oil and gas operations. Grants will support exploratory activities that
  develop and test new approaches, technologies, and methods, or bring novel or non-traditional
  perspectives to relevant research and its application. Applicants are strongly encouraged
  to engage end-users—including decision makers, community leaders, and organizations
  that work at the interface between science and policy—in activities to move research
  findings into practice. Exploratory Grants: These grants will support projects that
  seek to break new ground to address an old or a new problem through innovation.
  By innovation, we mean the development of new approaches, technologies, or methods
  and/or the application of new expertise through the engagement of novel, non-traditional
  disciplinary or cross-sectoral perspectives. Responsive grants could include research,
  methods development, or approaches for translating or applying scientific evidence
  to decision making. These grants are modeled on the National Science Foundation’s
  EArly concept Grants for Exploratory Research (EAGER). They are not intended for
  incremental research in well-studied areas.'
