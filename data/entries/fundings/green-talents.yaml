name: Green Talents — International Forum for High Potentials in Sustainable Development
description: The Green Talents programme by the German Federal Ministry of Education
  and Research (BMBF) promotes international exchange of ideas in sustainable development.
  Outstanding master's and PhD students and recent graduates in sustainability research
  are invited to a Science Forum in Germany and receive a BMBF-funded research stay
  of up to 3 months at a German institution. Open to non-German citizens not residing
  in Germany.
