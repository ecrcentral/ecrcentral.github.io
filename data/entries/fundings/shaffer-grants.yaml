comments: Founded in 1978, the San Francisco-based Glaucoma Research Foundation was
  created to encourage innovative research aimed at finding better ways to care for
  people with glaucoma — the leading cause of preventable blindness. Through its Shaffer
  Grants program, the foundation will award one-year grants of $40,000  in support
  of innovative  clinical, epidemiological, and laboratory research projects. Grants
  will not support equipment costs exceeding $12,000, salaries for principal investigators
  and co-investigators, projects with overt commercial applications, lab supplies,
  or indirect costs.
