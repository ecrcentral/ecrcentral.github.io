comments: The IDSA Education and Research Foundation and the National Foundation for
  Infectious Diseases have joined forces to offer awards to support needed research
  by promising young researchers who may not otherwise find funding as federal and
  other institutional research support becomes more difficult to obtain. Sponsored
  by The Atlantic Philanthropies (USA) Inc. and the John A. Hartford Foundation, this
  award provides funding for young investigators who develop and implement a basic,
  clinical, or health services research project focused on a geriatric aspect of infectious
  diseases. Applicants must have applied for the GEMSSTAR award and received a fundable
  score as defined by the National Institutes of Health. The award is administered
  by IDSA and the Alliance for Academic Internal Medicine (AAIM)/Association of Specialty
  Professors (ASP). (1) Two-year award of $200,000 ($150,000 research grant from National
  Institute of Aging and $50,000 career/professional development award from IDSA/AAIM/ASP)
