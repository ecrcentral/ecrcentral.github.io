comments: The Center for Retirement Research at Boston College sponsors the annual
  Steven H. Sandell Grant Program for scholars in the field of retirement research
  and policy. The program provides opportunities for junior scholars from all academic
  disciplines to pursue cutting-edge projects on retirement income issues. Priority
  areas include Social Security; macroeconomic analyses of Social Security; wealth
  and retirement income; program interactions; international research; and demographic
  research. Up to five grants of $45,000 each will be awarded in 2017. Grant recipients
  may be required to present their work to the Social Security Administration in Washington,
  D.C., or Baltimore.
