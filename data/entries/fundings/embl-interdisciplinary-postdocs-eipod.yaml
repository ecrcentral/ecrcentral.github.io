name: EMBL Interdisciplinary Postdocs (EIPOD)
description: EIPOD4 is a new international postdoctoral fellowship programme co-funded
  by Marie-Skłodowska Curie Actions  (grant agreement number 847543). Designed to
  support the increasing diversity of career paths in Europe’s research landscape
  the programme offers three tracks for fellows to choose from based on their research
  interests and career aspirations.  The academic track is designed for fellows largely
  interested in pursuing a classical academic career. The industry track supports
  interdisciplinary research projects involving an industry partner or applied research
  projects. The clinical track targets MD/PhDs who aspire to work as physician scientists
  and fellows with a strong interest in biomedical research.
