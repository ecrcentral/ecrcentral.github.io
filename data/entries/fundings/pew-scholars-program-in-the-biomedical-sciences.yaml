name: Pew Scholars Program in the Biomedical Sciences
description: Based on their performance during their education and training, candidates
  should demonstrate outstanding promise as contributors in science relevant to human
  health. This program does not fund clinical trials research. Strong proposals will
  incorporate particularly creative and pioneering approaches to basic, translational,
  and applied biomedical research. Candidates whose work is based on biomedical principles
  but who bring in concepts and theories from more diverse fields are encouraged to
  apply.
