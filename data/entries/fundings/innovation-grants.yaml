name: Innovation Grants
description: Alex’s Lemonade Stand Foundation (ALSF) is committed to creating opportunities
  for new and innovative research into treatments and cures for childhood cancers.
  Innovation grants are designed as seed funding for researchers with a novel approach
  to pediatric oncology scientific investigation. This may represent a change in research
  direction and/or an innovative new idea that moves away from an investigator’s prior
  research but for which a strong case is made for the potential impact on childhood
  cancers.
