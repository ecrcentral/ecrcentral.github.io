comments: Through its Innovation Grants program, the foundation awards two-year grants
  of up to $250,000 to researchers with a novel approach to pediatric oncology scientific
  investigation. That can include a change in research direction and/or an innovative
  new idea that moves away from an investigator's prior research but has potential
  impact for childhood cancers. Innovation Grants will support research proposals
  to be carried out by investigators who are already established, have a track record
  of peer-reviewed publications, and can demonstrate evidence of having successfully
  competed for extramural funding.
