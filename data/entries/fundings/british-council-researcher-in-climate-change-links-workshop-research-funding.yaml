name: British Council Researcher in Climate Change Links Workshop & Research Funding
description: "Topic : Climate Resilience of Micro, Small & Medium Industrial Workplaces\
  \ \r\n\r\nUnder the Researcher Links Climate Challenge Workshops scheme funded by\
  \ the British Council, the University College London and American University in\
  \ Cairo will be holding a virtual workshop & funding projects for ECRs in the UK\
  \  & Egypt on the above theme from 1st June -3rd June 2021. \r\n\r\nThere will be\
  \ a focus on building up links for future collaborations and participants selected\
  \ on the basis of their research potential and ability to build longer term links,\
  \ will be able to apply for challenge prizes to further their research.\r\n\r\n\
  To apply, please use the online application form, which can be accessed at https://forms.gle/RDDqQeWWvByRVFEE9\
  \ before the deadline noted below. For more details on the initiative, including\
  \ on the workshop structure, eligibility and requirements see the website below"
