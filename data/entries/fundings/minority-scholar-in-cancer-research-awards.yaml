comments: "Candidates must be full-time graduate students, medical students, residents,\
  \ or clinical or postdoctoral fellows.\r\nOnly minority groups that have been defined\
  \ by the National Cancer Institute as being traditionally underrepresented in cancer\
  \ and biomedical research are eligible for this award: African-Americans, Alaskan\
  \ Natives, Hispanics, Native Americans and Native Pacific Islanders.\r\nCandidates\
  \ must be citizens or permanent residents of the United States or Canada.\r\nCandidates\
  \ must be the presenters of meritorious abstracts at the AACR Annual Meeting or\
  \ special conferences.\r\nCandidates need not be members of the AACR to apply for\
  \ this award."
