name: The Nancy Weiss Malkiel Scholars Award
description: The Nancy Weiss Malkiel Scholars Award Program supports junior faculty
  whose research focuses on contemporary American history, politics, culture, and
  society, and whose service addresses the need for a more inclusive, responsive academic
  culture on their campus for peers and students. Eligible applicants must be tenure-track
  faculty who have passed their third-year review or their institution’s equivalent.
