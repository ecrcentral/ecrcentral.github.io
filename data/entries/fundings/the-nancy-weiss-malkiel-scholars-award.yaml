comments: The Nancy Weiss Malkiel Scholars Award is supported by the Andrew W. Mellon
  Foundation and administered by the Woodrow Wilson National Fellowship Foundation.
  The Malkiel Scholars Award offers a $17,500 stipend—$10,000 to be used for summer
  research support and $7,500 for research assistance during the academic year. The
  award is structured to free the time of junior faculty who have passed their midpoint
  tenure review—including those from underrepresented groups and others committed
  to eradicating disparities in their fields—so that they can both engage in and build
  support for systems, networks, and affinity groups that make their fields and campuses
  more inclusive.
