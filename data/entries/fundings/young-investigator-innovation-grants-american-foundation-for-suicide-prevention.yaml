comments: Grants support studies that aim to increase understanding of the causes
  of suicide and factors related to suicide risk or that test treatments and other
  interventions designed to prevent suicide. Grants awarded to investigators at or
  below the level of assistant professor. These grants must allocate $10,000 ($5,000
  per year) of their award for an established suicide researcher to mentor the Young
  Investigator. AFSP is available to assist you in identifying a suitable mentor.
  The mentor’s fee of $5,000 per year ($10,000 total over 2 years) can be waived,
  but cannot be used to increase the budget for the Young Investigator’s research
  beyond the allowable maximum of $80,000.
