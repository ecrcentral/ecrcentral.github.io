name: EUTOPIA-SIF Post-Doctoral Fellowship – Call for applications 2023/2023
description: 'The EUTOPIA European University is pleased to announce the opening of the second call for 25 post-doctoral fellowships within the EUTOPIA Science and Innovation Fellowships Program (EUTOPIA-SIF) co-funded by the European Union''s Horizon 2020 research and innovation programme under the Marie Sklodowska-Curie grant agreement No 945380. NOTA BENE: ELIGIBLE UNIVERSITIES Although the EUTOPIA Alliance was recently expanded to encompass a total of 10 European universities, the EUTOPIA-SIF programme runs on a separate grant, and only the following 6 universities are eligible to host or co-host SIF fellows: Vrije Universiteit Brussel, CY Cergy Paris University, University of Gothenburg, University of Ljubljana, Pompeu Fabra University-Barcelona, The University of Warwick. The 4 new members of the Alliance are not eligible as host or co-host of the applicants. Starting in September 2023, fellows will be awarded a post-doctoral position for 24 months in one of the six EUTOPIA universities (https://eutopia-university.eu), including the Vrije Universiteit Brussel, the CY Cergy Paris Université, the University of Gothenburg, the University of Ljubljana, the University Pompeu Fabra and the University of Warwick, with attractive salaries covering their costs of living, and an additional budget for research and travel expenses. EUTOPIA-SIF fellows will be formally employed by the EUTOPIA partner university they have chosen as their host organization, and co-hosted by a second EUTOPIA university for a secondment period. Host and co-host institutions must be chosen by the fellows, as well as the research groups in which they wish to realize the fellowship at the host university, at the time of application. Two compulsory secondments will allow EUTOPIA-SIF fellows to take full advantage of the EUTOPIA research environment: - The upmentioned internal secondment at another EUTOPIA university allowing for an extensive research mobility within the EUTOPIA network; - An external secondment with leading international institutions or major industrial and institutional partners of EUTOPIA universities . Applications are welcome from all disciplines, including Science, the Social Sciences, the Humanities and Art, in connection with the following 5 Key Research Areas, with particular encouragement for interdisciplinary approaches: • Materials Engineering; • Data & Intelligence; • Health; • Sustainability; • Welfare & Inclusion. We therefore ask you to consider this opportunity for yourself and/or to pass it on to colleagues to whom this call might be of interest. Application requirements: • Holding a PhD or at least 4 years of full-time equivalent research experience. Doctoral degree or equivalent experience should have been completed at the date of the Call deadline. • Not having a permanent position at the moment of recruitment. • Not to have resided or carried out their main activity (work, studies, etc.) in the country of the selected primary host universities (EUTOPIA university recruiting the EUTOPIA-SIF fellow) for more than 12 months in the 3 years prior to the call deadline. The mobility rule need not apply to hosts of secondments. Application procedure: Full application (and optional pre-application) for the EUTOPIA-SIF programme must be submitted online via the dedicated application platform www.eutopia.smapply.io, choosing EUTOPIA Science & Innovation Fellowship COFUND Programme. Application timeline:  The submission of full applications will open on 15 September 2022.  The submission of full application will close on 15 December 2022  An optional pre-application stage will be available to help candidate find a host research group from 15 September to 06 October 2022, 13:00 CET. Application content: Applicants must submit the following compulsory application content: • Detailed CV of the candidate (section within the application platform "Personal Information" and "Academic experience"), and a CV in pdf version using the dedicated template available on the application platform. • Choice of Key Research Area(s): They must select at least one Key Research Area relevant for their research proposal; • Choice of hosting institutions and research group(s): freely chosen among the six universities of the programme. • Research proposal (mandatory template to be used, available on the application platform); • Personal statement (maximum 2 pages – use of Times New Roman font and minimum size 11-no template; • Support Letter from at least one hosting research group, signed by the head of the prospective Research group; • Reference letters: two letters must be requested from referees chosen by the candidate via the application platform assessing the applicant''s previous research activities, research capacity and work experience. • Ethics declaration – checklist provided in the research proposal template to identify ethical matters relating to their research project; • Copy of PhD certificate, accompanied with a non-certified English translation if the initial document is not in English OR proof of 4 years of equivalent research experience (mandatory template to be used, available on the application platform). Once you have registered and logged into the system, the application can be edited until submission. All steps must be filled in and files uploaded. After submission, the application can no longer be edited, and it is only possible to view the application. Only one proposal per researcher may be submitted to this call. Only applications that are complete and submitted before the application deadline via the online platform will be considered. Selection procedure: • Eligibility check • Assessment of the relevance of the research project • Review Panel: ranking and shortlisting • Interview Panel: ranking and shortlisting • Final ranking For more information on the application requirements, procedures and call-related details, please refer to the Guide for Applicants, available on the EUTOPIA-SIF programme website. Two webinars will be organized for potential candidates. Please refer to the EUTOPIA-SIF programme website for more information.'
