comments: 'About the programme: The EUTOPIA European University is an ambitious alliance
  of six like-minded European universities: CY Cergy Paris Université (France), the
  Universitat Pompeu Fabra (Spain), the Vrije Universiteit Brussel (Belgium), the
  Göteborgs Universitet (Sweden), the Univerza v Ljubljani (Slovenia) and the University
  of Warwick (United Kingdom). It was awarded an Erasmus+ ‘European Universities’
  pilot project in 2019. Its core mission is to promote a connected and inclusive
  academic community, addressing global and local challenges, advancing excellence,
  inclusion, impact and innovation. Scientific excellence, research collaboration
  and mobility of academics among the partner universities are core objectives of
  EUTOPIA. The EUTOPIA Science and Innovation Fellowships Programme (EUTOPIA-SIF)
  is an international post-doctoral fellowship programme co-funded by the H2020 MSCA-COFUND
  scheme and the six partner institutions of EUTOPIA. Its vocation is to train the
  next generation of high-profile scientists b'
