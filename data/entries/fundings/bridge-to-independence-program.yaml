comments: Grants awarded through the Bridge to Independence Award program are intended
  to invest in the next generation of top autism investigators by identifying talented
  early-career scientists interested in autism research and facilitating their transition
  to an independent research career. This request for applications (RFA) is aimed
  at senior postdoctoral fellows who intend to seek tenure-track faculty positions
  during the 2018–19 academic year. After the Simons Foundation accepts the approval
  application, the finalist will become a grantee and receive a commitment of $150,000
  per year over three years, awarded through their faculty appointment institution.
