comments: The Scleroderma Foundation seeks applications from promising new investigators
  who hold faculty or equivalent positions and who wish to pursue a career in research
  related to scleroderma. This grant supports promising research that is likely to
  lead to individual research project grants. Applicants must have a doctoral degree
  in Medicine, Osteopathy, Veterinary Medicine or one of the sciences; and must have
  completed a postdoctoral fellowship by the grant award date. Applicants who have
  been a principal investigator on grants from the Scleroderma Foundation or other
  national, private or government agencies other than fellowship grants are not eligible
  for this award. Up to $50,000 for three years ($150,000 max total)
