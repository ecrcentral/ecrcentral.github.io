name: Constructive Advanced Thinking -  short stays and research visits
description: CAT helps groups of 3 to 5 individuals, headed by an early-career researcher
  of any discipline, and possibly including PhD students, to work on their project
  for a duration up to 3 years. In order to enable them to engage in conversations
  and mature their ideas, the groups are given the opportunity to meet for short stays
  (i.e. maximum two weeks) in the participating institutes, and to be put in contact
  with the local fellows and research communities.
