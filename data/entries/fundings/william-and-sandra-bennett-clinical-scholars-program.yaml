comments: The goal of the annual program is to produce the next generation of clinician-educators
  by enabling applicants to improve their teaching skills through the acquisition
  of education tools and support for projects aimed at advancing any aspect of nephrology
  education and teaching. To that end, grants of $100,000 over two years will be awarded
  in support of projects that examine any aspect of pre-doctoral or postdoctoral nephrology
  education. In addition, projects should propose to generate new knowledge and have
  an impact beyond the applicant's institution. Examples of proposed projects can
  include but are not limited to curricular reform, innovations in education, new
  education methods, evaluation of new assessment tools for competency-based learning
  and assessment, or professional development. The project proposal must include appropriate
  metrics for evaluation, implementation, and dissemination.
