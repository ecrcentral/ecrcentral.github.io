name: Research Grants from the Cystic Fibrosis Foundation
description: Research Grants are intended to encourage the development of new information
  that contributes to the understanding of the basic etiology and pathogenesis of
  CF. In addition, consideration will be given to those projects that provide insight
  into the development of information that may contribute to the development of new
  therapies for CF.
