comments: All proposals must be hypothesis driven, and sufficient preliminary data
  must be provided to justify support from the Cystic Fibrosis Foundation.  Information
  derived from such studies will hopefully lead to submission to other funding agencies,
  such as the National Institutes of Health (NIH).  Support is available for $125,000
  per year (plus 12% for indirect costs) for a period of two years, at which time
  a grant may be competitively renewed for an additional year of funding.
