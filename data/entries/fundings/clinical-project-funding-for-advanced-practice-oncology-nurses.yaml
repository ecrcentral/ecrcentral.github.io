comments: 'Purpose: To provide support for a clinical project (e.g. EBP or QI) conducted
  by advanced practice oncology nurses with a MSN or DNP for the purpose of facilitating
  innovative solutions to the challenges of delivering patient-centered, evidenced
  based and accessible care. Projects must utilize existing evidence for implementation
  into practice. Objectives: To support professional development of the APN or DNP
  in oncology through clinically-based projects (e.g. EBP, QI). To support implementation
  of patient-centered, evidence based practice in oncology care that promote practice
  or system changes and improves patient and or organizational outcomes. Eligibility:
  Graduate of an MN, MSN, or DNP program & currently practicing in an APN role. Up
  to $5,000 per year for two years as long as progress is made on the project after
  one year.'
