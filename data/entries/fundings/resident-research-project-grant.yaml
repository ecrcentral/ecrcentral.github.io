comments: The objective of the OREF Resident Clinician Scientist Training Grant is
  to prepare residents for a career with research as a major component.  Clinical
  relevance must be clearly noted in the abstract and specific aims and be obvious
  from the title and the study design.  Grants of up to $20,000 for one year will
  be considered for orthopaedic surgery residents or fellows completing an orthopaedic
  fellowship in approved orthopaedic programs to cover research expenses, but not
  salary.  The work should clearly be achievable by the resident as a free-standing
  project even when it is a part of a larger work, and it should potentially lead
  to publication with the resident as an author.  Both laboratory and clinical projects
  (e.g., outcome studies) are suitable, but in either case clinical relevance must
  be explicitly and clearly described.
