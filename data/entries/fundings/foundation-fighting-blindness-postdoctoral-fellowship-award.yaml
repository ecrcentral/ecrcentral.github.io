name: FFB Postdoctoral Fellowship Award
url: https://www.fightingblindness.org/postdoctoralfellowshipaward
description: 'Supports postdoctoral fellows pursuing innovative research on inherited
  retinal degenerations (IRD) and dry age-related macular degeneration (dAMD). Fellows
  work closely with mentors to foster professional development and long-term collaborations.
  Applications follow a two-stage process: a Letter of Intent followed by a full application
  by invitation only. Institutions eligible include universities, medical schools, hospitals,
  research institutes, and non-profit laboratories, both domestic and international.
  Individuals from underrepresented racial, ethnic, and gender groups, and individuals
  with disabilities, are encouraged to apply.'
