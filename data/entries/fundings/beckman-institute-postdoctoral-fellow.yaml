name: Beckman Institute Postdoctoral Fellow
description: The Beckman Institute Postdoctoral Fellows Program is intended for recent
  Ph.D. recipients or students in their final year of doctoral study with research
  interests relevant to the Beckman Institute. Four to six fellows are selected annually
  for terms of up to three years. The Arnold and Mabel Beckman Foundation established
  this program in 1991 to recruit outstanding scientists to work at the Beckman Institution.
