comments: Designed to recognize the importance of clinical investigation in vascular
  disease, the new program is designed to encourage the interest and development of
  SVS-member clinical investigators, particularly junior members or those with limited
  prior experience as principal investigators; and to provide direct support for pilot
  clinical projects that have potential to develop into larger studies fundable by
  industry or governmental sources. Eligible research projects must be clinical, preferably
  patient-oriented (i.e., research conducted with human subjects or on material of
  human origin such as tissues, specimens, and cognitive phenomena for which an investigator
  directly interacts with human subjects).  Grants of up to $15,000 will be awarded
  for direct costs for a one-year period.
