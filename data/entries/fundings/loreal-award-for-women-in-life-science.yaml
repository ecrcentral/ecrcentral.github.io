name: L’Oreal award for women in life science
description: "The National and Regional Fellowships:\r\n\r\nEvery year, the Fondation\
  \ L’Oréal awards almost 280 Fellowships to female PhD students and Post-Docs across\
  \ 115 countries at a time when multiple obstacles arise to threaten their careers.\
  \ \r\n\r\nThe International Fellowships: \r\n\r\nEvery year, 15 outstanding young\
  \ researchers are identified as the future of science among the winners of the 280\
  \ Fellowships awarded worldwide. These Rising Talents receive an additional grant,\
  \ thus giving them greater visibility among the international scientific community.\r\
  \n\r\nThese young researchers come from different regions of the world: Africa and\
  \ Arab States, Asia-Pacific, Europe, Latin America and North America. They have\
  \ already made significant contributions to research in very varied disciplines."
