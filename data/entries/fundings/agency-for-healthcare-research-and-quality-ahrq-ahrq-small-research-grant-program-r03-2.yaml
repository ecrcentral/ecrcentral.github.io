comments: This FOA encourages Small Research Grant (R03) applications, and expresses
  AHRQ priority areas of interest for ongoing small research projects. The R03 grant
  mechanism supports different types of health services research projects including
  pilot and feasibility studies; secondary analysis of existing data; small, self-contained
  research projects; development of research methodology; and development of new research
  technology. The AHRQ small grant is a mechanism for supporting discrete, well-defined
  projects that realistically can be completed within two years (or less) within the
  budget constraints of the mechanism. Appropriate justification for the proposed
  work can be provided through literature citations, data from other sources, or from
  investigator-generated data. Preliminary data are not required, particularly in
  applications proposing pilot or feasibility studies. The budget limit on small project
  grant applications is $100,000 total costs.
