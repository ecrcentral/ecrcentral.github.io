name: New York University’s Provost's Postdoctoral Fellowship Program
description: New York University’s Provost's Postdoctoral Fellowship Program was created
  to attract and support a wide range of brilliant young scholars and educators from
  diverse backgrounds whose research experience, life experience, and employment background
  can significantly contribute to academic excellence. The program provides fellows
  with faculty mentoring, professional development, and academic networking opportunities.
  The ultimate goal of the program is for participants to join the ranks of faculty
  at competitive institutions.
