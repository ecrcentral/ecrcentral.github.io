comments: 'The overall objective of the Research Scholar Award (RSA) is to enable
  young investigators, instructors, research associates or equivalents to develop
  independent and productive research careers in digestive diseases by ensuring that
  a major proportion of their time is protected for research. Candidates for this
  award must hold an MD, PhD or equivalent degree (e.g. MB, ChB, MBBS, DO) and a full-time
  faculty position at a North American institution. Candidates research must be conducted
  at a North American institution. AGA Membership is required at the time of application
  submission. The award will support young faculty (not fellows) who have demonstrated
  exceptional promise and have some record of accomplishment in research. Candidates
  should be in the beginning years of their careers; therefore, established investigators
  are not appropriate candidates. MD applicants: no more than seven years shall have
  elapsed following the completion of clinical training (GI fellowship or its equivalent)
  and the start date of this award. PhD applicants: no more than seven years shall
  have elapsed following the awarding of your PhD and the start date of this award.
  This award provides $90,000 per year for three years (total $270,000) to young investigators,
  instructors, research associates or equivalents working toward independent careers
  in gastroenterology, hepatology or related areas.'
