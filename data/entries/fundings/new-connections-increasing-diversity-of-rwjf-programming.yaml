comments: 'The Robert Wood Johnson Foundation has issued a Request for Proposals for  its
  New Connections: Increasing Diversity of RWJF Programming, an annual initiative
  aimed at increasing diversity across the foundation’s research network and programming.
  Now in its tenth year, the initiative is designed to introduce early-career researchers
  to the foundation and expand the diversity of perspectives that inform RWJF programming
  through grantmaking, mentorship, career development, and networking. Researchers
  in the program are expected to transcend disciplines (health, health care, the social
  sciences, business, urban planning, architecture and engineering); work to build
  the case for a Culture of Health with strong qualitative and quantitative research
  skills; and produce and translate timely research results. Of the grants awarded
  in this funding round, as many as two will be designated for New Connections-Policies
  for Action awards in support of projects designed to inform the significant gaps
  in knowledge with respect to policies that can serve as levers to improve population
  health and well-being and achieve greater levels of health equity.  In 2016, the
  foundation will award up to seventeen grants of up to $50,000 (over 1 year) through
  the program.'
