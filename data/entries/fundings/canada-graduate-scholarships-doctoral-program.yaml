description: The objective of the Canada Graduate Scholarships - Doctoral (CGS D)
  program is to promote continued excellence in Canadian research by rewarding and
  retaining high-calibre doctoral students at Canadian institutions. By providing
  support for a high-quality research training experience to awardees, the CGS D program
  strives to foster impacts within and beyond the research environment.
