  \ 'Trebuchet MS', sans-serif;\"><u></u>&nbsp;<u></u></span></p>\r\n<p class=\"MsoNormal\"\
  \ style=\"margin: 0px; caret-color: #222222; color: #222222; font-family: Arial,\
  \ Helvetica, sans-serif;\"><span lang=\"EN-GB\" style=\"font-size: 12pt; font-family:\
  \ 'Trebuchet MS', sans-serif;\">One important part of the Congress is the &ldquo;PRE-CONGRESS\
  \ PhD COURSE&rdquo;, scheduled immediately prior to the start of the Congress (18\
  \ and 19 August). This Course, which belongs to the tradition of ICOMST Congresses,\
  \ is intended to provide young Researchers with the opportunity of meeting and learning\
  \ from international experts in the field, during an intense 2-days Course.<u></u><u></u></span></p>\r\
