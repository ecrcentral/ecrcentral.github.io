  \ font-family: Arial, Helvetica, sans-serif;\"><span lang=\"EN-GB\" style=\"font-size:\
  \ 12pt; font-family: 'Trebuchet MS', sans-serif;\">The program is being developed\
  \ and we can provide with further information in the nearest future; there is no\
  \ registration fee, but a selection will be done among those who will apply for\
  \ the Course.</span></p>\r\n<p class=\"MsoNormal\" style=\"margin: 0px; caret-color:\
  \ #222222; color: #222222; font-family: Arial, Helvetica, sans-serif;\">&nbsp;</p>\r\
  \n<p class=\"MsoNormal\" style=\"margin: 0px; caret-color: #222222; color: #222222;\
  \ font-family: Arial, Helvetica, sans-serif;\"><span lang=\"EN-GB\" style=\"font-size:\
  \ 12pt; font-family: 'Trebuchet MS', sans-serif;\">Please note that the Course registration\
  \ will be funded and free of any expense.</span></p>"
