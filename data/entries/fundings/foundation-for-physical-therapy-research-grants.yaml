comments: Grants of up to $40,000 will be awarded in support of research projects
  within any discipline relevant to physical therapy aimed at  evaluating the effectiveness
  of physical therapist interventions. Studies should seek to evaluate the clinical
  effectiveness of therapeutic interventions; assess the interaction between patient
  characteristics and therapeutic methods; explore the scientific basis for interventions
  used in physical therapy; and/or address an item identified in the APTA Research
  Agenda. Priority will be given to studies that have direct application to the practice
  of physical therapy; that address the need for measurable outcomes; that ask a new
  question important to intervention or its validation; and/ or that address a previously
  asked question with a new methodology, different sampling strategy, or  different
  form of analysis. FPT supports only those intervention studies in which the interventions
  are provided by physical therapists, or selected components of the interventions
  are provided by physical therapist assistants, under the direction and supervision
  of physical therapists.
