comments: This request for proposals (RFP) is offered by the When Everyone Survives
  Foundation (WES Foundation) to solicit innovative research in leukemia. Grants of
  $50,000 for one year are offered to new and established investigators who are requesting
  support for laboratory, translational, or clinical research related to acute leukemia.
  The When Everyone Survives Foundation is supporting leukemia research because it
  recognizes that significant advances in the understanding, diagnosis, and treatment
  of leukemia are needed to achieve the goal of “when everyone survives”.  Renewal
  of initial research support may be considered for one or more additional years based
  upon productivity.
