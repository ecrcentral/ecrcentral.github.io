comments: George C. Cotzias, MD was a pathfinder in the pharmacologic exploration
  of brain functions and in the treatment of Parkinson's disease with levodopa. His
  work stimulated much of the current interest and research on neurological movement
  disorders. The American Parkinson Disease Association has established the Cotzias
  fellowship, in honor of his memory, to stimulate neurologists to follow his leadership.
  The goal of the Cotzias fellowship is to assist promising young neurologists in
  establishing careers in research, teaching and clinical services relevant to the
  problems, causes, prevention, diagnosis and treatment of Parkinson's disease and
  related neurological movement disorders. This is a fellowship of $80,000 per year
  for three years, not renewable. ($240,000 total)
