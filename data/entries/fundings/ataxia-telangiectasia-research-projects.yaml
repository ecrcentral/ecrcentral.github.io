comments: The A-T Children's Project strives to assist respected scientists in developing
  a clearer understanding of ataxia-telangiectasia and is determined to find a timely
  cure, or life-improving treatments, for this serious disease. To that end, grants
  of up to $150,000 over two years will be awarded  in support of basic and translational
