comments: Microbes inhabit and sustain all habitats on Earth. In the oceans, microbes
  capture solar energy, catalyze biogeochemical transformations of important elements,
  produce and consume greenhouse gases, and provide the base of the food web. The
  purpose of the program is to help launch the careers of outstanding investigators
  who use quantitative approaches to advance our understanding of marine microbial
  ecology and evolution. Investigators with backgrounds in different fields or with
  an interest in modeling or theory are encouraged to apply. Grants will be for $180,000
  a year for a period of three years.
