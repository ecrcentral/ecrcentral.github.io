comments: The annual program provides previously funded Doris Duke investigators the
  opportunity to foster the next generation of clinical researchers by mentoring a
  medical student for a year. Through the program, past and present principal investigators
  on medical research grants from DDCF identify a medical student to mentor for a
  year and then apply with that student as a team. Alternatively, medical students
  identify a qualifying DDCF principal investigator and apply together. In either
  case, the DDCF principal investigator must be the applicant. Each mentee must be
  willing to take twelve months out from medical school, typically after the third
  year of school. Teams will receive $70,400 over a year, inclusive of a $30,000 stipend
  for the student. The student's year out will start in the summer of 2017 and end
  in the summer of 2018. DDCF expects to make awards to ten mentor/mentee teams in
  2017.
