comments: The objective of the NCI Mentored Research Scientist Development Award (K01)
  is to enhance the diversity of the NCI-funded research workforce by supporting eligible
  individuals from groups that have been shown to be underrepresented in the biomedical,
  behavioral, social, and clinical sciences. This funding opportunity announcement
  (FOA) provides salary and research support for a sustained period of protected time
  for intensive research career development under the guidance of an experienced mentor,
  or sponsor. The expectation is that through this sustained period of research career
  development and training, awardees will develop enhanced research capabilities for
  cancer research careers and be better prepared to compete for research project grants
  (e.g. R03, R21, or R01) funding. NIH will contribute $100,000 per year toward the
  salary of the career award recipient and $30,000 per year toward the research development
  costs of the award recipient. Award up to 5 years.
benefits: "NIH will contribute up to $ 100,000 per year toward the salary of the career\
  \ award recipient. Further guidance on budgeting for career development salaries\
  \ is provided in the SF424 (R&R) Application Guide.  \r\n\r\nNIH will contribute\
  \ $30,000  per year toward the research development costs of the award recipient,\
  \ which must be justified and consistent with the stage of development of the candidate\
  \ and the proportion of time to be spent in research or career development activities."
