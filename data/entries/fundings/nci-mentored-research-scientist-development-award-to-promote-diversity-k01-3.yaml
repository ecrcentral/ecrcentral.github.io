name: NCI Mentored Research Scientist Development Award to Promote Diversity (K01)
description: "The purpose of the NCI Mentored Research Scientist Development Award\
  \ (K01) is to enhance the diversity of the pool of the NCI-funded cancer research\
  \ workforce by supporting eligible individuals from groups that have been shown\
  \ to be nationally underrepresented in the biomedical, behavioral, social and clinical\
  \ sciences. This FOA provides salary and research support for a sustained period\
  \ of \"protected time\" for intensive research career development under the guidance\
  \ of an experienced mentor.\r\n\r\nThe Diversity Training Branch (DTB) of the Center\
  \ to Reduce Cancer Health Disparities (CRCHD), at the National Cancer Institute\
  \ (NCI), invites career development award applications (K01) from individuals from\
  \ backgrounds that have been shown to be nationally underrepresented in health-related\
  \ sciences.\r\n\r\nThis Funding Opportunity Announcement (FOA) is designed specifically\
  \ for applicants proposing to serve as the lead investigator of an independent clinical\
  \ trial, a clinical trial feasibility study, or a separate ancillary study to an\
  \ existing trial, as part of their research and career development. Applicants not\
  \ planning an independent clinical trial, or proposing to gain research experience\
  \ in a clinical trial led by another investigator, must apply to the companion FOA."
