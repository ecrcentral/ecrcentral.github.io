comments: Science Policy Fellowships will contribute to leadership development and
  capacity building by providing recipients with a valuable educational experience
  at the science-policy interface. Fellows will spend one year on the staff of a state
  environmental, natural resources, oil and gas, or public health agency; or regional
  offices of relevant federal agencies in the Gulf region. Fellows will participate
  in and contribute to the state or federal policy-making process. Depending on placement,
  duties are likely to include performing background research, analyzing and synthesizing
  scientific information to support host office activities, writing policy memos,
  and meeting with stakeholders. Up to ten Fellows will be chosen in 2016. Fellows
  who have completed an MA, MS, or MPH degree or who are currently enrolled in a doctoral
  program will receive an annual stipend of $45,000. Fellows who have completed a
  PhD, ScD, MD, or DVM will receive an annual stipend of $55,000. Stipends will be
  paid directly to the fellow in monthly disbursements. Fellowship benefits will also
  include support for professional development activities and professional travel.
