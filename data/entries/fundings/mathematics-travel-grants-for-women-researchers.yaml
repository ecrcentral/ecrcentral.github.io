name: Mathematics Travel Grants for Women Researchers
description: "The Association for Women in Mathematics has administered the NSF-AWM\
  \ Travel Grant Program for Women since 1988, supporting both travel to domestic\
  \ or foreign research conferences and, more recently, longer-term visits with a\
  \ mentor.\r\n\r\nTravel Grants. Enabling women mathematicians to attend conferences\
  \ in their fields provides them a valuable opportunity to advance their research\
  \ activities and their visibility in the research community. Having more women attend\
  \ such meetings also increases the size of the pool from which speakers at subsequent\
  \ meetings may be drawn and thus addresses the persistent problem of the absence\
  \ of women speakers at some research conferences. The Mathematics Travel Grants\
  \ provide full or partial support for travel and subsistence for a meeting or conference\
  \ in the applicant’s field of specialization.\r\n\r\nMentoring Travel Grants. The\
  \ objective of the NSF-AWM Mathematics Mentoring Travel Grants is to help junior\
  \ women to develop a long-term working and mentoring relationship with a senior\
  \ mathematician. This relationship should help the junior mathematician to establish\
  \ her research program and eventually receive tenure. Each grant funds travel, accommodations\
  \ and other required expenses for an untenured woman mathematician to travel to\
  \ an institute or a department to do research with a specified individual for one\
  \ month. The applicant’s and mentor’s research must be in a field which is supported\
  \ by the Division of Mathematical Sciences of the National Science Foundation."
