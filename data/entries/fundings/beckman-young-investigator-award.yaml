name: Beckman Young Investigator Award
description: Projects proposed for the BYI program should be truly innovative, high-risk, and show promise for contributing to significant advances in chemistry and the life sciences. They should represent a departure from current research directions rather than an extension or expansion of existing programs. Proposed research that cuts across traditional boundaries of scientific disciplines is encouraged. Proposals that open new avenues of research in chemistry and life sciences by fostering the invention of methods, instruments and materials will be given additional consideration. The BYI program funds promising young scientists early in their careers who have not yet received a major award from another organization. Proposals that already have substantial funding will not be considered for the BYI award (see eligibility for more information).
