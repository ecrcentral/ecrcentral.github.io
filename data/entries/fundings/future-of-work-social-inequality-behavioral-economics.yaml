comments: Support for innovative social science research that brings new data and
  methods to bear on questions of interest in the foundation’s core programs in Behavioral
  Economics; the Future of Work; Race, Ethnicity, and Immigration; and Social Inequality.
  RSF is especially interested in novel uses of new or under-utilized data and new
  methods for analyzing these data. Smaller projects might consist of a pilot study
  to demonstrate proof-of-concept. Funds may support research assistance, data acquisition,
  data analysis, and investigator time for conducting research and writing up results,
  and the foundation encourages methodological variety and interdisciplinary collaboration.
