name: Swiss Government Excellence Scholarships for Foreign Scholars and Artists
description: Each year the Swiss Confederation awards Government Excellence Scholarships to promote international exchange and research cooperation between Switzerland and over 180 other countries. Recipients are selected by the awarding body, the Federal Commission for Scholarships for Foreign Students (FCS). The Swiss Government Excellence Scholarships are aimed at young researchers from abroad who have completed a master’s degree or PhD and at foreign artists holding a bachelor’s degree.
