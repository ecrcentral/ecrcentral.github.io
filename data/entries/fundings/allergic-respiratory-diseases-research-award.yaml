comments: To encourage and support research on  allergic respiratory disease, the
  American Lung Association and the Allergy Asthma and Immunology Education and Research
  Organization, a supporting organization of the American Academy of Allergy, Asthma
  & Immunology, have teamed up to offer the Allergic Respiratory Diseases Research
  Award. A one-year grant of $75,000 will be awarded in 2017. No more than 25 percent
  of the requested budget may be used for a recipient’s salary and/or fringe benefits
  and no more than 30 percent of the total award budget may be used to fund the purchase
  of permanent equipment. Grant funds may be used for the salary and fringe benefit
  costs of personnel other than the applicant. (Fringe benefit costs may only be expended
  on the stipulation that they not be obtained from another source.)
