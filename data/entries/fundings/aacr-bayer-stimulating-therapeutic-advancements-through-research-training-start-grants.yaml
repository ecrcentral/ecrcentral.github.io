comments: The AACR-Bayer Stimulating Therapeutic Advancements through Research Training
  (START) Grants represent an exciting new initiative to encourage and support academia
  and industry collaborations to effectively harness the wealth of information and
  to advance the discovery and development of new therapies for cancer patients. This
  novel model, which will provide support to postdoctoral or clinical research fellows,
  combines research experiences in both an academic and industry setting. The training
  provided through this grants program will be invaluable to young investigators,
  by allowing fellows to attain a comprehensive research experience that will make
  them highly desirable to potential employers in either academic research or the
  pharmaceutical industry.
