comments: Researchers who have completed their post-doctoral training, and who are
  considered eligible by their institutions to apply for a research grant, are invited
  to apply. Individuals who are currently postdoctoral fellows or the equivalent,
  or who are graduate/medical students or residents, are not eligible for support
  under this program. Applicants are not eligible to apply if they have an existing
  National MS Society pilot research award that expires later than the application
