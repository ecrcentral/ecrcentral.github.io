name: Pilot Grant Program
description: The Society funds high-risk pilot grants to researchers who have completed
  their postdoctoral training to quickly test novel ideas. Funding is provided for
  one year to test innovative, cutting-edge ideas or untested methods, and to gather
  sufficient preliminary data to apply for longer-term funding.
