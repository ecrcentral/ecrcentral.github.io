comments: 'LIMITED SUBMISSION (limit 1 application from JHU): The Blavatnik National
  Awards for Young Scientists recognize the country’s most promising young faculty
  rank scientists and engineers in the disciplinary categories of Life Sciences, Physical
  Sciences & Engineering, and Chemistry. Analytical Chemistry, Biochemistry & Structural
  Biology, Chemical Biology, Chemical Engineering, Environmental Chemistry & Biogeochemistry,
  Green Chemistry, Inorganic & Solid-State Chemistry, Organic Chemistry, Physical
  Chemistry, Polymer Chemistry, Synthetic Chemistry, Theoretical Chemistry. Eligibility:
  Have been born in or after 1974; hold a doctoral degree (PhD, DPhil, MD, DDS, DVM,
  etc.). Currently hold a faculty position at an invited institution in the United
  States. Have made significant research contributions to the Life Sciences, Physical
  Sciences & Engineering, or Chemistry during their independent career as a principal
  investigators. Previously nominated individuals who were not selected as Laureates
  in past Awards cycles may be nominated again. $250,000 in unrestricted funds and  opportunity
  to publish in Annals of the New York Academy of Sciences on the topic for which
  he/she is being honored.'
