comments: 'Awards support early investigators as they establish independence as diabetes
  researchers. Eligible applicants must be full-time independent faculty with less
  than 10 years of research experience since their terminal degree who do not have
  previous or current NIH R01 support. Applicants may not hold concurrent awards of
  similar intent, however they can have completed previous NIH K or other career development
  funding. Eligibility: Faculty up to & including Asst Prof or equivalent, ≤10 years
  research experience beyond terminal degree. $138,000/year for two to four years,
