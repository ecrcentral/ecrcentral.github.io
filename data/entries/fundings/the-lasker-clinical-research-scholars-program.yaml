name: The Lasker Clinical Research Scholars Program
description: "The program supports a small number of exceptional clinical researchers\
  \ in the early stages of their careers to promote their development to fully independent\
  \ positions. Successful candidates are designated as Lasker Clinical Research Scholars.\r\
  \n\r\nLasker Scholars receive a unique combination of NIH funding for clinical research\
  \ for up to 10 years. In the first phase of the program, Scholars will receive appointments\
  \ for 5-7 years as tenure-track investigators within the NIH Intramural Research\
  \ Program with independent budgets. In the second phase, successful Scholars will\
  \ receive up to 3 years of NIH support for their research at an extramural research\
  \ facility; or the Scholar can be considered to remain as an investigator within\
  \ the intramural program."
