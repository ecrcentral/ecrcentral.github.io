comments: 'The Graham Foundation offers two types of grants to individuals: Production
  and Presentation Grants and Research and Development Grants. 1) Production and Presentation
  Grants: Grants of up to $20,000 will be awarded to assist individuals with the production-related
  expenses necessary to take a project from conceptualization to realization and public
  presentation. Such projects include but are not limited to publications, exhibitions,
  installations, films, and new media projects. 2) Research and Development Grants:
  Grants of up to $10,000 will be awarded to assist individuals with seed money for
  research-related expenses such as travel, documentation, materials, supplies, and
  other development costs. A recipient of a Research and Development Grant is eligible
  to apply for a Production and Presentation Grant for the same project once the first
  grant has been satisfied; however, future funding is not guaranteed.'
