name: Medical Research Future Fund
description: The Medical Research Future Fund (MRFF) is a $20 billion long-term investment
  supporting Australian health and medical research. The MRFF aims to transform health
  and medical research and innovation to improve lives, build the economy and contribute
  to health system sustainability. he Government announced a $5 billion, 10-year investment
  plan for the MRFF as part of its 2019–20 Budget. This plan continues our support
  for lifesaving research, gives researchers and industry certainty and direction,
  and reaffirms Australia’s reputation as a world leader in medical research.
