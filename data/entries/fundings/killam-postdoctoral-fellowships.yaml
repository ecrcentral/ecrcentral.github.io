name: Killam Postdoctoral Fellowships
description: Izaak Walton Killam Postdoctoral Fellowships are awarded annually at
  Dalhousie University to recently graduated scholars of superior academic research
  ability in any discipline. Awards are tenable for two years, subject to satisfactory
  progress. The awards are tenable only at Dalhousie University; however, students
  who have received their doctorate from Dalhousie are not eligible. The fellowships
  are valued at up to $55,000 annually including full benefits and a travel allowance
  for transportation to and from Halifax, a one-time research allowance of $3,000
  and a conference travel grant of $1,000.
