comments: The Sturge-Weber Foundation (The SWF) invites proposals for Young Investigator
  Awards and Pilot Research Studies in the USA and abroad that focus on projects related
  to the pathogenesis or treatment of Sturge-Weber syndrome (SWS), Klippel-Trenaunay
  (KT) or Port Wine Stain birthmarks. Up to $30,000 per year for maximum of two years
  in postdoctoral fellowship support (salary stipend and conference allowance) to
  encourage the brightest young minds to enter the field. Applicants must be no more
  than four years out of M.D. or Ph.D. program and work under the supervision of an
  established mentor.
