comments: "Funding is awarded to universities and institutions nationwide for projects\
  \ in research that:\r\n\r\n    Focus on important and emerging areas of research\r\
  \n    Have the potential to develop breakthrough technologies, instrumentation or\
  \ methodologies\r\n    Are innovative, distinctive and interdisciplinary\r\n   \
  \ Demonstrate a high level of risk due to unconventional approaches, or by challenging\
  \ the prevailing paradigm\r\n    Have the potential for transformative impact, such\
  \ as the founding of a new field of research, the enabling of observations not previously\
  \ possible, or the altered perception of a previously intractable problem\r\n  \
  \  Does not focus on clinical or translational research, treatment trials or research\
  \ for the sole purpose of drug development\r\n    Fall outside the mission of public\
  \ funding agencies\r\n    Demonstrate that private philanthropy generally, and the\
  \ W. M. Keck Foundation in particular, is essential to the project’s success"
