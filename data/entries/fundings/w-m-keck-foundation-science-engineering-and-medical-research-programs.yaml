  \nhealth\r\nand\r\ncommunity\r\nservice\r\nprojects\r\nthat\r\nwill\r\nhave\r\n\
  a\r\nsignificant\r\nimpact\r\nin\r\naddressing\r\ncomplex\r\nissues\r\nand\r\nproblems.\r\
  \n\r\nThe Foundation strives to fund endeavors that are distinctive and novel in\
  \ their approach. It encourages projects that are high-risk with the potential for\
  \ transformative impact. \"High-risk\" comprises a number of factors, including\
  \ questions that push the edge of the field, present unconventional approaches to\
  \ intractable problems, or challenge the prevailing paradigm.\r\n\r\nTo make grant\
  \ determinations, the Foundation relies upon a wide range of input, including assessments\
  \ by its professional staff, site visits (where appropriate), peer reviews, the\
  \ latest available scientific information, and presentations by experts in scientific,\
  \ medical and health and human service fields."
