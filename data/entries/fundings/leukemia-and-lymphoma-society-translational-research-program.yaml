comments: "The formation of the Translational Research Program (TRP) was to enhance\
  \ the transfer of basic research findings to clinical usefulness.\r\nApplications\
  \ are sought proposing novel approaches to the prevention, diagnosis or treatment\
  \ of hematological malignancies and related pre-malignant conditions. Proposals\
  \ should be based on molecular, cellular or integrated systems findings and be conceptually\
  \ innovative. The application should have a clear plan for the eventual clinical\
  \ translation of the studies proposed and the results expected. This feature will\
  \ be an important consideration of the review process.\r\nThis program is intended\
  \ to provide support over an initial three-year period. Two additional years may\
  \ be available through the competitive, peer-reviewed TRP Renewal process to solidify\
  \ progress made in the initial award and further support a clinical trial. To be\
  \ considered for a TRP renewal award, a clinical protocol for a Phase I or Phase\
  \ II clinical trial based on the initial TRP grant must be submitted to the institution’s\
  \ IRB for approval and the work must be a direct result of the funded TRP award\
  \ (see Renewal Guidelines and Instructions for detailed information)."
