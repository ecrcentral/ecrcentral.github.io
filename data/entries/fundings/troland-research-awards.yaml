comments: 'Two Troland Research Awards of $75,000 are given annually to two investigators
  to recognize unusual achievement and to further empirical research within the broad
  spectrum of experimental psycholog; including: empirical psychology research on
  the relationships of consciousness and the physical world, including the topics
  of sensation, perception, motivation, emotion, learning, memory, cognition, language,
  and action. Preference to experimental work taking a quantitative or other formal
  approach, including mathematics and explicit algorithms (e.g., computer modeling)
  or symbolic logics of various types, and/or to experimental research seeking physiological
  explanations. Eligibility: aged 40 or younger to further. Lisa Feigenson, professor
  of psychological and brain sciences at Johns Hopkins University received a 2015
  Troland Research Awards.'
