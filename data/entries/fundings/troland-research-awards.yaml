name: Troland Research Awards
description: Two Troland Research Awards of $75,000 are given annually to recognize
  unusual achievement by early-career researchers (preferably 45 years of age or younger)
  and to further empirical research within the broad spectrum of experimental psychology.
  The Troland Research Award was established by a trust created in 1931 by the bequest
  of Leonard T. Troland.
