comments: The American Association for Thoracic Surgery is seeking applications for
  the third annual John Alexander Research Scholarship, which is designed to support
  the research and training of a North American surgeon committed to pursuing an academic
  career in cardiothoracic surgery. Applications for the scholarship must be submitted
  during the candidate's first two years in an academic position, while his/her research
  program must be undertaken within the first three years of the applicant having
  completed his/her cardiothoracic residency. The duration of the scholarship is for
  two years. The stipend is to be used for direct salary support and related research
  expenses only and cannot be used to support indirect institutional costs. A yearly
  stipend of $80,000 will be awarded to the applicant’s host institution to support
  salary, research supplies, travel, and other legitimate academic expenses. The scholarship
  period begins July 1, 2017, and will conclude July 1, 2019.
