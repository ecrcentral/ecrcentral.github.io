name: MOPGA Visiting Research Fellowships in France
description: "The MOPGA  visiting fellowship program supports significant scientific\
  \ projects addressing issues related to the environment and climate change.\r\n\r\
  \nThis program, implemented by Campus France and funded by the French Ministry of\
  \ Europe and Foreign Affairs in partnership with the Ministry of Higher Education\
  \ and Research, aims to facilitate the mobility of early career international researchers,\
  \ thereby promoting their collaboration with leading French research institutions.\r\
  \n\r\nRESEARCH THEMES\r\nEarth systems\r\nClimate change and sustainability\r\n\
  Energy transition\r\nSocietal challenges of environmental issues\r\nHuman, animal\
  \ and ecosystem health as part as a \"One Health\" approach.\r\n\r\nWHO MAY APPLY\r\
  \nIndividuals fitting the following criteria are eligible to apply:\r\nApplicants\
  \ who do NOT hold French citizenship\r\nForeign researchers holding a doctoral degree\
  \ for less than 5 years\r\nForeign researchers who have not resided in France more\
  \ than 90 days."
