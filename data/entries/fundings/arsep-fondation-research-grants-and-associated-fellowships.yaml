name: ARSEP fondation Research grants and Associated Fellowships
description: '<p>For investigator-initiated support requests, no topic restrictions
  are imposed, other than the required demonstration of relevance to Multiple Sclerosis.
  ARSEP Foundation welcomes any basic and clinical research applications focused on
  Multiple Sclerosis, including for example: immunologic basis of MS, myelin biology,
  axonal degeneration, restoration of myelin and axonal integrity, susceptibility
  to MS, virology, infectious disease processes that may trigger disease activity,
  imaging technology, identification and use of surrogate markers, clinical research
  and therapeutics, and so on.</p>'
