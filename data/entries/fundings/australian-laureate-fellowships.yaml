name: Australian Laureate Fellowships
description: "The Australian Laureate Fellowships scheme reflects the Australian Government’s\
  \ commitment to excellence in research by supporting world-class researchers to\
  \ conduct research in Australia.\r\n\r\nOpen to applications from the highest-quality\
  \ researchers of international repute, the Australian Laureate Fellowships scheme\
  \ encourages applications involving Australian or international researchers by providing\
  \ eligible Australian Laureate Fellows with project funding in addition to a salary\
  \ supplement and salary-related (on-cost) support."
