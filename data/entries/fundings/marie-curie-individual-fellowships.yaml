name: Marie Curie Individual Fellowships
description: "The goal of the Individual Fellowships is to enhance the creative and\
  \ innovative potential of experienced researchers, wishing to diversify their individual\
  \ competence in terms of skill acquisition through advanced training, international\
  \ and intersectoral mobility.\r\n\r\nIndividual Fellowships provide opportunities\
  \ to researchers of any nationality to acquire and transfer new knowledge and to\
  \ work on research and innovation in Europe (EU Member States and Horizon 2020 Associated\
  \ Countries) and beyond. The scheme particularly supports the return and (re)integration\
  \ of European researchers from outside Europe and those who have previously worked\
  \ here, as well as researchers displaced by conflict outside the EU and Horizon\
  \ 2020 Associated Countries. It also promotes the career restart of individual researchers\
  \ who show great potential."
