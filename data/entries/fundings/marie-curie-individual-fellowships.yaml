comments: The MSCA Individual Fellowships (IF) are open to researchers of all nationalities,
  in all disciplines, and with a PhD degree or more than four years of full-time research
  experience. The duration of IF depends on the IF schemes (typically 24 to 36 months),
  which allows for a stay of between 12 and 24 months abroad.
benefits: The grant provides an allowance to cover living, travel and family costs.
  In addition, the EU contributes to the training, networking and research costs of
  the fellow, as well as to the management and indirect costs of the project. The
  grant is awarded to the host organisation, usually a university, research centre
  or a company in Europe.
