name: Three 2-year Postdoctoral Fellowships at the Zukunftskolleg
description: "The University of Konstanz is one of eleven Universities of Excellence\
  \ in Germany. Since 2007 it has been successful in the German ExcellenceInitiative\
  \ and its follow-up programme, the Excellence Strategy.\r\n\r\nThe Zukunftskolleg\
  \ is an Institute for Advanced Study for early career postdoctoral researchers in\
  \ the natural sciences, humanities and social sciences. It is a central component\
  \ of the university's strategy \"creative.together\". The Zukunftskolleg promotes\
  \ interdisciplinary discourse between distinguished researchers from Germany and\
  \ abroad, and provides them with the resources to conduct their research independently\
  \ and free from administrative constraints. The working language is English. The\
  \ preferred start date is April 1st, 2025. Conditionally on the submission of an\
  \ external grant, the position can be extended for an additional year. In principle,\
  \ the position can be divided into two half-time positions.\r\n\r\nEach fellow is\
  \ a member of both a university department and the Zukunftskolleg. Additionally,\
  \ fellows of the Zukunftskolleg can be affiliated to theClusters of Excellence at\
  \ the University of Konstanz: \"Politics of Inequality\" or \"Centre for the Advanced\
  \ Study of Collective Behaviour\". Up to two Cluster-Zukunftskolleg Fellowships\
  \ related to the study of collective behaviour can be funded by the \"Centre for\
  \ the Advanced Study ofCollective Behaviour\" directly.\r\n\r\nThe target group\
  \ consists of excellent postdoctoral researchers at the early career level, with\
  \ leadership abilities and a capacity for teamwork, so that they can reasonably\
  \ be expected to take up leading roles in academia. The applications are evaluated\
  \ in a two-stage process by international reviewers. The candidates will be informed\
  \ about the decision around mid-February 2025.\r\n\r\nYour Responsibilities:\r\n\
  - Develop and implement yourresearch project\r\n- Build up your own research profile\r\
  \n - You are expected to participate actively in the regular weekly meetings of\
  \ the Zukunftskolleg (and/or the respective Cluster of Excellence) and to contribute\
  \ to the Zukunftskolleg in creating a team of exciting interdisciplinary postdoctoral\
  \ researchers\r\n- Have your place of residence in Konstanz or its surroundings\r\
  \n\r\nYour Competencies:\r\n- You should be in possession of a doctoral degree granted\
  \ betweenOctober 31, 2022 and December31, 2024. Earlier graduation dates can be\
  \ accepted in case of maternity/paternity leave, or working contracts outside academia\
  \ -\r\n- Candidates must not hold a permanent professorship, or have a habilitation\
  \ or equivalent (Venia legendi). Candidates with their own position funded by another\
  \ program, which can be transferred to Konstanz, are also eligible\r\n- Applicants\
  \ must propose a research project that ties in with a discipline represented at\
  \ the University of Konstanz. They are invited to include in their motivation letter\
  \ a reflection note on how their research relates to the 17 SDGs of the UN\r\n-\
  \ Applicants should contact potentialLocal Academic Partners among the researchers\
  \ at the University of Konstanz in order to ensure appropriate affiliation. Support\
  \ from a department strengthens the application\r\n- International experience in\
  \ teaching or research, and a stronginterest in interdisciplinary topics are desirable.\r\
  \n\r\nWe Offer:\r\n- Professional infrastructure and an appropriate workplace for\
  \ conducting research\r\n- Individual Research Allowance\r\n- Access to a pool for\
  \ funding cooperative projects, research assistants, travel, and equipment purchases\r\
  \n- Funds for mutual research visits to international collaborators\r\n- The possibility\
  \ of attracting senior research partners to Konstanz through the senior fellowship\
  \ and the mentorship program\r\n- The opportunity to benefit from a variety of career\
  \ development measures, including the University of Konstanz’s Academic Staff Development\
  \ and Research Support offices\r\n- No teaching obligation, but an opportunity to\
  \ teach in collaboration with your department at the University of Konstanz\r\n\
  - An international and interdisciplinary community of peers.\r\n\r\n\r\nMore information\
  \ on the Zukunftskolleg and current Fellows, as well as a special section devoted\
  \ to the application and selection process (online application process, required\
  \ documents, guidelines on eligibility, evaluation criteria, the timeline and the\
  \ stages of the selection process) are available on our website at:\r\nhttp://zukunftskolleg.uni-konstanz.de.\r\
  \n\r\nAll supporting materials (letter of motivation, research proposal, curriculum\
  \ vitae, writing sample and two letters of reference) must be submitted in English\
  \ in one pdf document via our Online Application Portal. Only the letters of reference\
  \ can be sent directly by the referees via e-mail to zukunftskolleg-application@uni-konstanz.de\
  \ by the application deadline. Questions can be directed via e-mail to:\r\nzukunftskolleg-application@uni-konstanz.de.\r\
  \n\r\nWe look forward to receiving your application until 02 September 2024,\r\n\
  11:00 am (Konstanz time).\r\n\r\nThe University of Konstanz is committed to ensuring\
  \ an environment that provides equal opportunities and promotes diversity as well\
  \ as a good balance between university and family life. As an equal opportunity\
  \ employer, we strive to increase the number of women working in research and teaching.\
  \ We also support working couples through our dual career programme (https://www.uni-konstanz.de/en/equalopportunities/family/dual-career/).\
  \ Persons with disabilities are explicitly encouraged to apply. They will be given\
  \ preference if appropriately qualified (contact sbv@uni-konstanz.de, + 49 7531\
  \ 88-4016)."
