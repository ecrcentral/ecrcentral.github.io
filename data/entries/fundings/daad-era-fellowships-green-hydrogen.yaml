name: DAAD ERA Fellowships — Green Hydrogen
description: DAAD ERA Fellowships for Green Hydrogen support researchers and interns
  from Extended European Research Area (ERA) countries to conduct research projects
  in Germany on green hydrogen topics. Research fellowships last 1 to 24 months;
  internships last 2 to 3 months. Funding includes monthly stipends, health insurance,
  travel subsidy, research allowance, and language course support.
