comments: 'LIMITED SUBMISSION (limit 4 applications from JHU): The Hartwell Foundation
  provides funding to individual researchers at eligible research institutions in
  the United States. Through a unique and selective funding process, The Hartwell
  Foundation seeks to inspire innovation and achievement by funding early-stage, transformative
  biomedical research with the potential to benefit children of the United States.
  It seeks to fund early-stage, innovative, and cutting-edge applied research that
  has not yet qualified for funding from traditional outside sources. Only investigators
  nominated by the chief executive of an invited research institution are eligible
  for consideration for the Hartwell Individual Biomedical Research Award. $300,000
  over three years in direct costs.'
