description: "The Guarantors of Brain offer four types of Brain fellowships.\r\n\r\
  \n1. “Entry” clinical fellowships up to 12months, to provide clinicians transitional\
  \ funding prior to starting a higher degree.\r\n2. Post-doctoral clinical fellowships\
  \ up to 12 months, for clinicians undertaking research after their PhD; and\r\n\
  3. New non-clinical post-doctoral fellowships up to 36 months, for basic scientists\
  \ embedded in clinical research teams.\r\n4. Clinical Research Fellowships, administered\
  \ in partnership with the Association of British Neurologists. \r\n\r\nThe 2021\
  \ Fellowship applications will open later this year. See the ABN website for details:\
  \ https://www.theabn.org/page/abn_fellowship.\r\nApplications for the 2021 Entry\
  \ and Post Doctoral fellowships will open in January 2021."
