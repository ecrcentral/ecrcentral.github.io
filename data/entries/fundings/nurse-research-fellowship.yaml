comments: The Nurse Researcher Fellowship grant aims to support early career nurse
  researchers who will be guided in their projects by a mentor and their institution.
  The fellowship’s goal is to train Ph.D. and Master’s level nurse researchers to
  initiate and lead a multi-site research project. With support from an experienced
  nurse research mentor identified by ALSF, fellowship recipients will develop a team
  within their own institutions as well as partnerships at other institutions to implement
  their proposed research study. A formal curriculum focuses on developing multi-site
  investigator skills as part of the Fellowship. This grant totals $100,000 over 2
  years. Successful completion of the Fellowship should position investigators to
  apply for the ALSF Nursing Discovery grant or NIH research grants.
