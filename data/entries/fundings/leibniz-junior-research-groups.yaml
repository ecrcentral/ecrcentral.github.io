name: Leibniz Junior Research Groups
description: The Leibniz Association Junior Research Groups programme enables talented
  early-career researchers to establish independent research groups within Leibniz
  Institutes. Applicants must have completed their doctorate no more than 5 years
  ago. Funding of up to EUR 1.7 million covers the group leader salary plus 2 to 3
  doctoral candidates or postdoctoral researchers and equipment or facilities for
  5 years.
