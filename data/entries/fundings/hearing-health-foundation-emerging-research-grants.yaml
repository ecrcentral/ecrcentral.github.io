description: '<p>Through the Emerging Research Grants (ERG) program, Hearing Health
  Foundation (HHF) provides seed money to hearing and balance researchers who focus
  on researching underfunded areas of otology. Grantees advance scientific knowledge
  in the following under-researched areas: Hearing Loss in Children, Central Auditory
  Processing Disorder, Hyperacusis, Tinnitus, M&eacute;ni&egrave;re&rsquo;s disease,
  Usher syndrome, making cancer drugs less ototoxic, and the links between hearing
  loss and diabetes, heart and kidney disease.</p>'
