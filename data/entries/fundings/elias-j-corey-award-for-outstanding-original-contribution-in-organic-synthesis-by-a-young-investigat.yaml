description: 'Sponsor: The Pfizer Endowment Fund Purpose: To recognize original and insightful work by a young investigator that has had significant impact on the field of synthetic organic chemistry. Nature: The award consists of $5,000 and a certificate. Up to $2,500 for travel expenses to the meeting, at which the award will be presented, will be reimbursed.'
