comments: The award will be granted to an individual who has less than 15 years of
  experience since his/her terminal degree, who has demonstrated creativity in the
  field of synthetic organic chemistry. A nominee must have accomplished research
  that is of exceptional merit and adds value to the field, such as the contribution
  of a novel and highly useful reagent, reaction, or catalytic process that solves
  a synthetic problem of considerable importance. Special consideration will be given
  to the application of such novel chemistry toward the synthesis of natural products
  and organic molecules of medicinal importance, and to the discovery of novel reactions
  or processes with broad utility.
