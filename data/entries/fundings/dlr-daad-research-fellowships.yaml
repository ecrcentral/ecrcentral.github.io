name: DLR-DAAD Research Fellowships
description: DLR-DAAD Research Fellowships are jointly offered by the German Aerospace
  Center (DLR) and the German Academic Exchange Service (DAAD). They enable researchers
  to work at DLR institutes in areas of space, aeronautics, energy, transport, digitalisation,
  and security. PhD student fellowships last up to 36 months; early-career researcher
  fellowships 6 to 24 months; established researcher fellowships 1 to 3 months.
  Includes monthly stipend, travel allowance, health insurance, and family allowances.
