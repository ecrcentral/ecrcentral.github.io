comments: 'Young Investigator Awards provide one-year grants of $35,000 to encourage
  young investigators to pursue a career in the field of any form of ataxia research.
  Young Investigator Awards for SCA Research provide one-year grants of $50,000 to
  encourage young investigators to pursue a career in spinocerebellar ataxia research.
  For both Young Investigator award programs, candidates must have attained an MD
  or PhD degree, and have an appointment as a junior faculty member, senior post-doc
  or clinical fellow. Individuals at the Associate Professor level are not eligible.
  Clinicians must have finished their residency no more than five years prior to applying.
  PhDs must be no more than five years from end of the completion of their post-doc
  training. The sponsoring institution must agree in writing to the following provision:
  the young investigator (MD or PhD) must be free to allocate approximately half time
  (50%) for ataxia related research.'
