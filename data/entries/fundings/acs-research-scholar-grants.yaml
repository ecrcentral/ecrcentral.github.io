benefits: For the RSG award in the Cancer Control and Prevention Research Program
  with a focus on health equity, the maximum award is for 4 years at up to $165,000
  per year (direct costs), plus 20% allowable indirect costs. Additionally, large
  multilevel studies that address cancer health equity may propose up to a maximum
  of 5 years and $200,000 per year (direct costs), plus 20% allowable indirect costs.
