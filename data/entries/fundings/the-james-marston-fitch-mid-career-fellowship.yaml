name: The James Marston Fitch Mid-Career Fellowship
description: 'Research grants of up to $15,000 will be awarded to one or more mid-career
  professionals who have an academic background, professional experience and an established
  identity in one or more of the following fields: historic preservation, architecture,
  landscape architecture, urban design, environmental planning, architectural history
  and the decorative arts. The James Marston Fitch Charitable Foundation will consider
  proposals for the research and/or the execution of the preservation-related projects
  in any of these fields.'
