name: Parker B. Francis Fellowship Program
description: The Parker B. Francis Fellowship provides research support to clinical
  and basic scientists embarking on careers in clinical, laboratory or translational
  science related to Pulmonary, Critical Care and Sleep Medicine at a U.S. or Canadian
  university or research institution. The ideal candidate is one with evidence of
  strong aptitude in research and who is in transition from post-doctoral trainee
  to independent investigator. It is essential that there be evidence of accomplishment
  and proficiency in research. Few applicants who are just beginning research training
  and have only one or two research publications are funded.
