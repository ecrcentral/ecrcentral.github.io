comments: "The Parker B. Francis Fellowship provides three years of funding. The budget\
  \ year begins July 1 and ends June 30. The budget guidelines are included below.\r\
  \n\r\nThe total budget for individuals starting a PBF Fellowship in 2020 is $225,000\
  \ over three years or $75,000 per year.\r\n\r\nAllowable costs are restricted to\
  \ the PBF Fellow’s salary plus fringe benefits and may include travel to a maximum\
  \ of $2,000 per year. Any costs other than the Fellow’s salary support and travel\
  \ allocation must be approved by the Scientific Director of the PBF Fellowship Program."
