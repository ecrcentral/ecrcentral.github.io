description: The scholarship program for "Special Visiting Researcher" aims to attract
  a senior foreign researchers recognized internationally as leadership in priority
  areas of Science Without Borders program, to conduct projects with Brazilian research
  groups and visit Brazil for up to three months each year over two to three years.
