comments: The Society funds high-risk pilot grants to test novel ideas that may serve
  to advance its mission of stopping MS progression, restoring function, improving
  quality of life, and preventing MS. Funding is provided for one year to test innovative,
  cutting-edge ideas or untested methods, and to gather sufficient preliminary data
  to apply for longer-term funding. We welcome applications for studies related to
  multiple sclerosis that may serve to advance our mission of stopping MS progression,
  restoring function and improving quality of life, and preventing MS. The Society
  supports fundamental as well as applied studies, non-clinical or clinical in nature,
  including projects in patient management, care and rehabilitation.
