comments: Research grants of up to $15,000 will be awarded to one mid-career professional
  whose research project relates to the appreciation, interpretation, preservation,
  study and teaching of European art, architecture and related disciplines from antiquity
  to the early 19th century, in the context of historic preservation in the United
  States. Potential Kress Fellow projects could include the exploration of shared
  European and American influences in style, design, materials, construction techniques,
  building types, conservation and interpretation methodologies, philosophical and
  theoretical attitudes, and other factors applicable to preservation in both Europe
  and America.
