name: The Samuel H. Kress Mid-Career Fellow
description: 'The Samuel H. Kress Mid-Career Fellowship: Research grants of up to
  $15,000 may be awarded to a mid-career professional whose research project relates
  to the appreciation, interpretation, preservation, study and teaching of European
  art, architecture and related disciplines from antiquity to the early 19th century,
  in the context of historic preservation in the United States.'
