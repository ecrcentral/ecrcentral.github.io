name: Croucher Fellowships for Postdoctoral Research
description: "The awards offered by the Croucher Foundation Limited (“the Foundation”)\
  \ are intended to enable applicants who are permanent residents of Hong Kong to\
  \ devote themselves to a period of full-time research in natural sciences, medicine\
  \ or technology in approved academic institutions outside Hong Kong.\r\n\r\nThese\
  \ are educational awards for graduates who obtained their doctoral degrees after\
  \ September 2018, and not primarily meant as grants for enabling a university or\
  \ institution to employ research personnel for research projects. Some Fellowships\
  \ are also available for fully qualified medical doctors who wish to pursue research\
  \ under a speciality."
