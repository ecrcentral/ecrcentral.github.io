name: NINDS Faculty Development Award to Promote Diversity in Neuroscience Research
  (K01)
description: "The purpose of the NINDS Faculty Development Award to Promote Diversity\
  \ in Neuroscience Research (K01) is to diversify the pool of independent neuroscience\
  \ research investigators by providing junior faculty with research cost support,\
  \ protected research time and career stage appropriate professional development\
  \ mentorship in neuroscience research. Individuals from backgrounds underrepresented\
  \ in biomedical research are eligible for support under this award if they have\
  \ doctoral research degrees (Ph.D. or equivalent) and are in the first 3 years of\
  \ a faculty tenure track or equivalent position at the time of application.\r\n\
  Applicants not planning an independent clinical trial, or proposing to gain research\
  \ experience in a clinical trial led by another investigator, must apply to companion\
  \ FOA (FOA PAR-18-490).\r\nApplicants should specifically be from one or more of\
  \ the following categories: African American, Hispanic, Junior Faculty, Minorities\
  \ encouraged\r\nNative American, Post Doctoral Fellows, Women of Color"
