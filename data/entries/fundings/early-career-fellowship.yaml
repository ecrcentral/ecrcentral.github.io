name: Early Career Fellowship
description: <p>Early Career Fellowships are one of our Career Development Awards,
  aiming to attract and retain talented postdoctoral researchers who want to build
  a successful career in multiple sclerosis research. These grants provide a staged
  career structure and the opportunity for you to progress towards higher level appointments.
  Your application should be relevant to MS and fit with our 2018-2022 research strategy.
  You are also encouraged to consider our top 10 JLA research priorities and our organisational
  goals when developing your application. You must be the Early Career Fellowship
  candidate and have completed a PhD in a relevant science or health discipline. You
  can apply before your PhD is awarded, but the award must be made before the Fellowship
  starts. We&rsquo;ve found that Fellowships are usually awarded to researchers after
  their first or second postdoc. But we&rsquo;ll still consider your application if
  you&rsquo;re earlier on in your career. Fellowships are available to everyone conducting
  research across the spectrum of MS research. You must be based at an UK university
  or NHS institution and be the Principal Investigator of the project. You need to
  name a supervisor on your applications. They must be actively involved in the project
  and are responsible for supporting you throughout. Supervisors are required to sign-off
  the application before you submit. Your salary is funded as part of the Fellowship.
  We&rsquo;ll consider research budgets including running costs (consumables, animal
  costs, human tissue costs), equipment, and conferences. You can find the full list
  of eligible costs in our 2022 Grant Round applicant guidance document.</p>
