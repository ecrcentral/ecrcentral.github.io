name: Global Development Awards Competition 2022 - Japanese Award for Outstanding
  Research on Development (ORD)-EXTENDED DEADLINE 6 JAN
description: 'Competition Theme The Global Development Network (GDN) invites researchers from low-income or middle-income countries to submit research proposals within the theme ''Post-COVID-19 Governance - Learning from challenging circumstances to build better governance systems'' for the Japanese Award for Outstanding Research on Development (ORD). More information about the theme of the competition is available at the end of this document. The Award The Japanese Award for Outstanding Research on Development is a competitive research grant program under the umbrella of the Global Development Awards Competition (GDAC), administered by GDN, funded under the Policy and Human Resources Development Fund (PHRD) trust fund managed by the World Bank, and generously supported by the Ministry of Finance, Government of Japan. This award program identifies and funds outstanding research proposals in low- or middle-income countries with high potential for excellence in research and clear policy implications for addressing development issues. The three winning projects will receive grants worth US$ 60,000. Finalists will be invited to join a communications training in preparation of a pitch of their project in front of a high-level Jury, which will decide which research proposal to award. A physical event is planned in early November 2022 for the presentations to the high-level Jury by the finalists, if conditions allow it, and projects are expected to start in early 2023. In case social distancing policies do not make travelling possible, the event will be held on a virtual setting. The awards will be given to the researcher(s) whose proposals hold the greatest promise for improving our understanding of development issues and puts forth clear, articulate and well researched policy implications to address relevant developmental problems. The first prize winner will receive a grant of US$ 30,000. The second prize and third prize winners will receive a grant of US$ 20,000 and US$ 10,000 respectively. The funds will be used to support the research work proposed by the winners towards the completion of their research. Additionally, awardees will be paired with world-class academic in their area of work who will play the role of a Scientific and Technical Advisor. The deadline for submission of applications is on the 14 November 2022 (Indian Standard Time 6:00 PM) Gender Bias GDN recognizes the imbalance in the opportunities provided to women in professional research, as well as the consequences of unconscious gender bias in review processes in environments across the world. GDN also recognizes the impact these factors can have on the prospects of women researchers in securing awards and funding. Starting with the 2022 edition, GDN is planning to embed more equitable grant-making processes to guarantee that more women have the opportunity to compete and win while still maintaining a high-quality standard on the evaluation. Therefore, GDN will institute a selection process for GDAC where we will make all efforts to guarantee gender representation amongst the 3 finalists of the ORD category. We are taking this step in parallel to a revamped Capacity-building Framework for individuals or NGOs that are interested in GDAC since we will aim to support them regardless of their success in the review process. This means that we will develop activities for prospective applicants, grantees, and past grantees so that they develop some skills useful for other competitions or endeavors. We hope this will contribute to building capacity and empowering southern researchers including women. GDN strongly encourages female researchers to engage and apply. Connector Grant The 2022 edition will introduce the Connector Grant which aims to stimulate international cooperation through the development of collaborative projects to support scale-up efforts with research-based evidence. The Connector grant will be awarded to ORD grantees, based on a project developed in collaboration with the MIDP grantees who received the JSDF grant. *Additional information about the open sessions are below. We are providing these sessions in order to support individuals or NGOs interested that might not understand some of guidelines or would benefit from some hints and tips on how to present their ideas and increase their chances of success within or outside GDAC. In these meetings, we will discuss: How to apply (platform) What is an application for GDAC Eligibility Criteria for each category ORD: 27 Sep, 4 & 11 Oct MIDP: 29 Sep, 6 & 13 Oct This will be an opportunity to have an open Q&A with the team and other prospective applicants! More info http://bit.ly/ GDAC2022_sessions There are also posts about this on social media from our account in case you could share them: Twitter ; Facebook ; Link edIn . This grant will support the award recipients'' collaborative efforts towards measuring and analyzing scale-up impact, as well as to enhance the robustness of their M&E activities. The application to this grant will only take place after the full implementation of the funded ORD project and will not be part of the selection of the ORD winners. Important Dates ⮚ Deadline for submissions: 14 November 2022 ⮚ Announcement of Eligibility screening results: 21 November 2022 ⮚ Announcement of First Level review results (shortlisted applications) and comments from reviewers: 23 December 2022 ⮚ Resubmission of the updated application by the shortlisted applicants: 6 January 2023 ⮚ Announcement of Second Level review results (finalists) and comments from reviewers: 10 February 2023 ⮚ Resubmission of updated applications by the finalists: 17 February 2022 ⮚ Announcement of finalists: 17 February 2023 ⮚ Announcement of winners: March/April 2023 Finalists are expected to be available for the Communications Training and the physical event for the presentation of their projects to the jury in March/April. The date will be announced in late 2022.'
