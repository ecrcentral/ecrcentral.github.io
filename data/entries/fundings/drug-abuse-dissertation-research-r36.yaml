comments: The National Institute on Drug Abuse (NIDA) announces the availability of
  NIH Dissertation Award grants (R36) to support drug abuse doctoral dissertation
  research in NIDA areas of priority (http://www.drugabuse.gov/funding/funding-priorities
  ). Areas of focus include research on basic and clinical neuroscience and behavior,
  developmental trajectories, epidemiology, prevention, treatment, services, and/or
  women and sex/gender differences. Grant support is designed to encourage doctoral
  candidates from a variety of academic disciplines and programs to conduct research
  in these areas of interest to NIDA. It is hoped that this program will ultimately
  facilitate the entry of promising new investigators into the field of drug abuse
  research and promote transdisciplinary collaborations. The applicant must have a
  baccalaureate degree and be enrolled in a Ph.D. or equivalent doctoral-degree program
  (e.g., Dr. PH., D.NSC. and Sc.D.), a formally combined M.D. /Ph.D. program or other
  combined professional/clinical and research doctoral program in the biomedical,
  behavioral and social, and clinical sciences at an accredited domestic institution.
  Grants to support dissertation research will provide no more than $50,000 in direct
  costs per year. The maximum period is two years, with the possibility of extension
  without additional funds for up to 12 months.
