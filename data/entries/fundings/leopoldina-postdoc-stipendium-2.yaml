name: Leopoldina-Postdoc-Stipendium
description: The programme is intended for outstanding junior post-doctoral scientists
  from Germany, Austria and Switzerland from the natural sciences and medical disciplines
  who already have their own research profile. If accepted, they have the opportunity
  to head their own projects at the most renowned international research institutions
  of their disciplines. German candidates are expected to opt for research facilities
  abroad. Austrian and Swiss scientists are only eligible for support, if they apply
  at a host institution in Germany. The programme's goal is for the scholars to return
  to their home countries after the completion of the scholarship and share the acquired
  knowledge at the local centres of research.
