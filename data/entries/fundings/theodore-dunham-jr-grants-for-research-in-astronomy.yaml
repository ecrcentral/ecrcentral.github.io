comments: Provides small grants for research in astronomy & the acquisition of astronomical
  equipment, computer time, & computer hardware/software that will be used in astronomical
  research. Preference generally given to multi-user facilities. Does not fund equipment
  used only for teaching, publication costs, or travel costs for meetings. About 7-9
  grants up to $3,000 each are made annually. In meritorious cases grants may be as
  much as $4,000 or $5,000. Cost sharing is encouraged. Proposals due first Monday
  in October.
