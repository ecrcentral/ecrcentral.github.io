name: Theodore Dunham, Jr. Grants for Research in Astronomy
description: "The Fund for Astrophysical Research (F.A.R.) makes small grants to support\
  \ research in astronomy and astrophysics. Founded in 1936 by Charles G. Thompson\
  \ and Alice Bemis Thompson, the F.A.R. has supported astronomical and astrophysical\
  \ projects in the United States, Australia, and New Zealand through loans and gifts\
  \ of funds and optical equipment.\r\n\r\nF.A.R. grants are named in memory of Theodore\
  \ Dunham, Jr., the Scientific Director of the F.A.R. from its founding in 1936 until\
  \ his death in 1984. Grants are awarded for the acquisition of astronomical equipment,\
  \ computer time, and computer hardware or software that will be used in research."
