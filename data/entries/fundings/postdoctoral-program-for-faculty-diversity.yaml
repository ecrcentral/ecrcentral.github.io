name: Postdoctoral Program for Faculty Diversity
description: As part of a continuing commitment to building a culturally diverse intellectual
  community and advancing scholars from underrepresented groups in higher education,
  The University of North Carolina at Chapel Hill Carolina Postdoctoral Program for
  Faculty Diversity (CPPFD) is pleased to offer postdoctoral research appointments
  for a period of two years. The purpose of CPPFD is to develop scholars from underrepresented
  groups for possible tenure track appointments at the University of North Carolina
  and other research universities. Postdoctoral scholars will be engaged full-time
  in research and may teach only one course per fiscal year. This program is funded
  by the State of North Carolina.
