comments: 'The AACAP Pilot Research Award for Child Psychiatry Residents and Junior
  Faculty offers $15,000 for child and adolescent psychiatry residents and junior
  faculty who have an interest in beginning a career in child and adolescent psychiatry
  research. Recipients have the opportunity to submit a poster presentation on their
  research for AACAP''s 64th Annual Meeeting in Washington, DC, October 23-28, 2017.
  The award also includes the cost of attending the AACAP Annual Meeting for five
  days. Candidates must be board eligible/certified in child and adolescent psychiatry,
  or enrolled in a child psychiatry residency or fellowship program. Candidates must
  have a faculty appointment in an accredited medical school or be in a fully accredited
  child and adolescent psychiatry clinical research or training program. At the time
  of application, candidates may not have more than two years’ experience following
  graduation from residency/fellowship training. Candidates must not have any previous
  significant, individual research funding in the field of child and adolescent mental
  health. These include the following: NIMH/NIH Funding (Small Grants, R-01) or similar
  foundation or industry research funding. Candidates who have received or are currently
  receiving T32 funding support are eligible to apply. Candidates must either be AACAP
  members or have a membership application pending (not paid by the award)'
