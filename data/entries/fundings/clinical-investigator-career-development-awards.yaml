comments: The Lymphoma Research Foundation (LRF) seeks proposals for its 3-year Clinical
  Investigator Career Develop Award Grant. The purpose of LRF's Clinical Investigator
  Career Development Award is to fund training of physician investigators who will
  participate in developing new therapeutics and diagnostic tools for lymphoma. Physician
  investigators who are at the level of advanced fellow or junior faculty member with
  no greater than 5 years of experience beyond completion of their fellowship or post-doctoral
