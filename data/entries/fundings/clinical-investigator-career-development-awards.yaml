name: Clinical Investigator Career Development Awards
description: "The Lymphoma Research Foundation (LRF) maintains a strong commitment\
  \ to supporting early career investigators\r\nand ensuring they can build a successful\
  \ career in the field of lymphoma research. The LRF Clinical Investigator Career\r\
  \nDevelopment Award (CDA) Program is designed to support physician investigators\
  \ at the level of advanced fellow or\r\njunior faculty member who will contribute\
  \ to the development of new lymphoma therapies and diagnostic tools.\r\nEligible\
  \ investigators must have no greater than five years of experience beyond completion\
  \ of their fellowship or postdoctoral training (the five-year limit may be non-sequential\
  \ in cases of pregnancy or illness)."
