name: 2024-2026 Postdoctoral Fellowship in Conservation Science
description: 'The Getty Conservation Institute’s (GCI) Postdoctoral Fellowship in Conservation Science is a two-year program designed to provide recent PhDs in chemistry and other physical or material sciences with experience in conservation science. The 2024–2026 Postdoctoral Fellow will be an integral part of the GCI Science department''s Built Heritage Research initiative (https://www.getty.edu/projects/built-heritage-research-initiative/). The Postdoctoral Fellow is expected to engage with, and be involved in, both new and existing projects and research partnerships concerned with materials research and conservation methods. The GCI anticipates that the Fellow''s primary activities will focus on one of the current built heritage research directions, which include: i) investigating the applicability of accelerated aging strategies for testing natural stone and their response to conservation treatments, ii) characterizing historic mortars and concrete, iii) exploring nature-inspired approaches for built heritage conservation and the impact of biofilm on heritage substrates. The Fellowship will be particularly suited to candidates with a strong background in materials science at the graduate level and interested in exploring the integration of laboratory methodologies and field-based approaches. In addition to working on existing or nascent GCI research, there is scope for the Fellow to pursue independent research on a topic of their own choosing, and to take full advantage of the diverse research facilities available at the Getty. Professional development will be encouraged and assisted through participation in professional meetings, conferences, or workshops. It is expected that the Fellow''s research outcomes will be disseminated through publications and conference presentations, to the scientific community and conservation practitioners. Please be prepared to upload a Statement of Interest; Doctoral Dissertation Plan or Abstract; Curriculum Vitae; Writing Sample; and Confirmation of Degree as a single PDF when prompted to upload your "resume" by the online application system. Candidates who successfully complete the online application process will receive an automated message via email. Two Confidential Letters of Recommendation must be sent separately to GCIPostDoc@Getty.edu and should also be received no later than November 1, 2023.'
