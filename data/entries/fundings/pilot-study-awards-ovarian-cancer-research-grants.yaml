comments: The center is accepting applications for pilot study projects in ovarian
  cancer research. Through the center's Pilot Study Program, approximately ten grants
  of $75,000 each will be awarded in support of investigator-initiated projects in
  all areas of ovarian cancer research. Projects designed to analyze data from already
  funded clinical trials also will be considered. Priority will be given to proposals
  that are innovative, multidisciplinary, likely to lead to the submission of grant
  applications for independently funded investigations, and have translational research
  potential.
