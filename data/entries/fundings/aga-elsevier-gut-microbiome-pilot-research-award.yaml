name: AGA-Elsevier Gut Microbiome Pilot Research Award
description: The objective of this award is to provide investigators non-salary funds
  to help establish their research careers or support pilot projects that represent
  new research directions. The intent of the award is to stimulate research into the
  relationship of the gut microbiota to digestive health and disease by providing
  time for investigators to obtain new data that can ultimately lead to subsequent
  grant applications for more substantial funding and duration.
