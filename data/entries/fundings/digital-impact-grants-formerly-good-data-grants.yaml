comments: 'Markets for Good is launching two new grant programs focused on the role
  of digital data and infrastructure to improve decision-making in philanthropy (particularly
  individual giving) and in the social sector writ large. Grants will be awarded for
  two types of projects: scholarly research and practical innovations. We aim to support
  research, prototypes, and shared learning that can help donors and social sector
  organizations use digital data safely, ethically, and effectively to improve their
  work.'
