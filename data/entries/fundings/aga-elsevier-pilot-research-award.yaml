comments: The objective of this award is to provide non-salary funds for new investigators
  to help establish their research careers or to support pilot projects that represent
  new research directions for established investigators. The intent of this award
  is to stimulate research in gastroenterology- or hepatology-related areas by providing
  time for investigators to obtain new data that can ultimately lead to subsequent
  grant applications for more substantial funding and duration. This research initiative
  grant for $25,000 for one year is offered to investigators to support pilot research
  projects in gastroenterology-or hepatology-related areas.
