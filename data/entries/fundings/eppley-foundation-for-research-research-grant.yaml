name: Eppley Foundation for Research Research Grant
description: The Eppley Foundation supports advanced, novel, scientific research by
  PhDs or MDs with an established record of publication in their specialties. Candidates
  with newly awarded doctorates occasionally, but rarely, meet the Foundation’s requirements
  for advanced research. Any applicant to the Foundation must be associated with a
  nonprofit organization with headquarters or a branch office in the US to process
  the funds. Checks are not issued directly to individuals.
