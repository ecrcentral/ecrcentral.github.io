comments: 'The Ester Katz Rosen Fund* was established in 1974 by a generous bequest
  intended to support “…activities related to the advancement and application of knowledge
  about gifted children.” Rosen Fund grants: Enable and enhance development of identified
  gifted and talented children and adolescents. Encourage promising psychologists
  to continue innovative research and programs in this area. Support will be provided
  for activities on the advancement and application of knowledge related to identified
  gifted and talented children and adolescents, such as: Research, Pilot projects
  and Research-based programs.  Grant amounts range from $1,000 to $50,000.'
