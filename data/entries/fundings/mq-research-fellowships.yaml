name: MQ Research Fellowships
description: The purpose of the Macquarie University Research Fellowships (MQRF) Scheme is to support researchers within three years of the award of their PhD who have an outstanding track record (relative to opportunity) and/or who show evidence of excellent research potential. The Scheme provides an incubation period for early career researchers to allow them to increase their competitive edge in securing research funding from non-University sources. In addition, the Scheme aims to enhance the research capabilities of existing and emerging areas of research strength at Macquarie University.
