name: 'Integrative Action for Resilience: Progress Through Community - Research Partnerships'
description: The Integrative Action for Resilience initiative is a two-phase opportunity
  for local community leaders—who are interested in designing and implementing rigorous
  resilience research to generate evidence that can inform their own decision-making
  about policies and projects needed to build resilience in their community, and for
  researchers—who are interested in partnering in new ways with community-based organizations
  to apply their analytic capabilities to community-identified challenges. This is
  a unique opportunity to connect community leaders and researchers who have not worked
  together before but may be interested and well-suited to pursue resilience research
  together. Current community-research partnerships are important, but this call is
  for new partnerships to develop between community leaders and researchers who have
  not previously worked together but will find complementary benefits from engagement.
