name: IST-NOMIS Fellowship
description: <p>The NOMIS Fellowship Program at Institute of Science and Technology
  Austria (ISTA) offers excellent postdoctoral researchers the freedom to work on
  questions at the intersection of two or more scientific disciplines in a unique
  scientific environment, while also providing the security of outstanding scientific
  mentorship from proven leaders in their respective fields. A cross-discipline project
  proposal, to be co-supervised by two group leaders from different disciplines, identifies
  projects and fellows who demonstrate great flexibility, creativity and collaboration.</p>
