comments: This award is designed for individuals in the early stages of their career
  or those without significant prior research experience who plan to embark on careers
  in biomedical and/or clinical research in arthritis and rheumatic diseases. The
  purpose of this award is to provide support for a structured research training program
  for rheumatologists or health professionals in the field of rheumatology. The goal
  of funding at this level is to provide an opportunity for young scientists to embark
  on focused research and research training that will allow them to be competitive
  for the next level of career development awards.
