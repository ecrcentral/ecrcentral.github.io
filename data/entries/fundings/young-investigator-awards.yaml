comments: Young Investigator Awards are designed as start-up funds for new scientists
  at the end of their fellowship training or early in their research career. Demonstration
  of outstanding mentorship and demonstration of a career plan that shows commitment
  to pediatric cancer investigation are critical components of a successful application.
  These grants are designed to fill the critical need for start-up funds for less
  experienced researchers to pursue promising research ideas. These grants encourage
  and cultivate the best and brightest researchers of the future and lead to long
  term commitments to research projects. Awards are $50,000 per year for two years.
