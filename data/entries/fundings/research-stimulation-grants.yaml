comments: 'Research Stimulation Grants award up to $7,500 for projects of six months
  to one year''s duration. This grant program is intended to: Support research of
  value to the practicing physician, Encourage proposals by junior investigators,
  Fund pilot studies. Funds: Pilot projects or preliminary efforts that pose questions
  of high relevance for family physicians and their patients; Projects that lead to
  the completion of a larger research project or will be a catalyst for a large-scale
  project; Projects that focus on new researchers or those who mentor new investigators
  by including them as part of the research teams. Eligibility: The principal investigator
  or one of the co-investigators must be a family phyician who is a member of the
  AAFP at the time of application.'
