comments: Through its new Making a Difference in Real-World Bioethics Dilemmas grants
  program, the foundation will support mentored projects, senior collaborations, normative
  analyses of  empirical research conducted with other funding, and empirical studies
  of the attitudes of clinical trials participants with respect to sharing clinical
  trials data.  Priority  will be given to collaborative projects involving a bioethics
  scholar and persons with on-the-ground experience in other fields where bioethics
  dilemmas arise (e.g., clinical care, biomedical research, biotechnology innovation,
  or public service). Projects may be empirical, conceptual, or normative in nature.
