name: Gulf Research Program Early-Career Research Fellowships
description: "The Gulf Research Program’s Early-Career Research Fellowship supports\
  \ emerging scientific leaders as they take risks on research ideas not yet tested,\
  \ pursue unique collaborations, and build a network of colleagues who share their\
  \ interest in improving offshore energy system safety and the well-being of coastal\
  \ communities and ecosystems.\r\n\r\nBecause the early years of a researcher’s career\
  \ are a critical time, the relatively unrestricted funds and mentoring this fellowship\
  \ provides help recipients navigate this period with independence, flexibility,\
  \ and a built-in support network."
