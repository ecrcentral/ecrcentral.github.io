name: Chrétien International Research Grants
description: In honor of the memory of Henri Chrétien, French Professor of Optics
  and co-originator of the Ritchey-Chrétien telescope design, the American Astronomical
  Society has been named to administer grants to further international collaborative
  projects in observational astronomy. Emphasis is on long-term visits and the development
  of close working relationships with astronomers in other countries. Preference will
  be given to individuals of high promise who are otherwise unfunded.
