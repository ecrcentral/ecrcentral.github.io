comments: 'Eligibility: Astronomers with a Ph.D or equivalent; graduate students are
  not eligible. Up to $20,000 (U.S.) is available each year to one or more individuals
  or groups to be used for the support of international observational astronomy with
  the emphasis upon long-term, international visits.'
benefits: The awards may be used to cover any reasonable costs associated with astronomical
  observational research including travel costs, salary, publication costs, and small
  pieces of research equipment. If appropriate, the recipient's family is encouraged
  to accompany him/her on the long-term international visit.
