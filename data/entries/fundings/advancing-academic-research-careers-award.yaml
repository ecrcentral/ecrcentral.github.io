comments: Applicants must work in conjunction with mentors to develop mentored teaching
  and research plans tailored to the applicant's career stage. The plans - which should
  propose specific teaching and research activities to be completed under the guidance
  of a mentor during the eighteen-month funding period - are submitted as part of
  the application. In support of ASHA's strategic objectives, they particularly encourage
  those applications that focus the mentored teaching and/or research component on
  clinical practice research, implementation science and Interprofessional Education
  and Interprofessional Practice (IPE/IPP).
