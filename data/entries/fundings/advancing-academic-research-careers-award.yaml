name: Advancing Academic-Research Careers Award
description: The Advancing Academic-Research Careers (AARC) Award is intended to support
  the academic-research careers of junior-level faculty in the discipline of communication
  sciences and disorders (CSD). AARC is an award that supports mentored activities
  in both teaching and research.
