description: Postdoctoral Research Fellowships are training grants designed to enable
  young investigators to qualify for independent careers in suicide research. The
  training can be in either basic or clinical research and must be full-time; that
  is, Fellows are expected to devote at least 40 hours per week to the training program
  and may not have any significant clinical or other responsibilities during the funding
  period.
