comments: Since 1981, ATA has provided grants to innovative tinnitus research projects.
  To date, we have distributed nearly 6 million dollars in research funding, supporting
  projects that have improved our medical understanding of tinnitus, developed new
  tinnitus management tools, and laid the foundation for future cures. ATA encourages
  clinicians, academics and researchers from around the world to apply for grant funding.
  This is a highly competitive program, but all completed applications will be peer-reviewed
  and considered by the Scientific Review Committee. ATA funds research grants up
  to $50,000 per project, per year.  Multi-year projects are considered but funding
  is reviewed and appropriated on a year-to-year basis. (ATA does not guarantee continued
  funding for projects continuing beyond the current annual grant cycle. Multi-year
  research projects must re-apply for grant consideration each year.) The maximum
  funding for any project is $150,000 over 3 years.
