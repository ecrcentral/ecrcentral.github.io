name: Small Grants on Primary Immunodeficiency Diseases (R03)
description: This Funding Opportunity Announcement (FOA) will support small grants
  on primary immunodeficiency diseases focusing on ex vivo studies with human specimens
  and on studies with current or new animal models including novel clinical strategies
  for detecting, identifying the molecular basis of, or developing innovative therapies
  for primary immunodeficiency diseases. In addition, this FOA aims to encourage analyses
  of clinical data and samples maintained in primary immunodeficiency registries,
  consortium databases and repositories to address questions relevant to primary immunodeficiency
  research.   The R03 grant supports different types of projects including pilot and
  feasibility studies; secondary analysis of existing data; small, self-contained
  research projects; development of research methodology; and development of new research
  technology. The R03 is intended to support small research projects that can be carried
  out in a short period of time with limited resources. Investigators who have not
  received independent NIH funding or independent NIH funding in this field are encouraged
  to apply to this FOA
