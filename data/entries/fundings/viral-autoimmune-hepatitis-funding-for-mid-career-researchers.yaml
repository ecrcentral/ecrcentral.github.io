name: 'Viral & Autoimmune Hepatitis: Funding for Mid-Career Researchers'
description: The Medical Research Foundation is inviting applications from mid-career researchers who have the potential to be the research leaders of the future, to support research that will increase understanding of the disease mechanisms underlying viral or autoimmune hepatitis. Researchers whose work may lead to better understanding of prevention, diagnosis or modification of the progression and outcomes of these diseases are welcome to apply.
