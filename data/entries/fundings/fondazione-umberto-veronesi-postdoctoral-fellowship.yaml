description: From 10 June to 5 September 2019 , doctors and biomedical researchers participated in the Post-Doctoral Fellowship 2020 call of the Umberto Veronesi Foundation , with which funding was made available for research in the area of ​​oncology, cardiovascular diseases, neuroscience and the prevention of chronic diseases through lifestyles (impact of diet, physical activity and pollution on health). In 2020 Umberto Veronesi Foundation disburses 152 annual research grants and 10 six-monthly travel grants for Italian researchers who wish to spend a period of work and professional training in a foreign research institute. The complete announcement and the procedures for submitting your application are available on the website bags.fondazioneveronesi.it .
