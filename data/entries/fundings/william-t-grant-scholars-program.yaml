comments: 'LIMITED SUBMISSION (limit 1 per major division at JHU): The Scholars Program
  is a professional development program for early-career researchers in the social,
  behavioral, or health sciences. The Foundation supports research to understand and
  improve the everyday settings of youth ages 8 to 25 in the U.S. Fellowship advances
  the Foundation''s interest in understanding programs, policies, and practices that
  reduce inequality or understanding the use of research evidence. Note: In 2014,  announced
  a new focus on reducing inequality, which will replace the social settings initiative.
  For the 2014-15 transition year, accepting Scholars applications on all three topics:
  1) reducing inequality, 2) understanding the use of research evidence, and 3) understanding
  social settings. $350,000 over 5 years.'
