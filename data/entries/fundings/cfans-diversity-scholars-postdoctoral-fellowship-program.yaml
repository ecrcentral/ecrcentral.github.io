name: CFANS Diversity Scholars Postdoctoral Fellowship Program
description: The CFANS Diversity Scholars Postdoctoral Fellowship Program is an initiative
  to attract promising indigenous scholars and scholars of color with potential to
  pursue future faculty positions at the University of Minnesota and at other top
  research universities. Fellows work with CFANS faculty members on independent research
  and participate in activities related to professional development in academia such
  as teaching and learning, competitive grant writing, supervision of students and
  staff, and research program development. The purpose of the program is to nurture
  scholars’ intellectual development and professional growth, and position them for
  success in future tenure-track academic positions.
