comments: The purpose of the Young Investigator Grant Program is to support research
  in the fields of nephrology, urology and related disciplines by individuals who
  have completed fellowship training and who hold junior faculty positions at university-affiliated
  medical centers in the United States.  Initial support for awards will be provided
  for one year in a total amount not to exceed $20,000. Although funding for a second
  year of support is not guaranteed, the investigator may request an additional year's
  funding at $20,000 per annum as a competitive renewal.
