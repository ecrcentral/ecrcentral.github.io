name: Jane Coffin Childs Memorial Fund for Medical Research
description: The Jane Coffin Childs Memorial Fund for Medical Research (known colloquially
  as the JCC Fund) was established in 1937 for the purpose of supporting research
  into the causes and treatment of cancer. The Fund has taken a broad approach to
  the study of cell growth and development, emphasizing the study of the basic biology
  and chemistry of the underlying processes. The Fund has increasingly focused its
  resources on the funding of three-year postdoctoral Fellowships, supporting Fellows
  selected by its Board of Scientific Advisers from among the best young scientists
  at what is often a critical stage in their careers. As a result, there have been
  over 1,600 Jane Coffin Childs Fellows doing basic cancer-related research in laboratories
  in North America, Europe, Japan and Australia.
