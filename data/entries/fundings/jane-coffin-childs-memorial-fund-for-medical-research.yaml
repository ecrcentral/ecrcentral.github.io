comments: "Applicants may be citizens of any country, but for foreign nationals awards\
  \ will be made only for study in the United States. American citizens may hold a\
  \ fellowship either in the United States or in a foreign country.\r\n\r\nEligibility\
  \ requirements for this postdoctoral fellowship are as follows:\r\n\r\n    Postdoctoral\
  \ applicants should have no more than one year of postdoctoral research experience\
  \ at the time of the deadline for submitting applications (February 1).\r\n    PhD.\
  \ degree must not have been conferred more than 18 months prior to the deadline\
  \ date (February 1)\r\n    MD. degree should not have been conferred more than three\
  \ years before deadline date of application (February 1)\r\n    PhD. candidates\
  \ that do not have their degree at time of application deadline (February 1) are\
  \ eligible to apply. If awarded, the applicant’s PhD. degree must be conferred prior\
  \ to the start of the Fellowship."
benefits: "The basic stipend is $52,000 for the first year, $54,000 for the second\
  \ year, and $56,000 the third year, with an additional $1000 for each dependent\
  \ child. There is no dependency allowance for a spouse.\r\n\r\nAn allowance of $2,000\
  \ a year toward the cost of the research will be made available to the laboratory\
  \ sponsoring the fellow. The research allowance is not to be used for travel.\r\n\
  \r\nThe Fellow will have access to $1,800 for travel to science meetings, please\
  \ look at the travel policy. In addition to the travel allowance the Fund provides\
  \ a travel award for the Fellow and their family to travel to the sponsoring laboratory."
