name: 'Early Career Fellowships: William St Clair'
description: "To honour the life and work of William St Clair, the St Clair family\
  \ has established an Early Career funded fellowship at The School of Advanced Study\
  \ to help support the research and professional development of early career researchers\
  \ in languages, literatures and cultures. Fellows are expected to pursue their own\
  \ research during the five months of the Fellowship and to contribute to the work\
  \ of the Institutes of Classical Studies, English Studies, and Languages, Cultures\
  \ and Societies as appropriate.  A distinguished independent scholar, William St\
  \ Clair was a Senior Research Fellow in the Institute of English Studies, whose\
  \ wide-ranging multi-disciplinary research interests encompassed literary history\
  \ and biography, Romanticism, archaeology and classical antiquities, and the history\
  \ of the book and publishing, particularly open-access publishing. We invite applications\
  \ from early career scholars who have active research interests in any of these\
  \ areas.\r\n\r\nThe Fellows will be based in the Institutes of Classical Studies,\
  \ English Studies, and Languages, Cultures and Societies, as appropriate.\r\n\r\n\
  Applicants are invited to submit a research proposal on a topic of their choice.\
  \ This should specify as an objective a defined outcome for the research carried\
  \ out during the period of the fellowship, such as a grant proposal, an article,\
  \ chapter in a book and/or detailed proposal for a book.\r\n\r\nThe Fellowships\
  \ will last five months. Because of the nature of the funding, successful applicants\
  \ must be available to take up the fellowship by January 2025 at the earliest or\
  \ by the end of June 2025 at the latest. Fellows will receive a stipend of £2,000\
  \ per month; this may be used as a contribution towards travel and/or accommodation\
  \ costs during the Fellowship, though residence in London is not a requirement of\
  \ these posts. Payment will be made in two instalments during the course of the\
  \ Fellowship, at commencement and in month 3. The overall payment is £10,000 or\
  \ pro rata if the fellowship is terminated early. Some additional funding will be\
  \ available to support events and activities.\r\n\r\nThe Fellowships are intended\
  \ to support early career researchers without a permanent academic post. In order\
  \ to be eligible for the scheme, early career scholars (i.e. scholars within eight\
  \ years of PhD award, not including any period of career break) must have been awarded\
  \ their PhD by the start of the fellowship. Independent researchers without a PhD\
  \ would not normally be eligible."
