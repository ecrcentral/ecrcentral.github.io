name: GINGKO Grants Programme
description: 'GINGKO provides grants to support academic research into the history, art history and religions of MENA. GINGKO also offers grants for people organising transformative interfaith and intercultural encounters between people from MENA and the West. The Werner Mark Linz Memorial Grant (WMLM) is a medium-scale award to fund academic research projects, conferences or symposiums on one or more of GINGKO''s academic subject areas – the history, art history or religions of the MENA region – in any time period. GINGKO awards up to one WMLM Grant per year, normally up to a maximum of £10,000 for each grant. The Research Grant is a small-scale award to fund academic research, conferences or symposiums on one or more of GINGKO''s academic subject areas – the history, art history or religions of the MENA region – in any time period. GINGKO awards up to three Research Grants per year, normally up to a maximum of £3,000 for each grant. The Encounters can be but need not be academic in nature. They must aim to improve mutual understanding between MENA and the West. GINGKO awards up to three Encounter Grants per year, normally up to a maximum of £3,000 for each grant.'
