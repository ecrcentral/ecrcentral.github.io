comments: The Kimberly-Clark Nursing Research Award is designed primarily for researchers
  whose efforts are on the beginning developments of a program of research. Awards
  are granted to researchers whose proposals investigate variables relevant to women's
  health, obstetric, or neonatal nursing. Preference is given to proposals with skin
  care as the subject matter. Studies that are clinically focused and outcome based
  are a priority. Projects that focus on the nurse's role in delivering cost-effective
  care in these subspecialties are encouraged.
