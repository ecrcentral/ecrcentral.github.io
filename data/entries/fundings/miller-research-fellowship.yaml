name: Miller Research fellowship
description: The Miller Institute for Basic Research in Science invites department
  chairs, faculty advisors, professors and research scientists at institutions around
  the world to submit online nominations for Miller Research Fellowships in the basic
  sciences. The Miller Institute seeks to discover and encourage individuals of outstanding
  talent, and to provide them with the opportunity to pursue their research on the
  Berkeley campus. Fellows are selected on the basis of their academic achievement
  and the promise of their scientific research. Miller Fellows also have a keen curiosity
  about all science and share an appreciation for an interdisciplinary experience.
