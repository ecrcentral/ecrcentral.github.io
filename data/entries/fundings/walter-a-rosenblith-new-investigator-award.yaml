comments: The purpose of this award is to bring new, creative investigators into active
  research on the health effects of air pollution. It will provide three years of
  funding for a small project relevant to HEI’s research interests to a new investigator
  with outstanding promise at the Assistant Professor or equivalent level. At the
  time of application the candidate should have two to six years of research experience
  after obtaining the highest degree and must be in an entry-level position at an
  academic institution (generally assistant professor level) or its equivalent in
  a research institution. Each award will be up to $150,000 per year with a maximum
  of $450,000 for three years in total costs to support a research project.
