name: Avenir Award Program for Genetics or Epigenetics of Substance Abuse (DP1)
description: "Avenir means future in French, and this award looks toward the future\
  \ by supporting early stage investigators proposing highly innovative studies. The\
  \ award will support those in an early stage of their career who may lack the preliminary\
  \ data required for an R01 grant, but who propose high impact research and who show\
  \ promise of being tomorrow's leaders in the field. NIDA has developed two Avenir\
  \ Award Programs, one for HIV/AIDS research and the other for genetics or epigenetics\
  \ studies.\r\n\r\nThe Genetics or Epigenetics of Substance Use Disorders Avenir\
  \ Award program supports early stage investigators proposing highly innovative studies\
  \ that open new areas of research for the genetics or epigenetics of addiction.\
  \  These may be novel methods or approaches that can potentially be applied to the\
  \ analysis of the genetics or epigenetics of addiction.  Investigators outside the\
  \ field of addiction interested in applying their novel approaches to the genetics\
  \ or epigenetics of addiction are encouraged to apply.  The award will support those\
  \ in an early stage of their career who may lack the preliminary data required for\
  \ an R01 grant, but who propose high impact research and who show promise of being\
  \ tomorrow's leaders in the field of genetics or epigenetics of substance use disorders."
