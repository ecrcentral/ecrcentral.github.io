comments: In recognition of the importance of research to the advancement of librarianship
  and information science, OCLC and ALISE promote independent research that helps
  integrate new technologies that offer innovative approaches and contributes to a
  better understanding of the information environment and user expectations and behaviors.
  Through its OCLC/ALISE Library & Information Science Research program, OCLC will
  award one-year grants of up to $25,000 for research related but not limited to the
  major OCLC Research themes, the impact of digital technology on libraries and museums,
  social media and information-seeking behavior, and new developments in knowledge
  organization (metadata, social tagging, linked data, etc.)
