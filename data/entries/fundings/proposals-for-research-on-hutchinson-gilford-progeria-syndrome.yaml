comments: 'PRF is seeking proposals that address the following priorities: 1. Discovery
  of biological markers of disease in HGPS that can be assessed in human and/or mouse
  samples. Highest priority will be given to those markers that can be assayed in
  easily obtainable human samples such as blood, urine, and cheek swabs. In addition,
  proposals that explore biomarker relevance to disease process and /or change in
  markers with disease treatment are encouraged. 2. Discovery and/or testing of candidate
  treatment compounds in both cell based and mouse models of HGPS. Of note, proposals
  should test compounds in a progerin-producing mouse model as the priority. Comparisons
  to other mouse models of disease, such as ZMPSTE24 -/- and other non-progerin producing
  mouse models is acceptable, but only as a comparison to progerinproducing models.'
