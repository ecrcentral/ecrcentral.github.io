comments: Open to SRS Candidate Fellows or investigators who have not previously received
  an SRS Standard Grant, ORS, OREF, USA Federal grant (or OUS equivalent) and have
  completed 10 years or less of practice or at the committee’s discretion. The work
  must be both conceptualized and executed by the young investigator. Reviewers will
  consider the extent of which the project seems to be the young investigator’s own
  work rather than that of a more senior collaborator. Involvement, however, of an
  experienced mentor in an advisory role is encouraged and will be viewed positively.
  Applicants do not need to be members of the SRS but do need to have at least one
  SRS member as a co-investigator. Funds are for work to be performed, not works in
  progress or already completed.
