name: External Faculty Fellowships
description: External fellowships are intended primarily for individuals currently
  teaching in or affiliated with an academic institution, but independent scholars
  may apply. Faculty fellowships are awarded across the spectrum of academic ranks
  (assistant, associate, and full professor) and a goal of the selection process is
  to create a diverse community of scholars. Applicants who are members of traditionally
  under-represented groups are encouraged to apply. There are no citizenship requirements
  for these fellowships; non-U.S. nationals are welcome to apply. Awards are made
  from an applicant pool of approximately 350.
