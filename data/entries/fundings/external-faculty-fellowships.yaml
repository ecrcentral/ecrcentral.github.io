comments: Junior fellowships are for scholars who will be at least three and no more
  than ten years beyond receipt of the PhD by the start of the fellowship year. Fellowships
  are for one full academic year, and require the fellow to be in residence. Fellows
  are awarded stipends of up to $70,000 and a housing and moving allowance of up to
  $30,000.
benefits: "Fellows are awarded stipends of up to $70,000 and a housing and moving\
  \ allowance of up to $40,000. Applicants who require additional support are expected\
  \ to seek supplementary funding in the form of external grants or sabbatical or\
  \ other contributions from home institutions.\r\n\r\nThe Center is unable to provide\
  \ or finance medical insurance. Fellows are required to make individual arrangements\
  \ for reasonable coverage during their fellowship year."
