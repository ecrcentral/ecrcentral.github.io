name: Australia India Women Researchers’ Exchange (AIWE) Program
description: <p>The Australia India Women Researchers&rsquo; Exchange (AIWE) Program
  is an initiative aimed at strengthening collaboration between Australia and India
  while addressing gender equity in STEM research. The AIWE program offers 10 fellowships
  for early-career postdoctoral researchers in STEM disciplines. Each fellowship supports
  a 6 to 8-week research exchange between Australia and India, to be completed by
  31 May 2025. - Five fellowships will be awarded to Indian women researchers from
  central and state public universities in Tier 2 and Tier 3 cities. - Five fellowships
  will be awarded to Australian women researchers from universities in regional centres.
  The AIWE Program is administered by the Australia India Institute and funded by
  the Australian Government Department of Education.</p>
