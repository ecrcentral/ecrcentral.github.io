comments: "Grants are open to women scholars conducting basic research in engineering,\
  \ medicine, or physical or biological sciences. AAUW follows the National Science\
  \ Foundation’s definition of basic research: “activity aimed at acquiring new knowledge\
  \ or understanding without specific immediate commercial application or use.”\r\n\
  The grantee must plan to publish this research in a scholarly scientific publication\
  \ within six months of the end of the grant year and be listed as the sole author,\
  \ senior author, first author, or an author of equivalent significance.\r\nApplicants\
  \ must hold a doctorate degree in engineering, medicine, or the physical or biological\
  \ sciences.\r\nTenured professors are not eligible.\r\nThe grants are for tenure\
  \ track, part-time and temporary faculty, as well as new and established researchers\
  \ at universities.\r\nApplicants may not apply for another AAUW national fellowship\
  \ or grant in the same year."
