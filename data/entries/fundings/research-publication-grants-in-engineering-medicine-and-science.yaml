name: Research Publication Grants in Engineering, Medicine and Science
description: These grants help women overcome these barriers by funding research projects
  that will culminate in scholarly publications. They are open to women scholars conducting
  basic research in engineering, medicine or the physical or biological sciences and
  who have a doctorate degree in one of those fields. The grantee must publish their
  research in a scholarly publication and be listed as a primary author.
