name: Imaging - Science Track Award for Research Transition (I/START) (R03)
description: This funding opportunity announcement (FOA) encourages Small Research
  Grant (R03) applications to facilitate the entry of investigators to the area of
  neuroimaging, including both new investigators and established investigators seeking
  to adopt neuroimaging methodologies in their research programs, to enable the conduct
  of small "proof of concept" studies. The R03 is intended to support research projects
  that can be carried out in a short period of time with limited resources.
