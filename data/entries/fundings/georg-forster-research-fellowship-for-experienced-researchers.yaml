name: Georg Forster Research Fellowship for Experienced Researchers
description: This grant is for highly-qualified scientists of all disciplines from
  developing and transition states. Candidates who completed their doctorates less
  than 12 years ago. The fellowship allows them to conduct their own long-term research
  project (six to 18 months) in cooperation with an academic host of their own choice
  at a research institution in Germany.
