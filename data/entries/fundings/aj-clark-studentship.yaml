description: 'This studentship enables scientists with degrees in pharmacology or related disciplines to carry out research in pharmacology leading to the degree of PhD. Winners will receive nearly £100,000 over three years. As of the 2020 award, studentships will be co-funded with the host universities. The British Pharmacological Society will commit to funding 50% of the following costs. This studentship enables scientists with degrees in pharmacology or related disciplines to carry out research in pharmacology leading to the degree of PhD. Winners will receive nearly £100,000 over three years. As of the 2020 award, studentships will be co-funded with the host universities. The Society will commit to funding 50% of the following costs. Stipends: Year 1 – £18,527 in London and £16,364 elsewhere; Year 2 – £19,489 in London and £17,339 elsewhere; Year 3 – £20,432 in London and £18,294 elsewhere. Other costs: Research costs - £10,000 per year; Up to £1,000 per year to support attendance at non-Society meetings; Course fees paid at the rate applicable to EU students.'
