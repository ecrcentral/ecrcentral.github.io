name: DFG Initiation of International Collaboration
description: The DFG Initiation of International Collaboration programme facilitates
  the establishment of new international research partnerships. It supports bilateral
  workshops, international travel, and visiting scholar exchanges. The lead applicant
  must work at a German research institution. Covers travel expenses and daily/monthly
  allowances. Rolling submissions accepted at any time.
