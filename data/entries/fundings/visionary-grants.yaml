name: Visionary Grants
description: The APF Visionary Grants provide up to $20,000 to seed innovation through
  supporting research, education, and intervention projects and programs. Applicants
  must be a graduate student or early career researcher (no more than 10 years postdoctoral),
  affiliated with a nonprofit charitable, educational or scientific institution, or
  governmental entity operating exclusively for charitable and educational purposes,
  and have demonstrated competence and capacity to execute the proposed work.
