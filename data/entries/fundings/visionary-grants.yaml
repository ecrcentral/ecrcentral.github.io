comments: 'The APF Visionary Grants seek to seed innovation through supporting research,
  education and intervention projects and programs that use psychology to solve social
  problems in the following priority areas: Understanding and fostering the connection
  between behavior and physical health to ensure well-being. Reducing stigma and prejudice
  to promote unity and harmony.Understanding and preventing violence to create a safer,
  more humane world. Supporting programs that address the long-term psychological
  needs of individuals and communities in the aftermath of disaster. One-year grants
  are available in amounts of up to $20,000. Preference will be given to pilot projects
  that, if successful, would be strong candidates for support from major federal and
  foundation funding agencies, and “demonstration projects” that promise to generalize
  broadly to similar settings in other geographical areas and/or to other settings.'
