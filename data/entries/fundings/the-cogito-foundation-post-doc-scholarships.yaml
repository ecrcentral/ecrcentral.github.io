name: The cogito foundation Post doc scholarships
description: The foundation grants project oriented stipends for scientists recently
  graduated as PhD who want to perform post doc studies at a foreign institution.
  The criteria are the qualifications of the researcher, the quality of the research
  plan and of the institution the grantee wants to work (PhD studies are not supported).
