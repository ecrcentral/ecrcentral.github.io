comments: The main aspect of such proposals needs to be in the cross-disciplinary
  collaboration between the Sciences and the Humanities, where both parties gain scientifically
  from the research project. Thus the collaboration needs to transcend the established
  application of a method from one field in another. For instance purely neuroscientific
  investigations of the mind or art-historic studies applying chemical analysis are
  not cross-disciplinary in the sense we envision.
