name: Cancer Research Grants Program
description: The Elsa U. Pardee Foundation funds research to investigators in United
  States non-profit institutions proposing research directed toward identifying new
  treatments or cures for cancer. The Foundation funds projects for a one year period
  which will allow establishment of capabilities of new cancer researchers, or new
  cancer approaches by established cancer researchers. It is anticipated that this
  early stage funding by the Foundation may lead to subsequent and expanded support
  using government agency funding. Project relevance to cancer detection, treatment,
  or cure should be clearly identified. By design, there are no limits set on the
  grant amount that can be requested. It must be reasonably and clearly supported
  by the scope of the project outlined in the application. Applications requesting
  more than 5% overhead are usually not considered. Papers verifying nonprofit status
  and relevant human subject and experimental animal treatment approvals from the
  recipient institution will be requested prior to project initiation. A final report
  summarizing financial expenditure and research achievement is required.
