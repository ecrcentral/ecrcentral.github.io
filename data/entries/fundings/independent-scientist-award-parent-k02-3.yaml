name: Independent Scientist Award (Parent K02)
description: "The purpose of the NIH Independent Scientist Award (K02) is to foster\
  \ the development of outstanding scientists and enable them to expand their potential\
  \ to make significant contributions to their field of research. The K02 award provides\
  \ three to five years of salary support and \"protected time\" for newly independent\
  \ scientists who can demonstrate the need for a period of intensive research focus\
  \ as a means of enhancing their research careers. Each independent scientist career\
  \ award program must be tailored to meet the individual needs of the candidate.\r\
  \n\r\nThis Funding Opportunity Announcement (FOA) is designed specifically for applicants\
  \ proposing to serve as the lead investigator of an independent clinical trial,\
  \ a clinical trial feasibility study, or a separate ancillary study to an existing\
  \ trial, as part of their research and career development. Applicants not planning\
  \ an independent clinical trial, or proposing to gain research experience in a clinical\
  \ trial led by another investigator, must apply to companion FOA (PA-18-371)."
