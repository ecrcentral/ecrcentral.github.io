name: U.S.-Israel Binational Science Foundation (BSF) Start-Up Research Grant
description: The Start-Up Grant Program is meant to help newly appointed researchers
  who are beginning their independent research careers and may not yet have initial
  results to substantiate their application. Grants are for two years, in order to
  enable the grantees to submit a standard application to the next competition in
  their area of research. It is implemented within the framework of the regular BSF
  Research Grants program, i.e., it must exhibit scientific excellence, have a strong
  element of cooperation between Israeli and American scientists, and fall within
  the areas of research supported in that year by the BSF. In addition, at least one
  of the principal investigators should have attained his/her Ph.D., M.D. degree or
  equivalent, no more than ten years prior to submitting his/her proposal. To allay
  any doubts, we use the terms ‘Senior PI’ and ‘Junior PI’, referring to the established
  scientist and the one in the first stages of his/her independent career.
