name: Harvard University Society of Fellows Junior Fellowship Program
description: Candidates are nominated for Junior Fellowships, generally by those under
  whom they have studied. Applications are not accepted from the candidates themselves.
  A letter of nomination should include an assessment of the candidate’s work and
  promise, i.e. a full letter of recommendation, and also provide complete contact
  information for the candidate, including current residential address and email address,
  and the names, mailing addresses, and email addresses of three additional people
  who agree to write letters of recommendation by the date requested when they are
  contacted by the Society. Men and women interested in any field of study are eligible
  for these fellowships. Nominees should be of the highest caliber of intellectual
  achievement, i.e. comparable to the most successful candidates for junior faculty
  positions at leading universities.
