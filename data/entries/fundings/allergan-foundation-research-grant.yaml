comments: The American Optometric Foundation, the charitable arm of the American Academy
  of Optometry, is inviting applications for research projects related to glaucoma
  and the anterior segment. Through the Allergan Foundation Research Grant program,
  a single grant of $60,000 will be awarded to an optometry and vision science faculty
  member/researcher and up to three co-investigators in the area of glaucoma or the
  anterior segment. In addition, a $750 travel grant will be provided for the principal
  investigator and his/her co-investigators on the project to attend the next AAO
  annual conference. (The recipient(s) must submit a minimum 500-word report of his/her
  research findings to the AOF at the end of the award period in order to be eligible
  for subsequent awards sponsored by the Allergan Foundation.) The award is open to
  all faculty members and researchers in optometry and vision science.
