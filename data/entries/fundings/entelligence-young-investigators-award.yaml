name: ENTELLIGENCE Young Investigators Award
description: ENTELLIGENCE is a program designed for basic science, translational and
  clinical research in the field of cardiopulmonary medicine. The ENTELLIGENCE program
  provides opportunities for individual young investigators to promote quality medical
  care and enhance patients' lives by supporting research (basic science, translational
  and clinical research) in the area of pulmonary hypertension (PH) related to expanding
  our knowledge of the pathways involved in pulmonary vascular pathobiology and ultimately,
  to improve treatment for patients with pulmonary hypertension.
