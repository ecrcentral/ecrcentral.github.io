comments: 'The CSCDP seeks the best and the brightest; CSCDP participants are selected
  via a highly competitive application process. The program was created in 2003 to
  address a growing concern over the steady decline of orthopaedic clinician researchers
  and to confront the lack of basic and clinical research in many residency programs.  The
  CSCDP covers a wide array of issues spanning the career timeline of a clinician
  scholar. Program participants seek to enhance the competencies needed for success
  as both a surgeon and a scientist: scientific knowledge, professionalism, responsible
  conduct of research, research skill development, management and leadership skills,
  and communication skills.'
benefits: The cost of sponsorship is inclusive of roundtrip economy airfare, two nights
