name: Clinician Scholar Career Development Program (CSCDP)
description: The Clinician Scholar Career Development Program (CSCDP) is an annual
  two-day training workshop for orthopaedic residents in their PGY2-PGY5 years, surgeons
  in fellowships, and junior faculty (through year three) who have the potential and
  desire to become orthopaedic clinician scholars. Clinician scholars advance the
  field of orthopaedics through innovative research and peer-reviewed funding.
