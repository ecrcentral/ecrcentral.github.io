comments: 'The Bay Area Lyme Foundation Emerging Leader Awards (ELA) recognize up-and-coming
  researchers bringing new approaches and creative thinking to the field of Lyme disease.
  These grants support new and innovative projects and aim to attract aspiring new
  scientific talent to the field of Lyme. Candidate applications must include a viable
  proposal for a proof-of-concept to be funded, in part or in sum, by the grant award.
  New in 2017: our $250,000 ELA grant targets veteran scientific talent with the title
  of associate professor or above who have not previously worked in Lyme disease research.  Applicants
  must be at a US academic institution or corporate equivalent and propose to apply
  their work in other fields to therapeutics or diagnostics in Lyme disease.'
