name: New Practitioner Pharmacist Leadership Research Grant
description: The ASHP Research and Education Foundation is offering a competitive
  grant program for research to be conducted by new practitioner pharmacists (within
  5 years of their pharmacy degree, including those who arecurrently in ASHP-accredited
  residency programs) to stimulate quality innovative leadership development practices
  that enhance outcomes for clinicians, patients and organizations. A secondary goal
  is to develop new practitioner research skills while fostering development of mentoring
  relationships with more experienced senior investigators.
