name: Mentored Clinical Scientist Research Career Development Award (Parent K08)
description: The primary purpose of the NIH Mentored Clinical Scientist Research Career
  Development Awards (K08) program is to prepare qualified individuals for careers
  that have a significant impact on the health-related research needs of the Nation.
  This program represents the continuation of a long-standing NIH program that provides
  support and "protected time" to individuals with a clinical doctoral degree for
  an intensive, supervised research career development experience in the fields of
  biomedical and behavioral research, including translational research.
