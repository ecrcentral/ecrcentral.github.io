comments: The Plastic Surgery Foundation, the philanthropic arm of the American Society
  of Plastic Surgeons, is accepting applications for research projects that address
  a topic of importance to the current clinical practice of plastic surgery. Through
  the National Endowment for Plastic Surgery grant program, the foundation will award
  a single grant of up to $50,000 to a project that is clinically relevant, immediate,
  and/or addresses an emerging issue in the field. Priority will be given to well-developed
  projects with a high likelihood of impact on the scientific discipline and/or on
  patient care.
