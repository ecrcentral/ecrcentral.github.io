comments: "The award is awarded for 1 year with the possibility of a 2nd year renewal.\r\
  \nApplicants must have a doctoral degree (M.D. or Ph.D.) by the date of award activation\
  \ and must conduct their proposed research/project under a Mentor who holds a formal\
  \ appointment at the host institution’s Department/Division of Dermatology. •New\
  \  applicants  must hold  a  trainee  position,  such  as  postdoc  or  medical\
  \  resident,  at  a  not-for-profit, non-governmental U.S. research institution\
  \ at the time of application. Applications  are  limited  to  applicants  from \
  \ a  Department/Division  of  Dermatology  with  an  established pigmented lesion\
  \ clinic/program. Mentors  must  be  a  faculty  member  with  an  appointment \
  \ in  a U.S.  department/division  of  dermatology  with  an ACGME  (Accreditation\
  \  Council  for  Graduate  Medical  Education)  approved  training program (secondary\
  \ appointments are allowed)."
