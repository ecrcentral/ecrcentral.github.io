name: ERC Synergy Grant
description: ERC Synergy Grants support groups of 2 to 4 researchers working together
  on ambitious research problems that can only be addressed through the combined skills
  of the team. Each Principal Investigator must bring complementary expertise. Awards
  up to EUR 10 million (exceptionally up to EUR 14 million) over 6 years. Open to
  researchers of any nationality.
