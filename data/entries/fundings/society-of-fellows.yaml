name: Society of Fellows
description: The Michigan Society of Fellows, under the auspices of the Rackham Graduate
  School, was established in 1970 with endowment grants from the Ford Foundation and
  the Horace H. and Mary Rackham Funds. Each year the Society selects outstanding
  applicants for appointment to three-year fellowships in the humanities, the arts,
  the social, physical, and life sciences, and in the professional schools.  We seek
  a diverse and international pool of applicants and especially welcome candidates
  from underrepresented backgrounds.
