name: 'German Research Foundation (DFG): Research Grant'
description: The grants enable scientists and academics to conduct research projects
  with clearly defined topics and a limited duration. Researchers from any subject
  working in Germany or at a German research institution abroad who have completed
  their academic training (usually a doctorate) are welcome to apply for the DFG Research
  Grants. Only internationally competitive research projects of high scientific quality
  and originality are eligible for submission. The funding generally covers a maximum
  period of three years. After this, however, candidates can apply for the funding
  to be renewed.
