name: Walter Benjamin Programme
description: The DFG Walter Benjamin Programme supports early-career researchers at
  a very early stage of their postdoctoral phase, enabling them to conduct an independent
  research project at a research institution of their choice worldwide. Researchers
  may work at a German institution (funded as a research position) or abroad (funded
  as a fellowship). Rolling applications accepted at any time.
