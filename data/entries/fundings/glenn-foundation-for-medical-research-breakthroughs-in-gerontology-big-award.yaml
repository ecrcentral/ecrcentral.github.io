name: Glenn Foundation for Medical Research Breakthroughs in Gerontology (BIG) Award
description: Sponsored by the Glenn Foundation for Medical Research, in collaboration
  with the American Federation for Aging Research (AFAR), the "Breakthroughs in Gerontology
  (BIG)" initiative provides timely support to a small number of research projects
  that are relatively high risk but which offer significant promise of yielding transforming
  discoveries in the fundamental biology of aging. Projects which build on early discoveries
  that show translational potential for clinically-relevant strategies, treatments
  and therapeutics, addressing human aging and health span are also considered.
