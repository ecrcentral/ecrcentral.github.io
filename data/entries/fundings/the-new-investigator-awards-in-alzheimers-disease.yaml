name: The New Investigator Awards in Alzheimer's Disease
description: Funded by The Rosalinde and Arthur Gilbert Foundation, the major goal
  of this partnership program was to support important research in areas in which
  more scientific investigation is needed to improve the prevention, diagnosis, and
  treatment of Alzheimer's disease. The program also served to encourage junior investigators
  in the United States and Israel to pursue research and academic careers in the neurosciences,
  and Alzheimer's disease in particular.
