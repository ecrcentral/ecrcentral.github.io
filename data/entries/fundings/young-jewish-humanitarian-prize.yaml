comments: The prize celebrates the vision and endeavor of an individual (or group
  of individuals) under the age of 50 whose humanitarian work has contributed significantly
  to the betterment of the world. The prize is designed to bring public recognition
  to young, dynamic individuals whose Jewish values infuse their humanitarian accomplishments
  and provide inspiration to future generations. The prize recipient(s) will join
  a cohort of recipients who exhibit leadership, innovation, and impact. The prize
  accepts nominations from around the world in all areas of humanitarian endeavor
  across a broad spectrum of disciplines, including but not limited to medicine and
  science, education, human rights, conflict resolution, community development, and
  compassionate care. Past recipients represent a range of endeavors and accomplishments
  in the fields of genetics, the environment, medical education, humanitarian relief,
  the transformation of public education, and human rights. Nominees should be individuals
  or teams (not organizations). Nominees should self-define as being Jewish, however
  that manifests itself to the individual nominee. While nominees must self-identify
  as Jewish, their endeavors may be universal, contributing to the betterment of the
  world at large. Nominators are encouraged to collaborate with their nominee to present
  a strong, well-informed nomination. Self-nominations are not accepted. The prize
  recipient(s) will receive an award of $100,000.
