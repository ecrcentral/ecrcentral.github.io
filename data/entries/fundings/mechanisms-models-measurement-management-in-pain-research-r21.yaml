name: Mechanisms, Models, Measurement, & Management in Pain Research (R21)
description: Pain is a critical national health problem; it affects millions of Americans
  and incurs significant economic costs to society. Pain often results in disability
  and, even when not disabling, it has a profound effect on the quality of life.  Its
  deleterious effects have been demonstrated in morbidity, immune function, sleep,
  cognition, eating, mobility, affective state, psychosocial behaviors, and overall
  functional status.  In the hospitalized patient, pain may be associated with increased
  length of stay, longer recovery time, and poorer patient outcomes, which in turn
  have health care quality and cost implications
