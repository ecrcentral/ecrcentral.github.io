comments: The purpose of this FOA is to inform the scientific community of the pain
  research interests of the various Institutes and Centers (ICs) at the National Institutes
  of Health (NIH) and to stimulate and foster a wide range of basic, clinical, and
  translational studies on pain as they relate to the missions of these ICs. New advances
  are needed in every area of pain research, from the micro perspective of molecular
  sciences to the macro perspective of behavioral and social sciences. Although great
  strides have been made in some areas, such as the identification of neural pathways
  of pain, the experience of pain and the challenge of treatment have remained uniquely
  individual and unsolved. Furthermore, our understanding of how and why individuals
  transition to a chronic pain state after an acute injury is limited. Research to
  address these issues conducted by interdisciplinary and multidisciplinary research
  teams is strongly encouraged, as is research from underrepresented, minority, disabled,
  or women investigators.  Budgets for direct costs of up to $50,000 per year and
  a project duration of up to two years may be requested for a maximum of $100,000
  direct costs over a two-year project period.
