name: Research Grants
description: Research grants are available to established scientists of all ages working
  at accredited institutions in the United States. Applications will be judged on
  the scientific merit and the innovative aspects of the proposal as well as on the
  competence of the applicant. Research grants of up to three years will be provided.
  A renewal grant with a maximum of two years is possible, but it will be awarded
  on a competitive basis. Research grants will not be awarded to investigators who
  have already received, or expect to receive, substantial support from other sources,
  even if it is for an unrelated purpose. Research grants normally range from $30,000
  to $75,000 per year.
