name: Liber Ero Postdoctoral Fellowship Program
description: "This post-doctoral fellowship seeks to support early-career scientists\
  \ to conduct and communicate world-class research that informs conservation and\
  \ management issues relevant to Canada. For instance, post-doctoral scholars are\
  \ encouraged to confront emerging management challenges that are time sensitive\
  \ or tackle ‘wicked’ conservation problems with novel analyses, perspectives, and\
  \ novel collaborations. Conservation science includes natural, social, and interdisciplinary\
  \ research pursuits.\r\n\r\nThe Liber Ero Fellowship program aims to:\r\n\r\nFacilitate\
  \ applied conservation research collaborations that links institutions, researchers,\
  \ and conservation practitioners.\r\nProvide support and unique training opportunities\
  \ for emerging conservation leaders at a critical stage in their careers.\r\nIncrease\
  \ the capacity of the Canadian scientific community to address pressing conservation\
  \ and management issues.\r\nThis program is supported by Canadian philanthropists\
  \ dedicated to the conservation of Canada’s biodiversity. Modelled after the Smith\
  \ Fellows program based in the United States, the Liber Ero Fellows program was\
  \ launched in 2013 and has developed into a unique Canadian program. The phrase\
  \ “Liber Ero,” Latin for “I will be free,” reflects the goal of the program to foster\
  \ independence and creativity and is the heraldic motto of the benefactors."
