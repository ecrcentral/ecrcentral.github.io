comments: 'The David Wechsler Early Career Grant for Innovative Work in Cognition
  supports early career psychologists pursuing innovative work in neuropsychology,
  intelligence and/or the assessment aspects of cognition. Those who work on positive
  applied neuropsychology are encouraged to apply. Applicants must:  Be psychologists
  with an EdD, PsyD or PhD from an accredited university.Be no more than 10 years
  post doctoral.Have demonstrated competence and capacity to execute the proposed
  work. The grant is for up to $25,000.'
