comments: 'The Abe Fellowship is designed to encourage international multidisciplinary
  research on topics of pressing global concern. The program seeks to foster the development
  of a new generation of researchers who are interested in policy-relevant topics
  of long-range importance and who are willing to become key members of a bilateral
  and global research network built around such topics. It strives especially to promote
  a new level of intellectual cooperation between the Japanese and American academic
  and professional communities committed to and trained for advancing global understanding
  and problem solving. The themes are: 1) Threats to Personal, Societal, and International
  Security; 2) Growth and Sustainable Development; 3) Social, Scientific, and Cultural
  Trends and Transformations; 4) Governance, Empowerment, and Participation. The program
  provides Abe Fellows with a minimum of 3 and maximum of 12 months of full-time support
  over a 24-month period.'
