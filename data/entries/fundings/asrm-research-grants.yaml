comments: The priorities of the ASRM Research Grant Program are to facilitate the
  research endeavors of new investigators, provide bridge (i.e., between grant funding
  periods) funds for projects that are of benefit to other members of the Society,
  and foster the development of innovative research.  Proposals from junior faculty,
  particularly those in their first three years of faculty appointment, will receive
  priority. The ASRM Research Grants, which are funded by the ASRM, are reviewed by
  the ASRM Research Committee and awarded by the Board of Directors. Grants in amounts
  of $10,000 to $50,000 will be considered on an annual basis. A total of $200,000
  is available for 2016.
