comments: The major goal of this program is to assist in the development of the careers
  of junior investigators committed to pursuing careers in the field of aging research.
  AFAR supports research projects concerned with understanding the basic mechanisms
  of aging. Projects investigating age-related diseases are also supported, especially
  if approached from the point of view of how basic aging processes may lead to these
  outcomes. Projects concerning mechanisms underlying common geriatric functional
  disorders are also encouraged, as long as these include connections to fundamental
  problems in the biology of aging. Projects that deal strictly with clinical problems
  such as the diagnosis and treatment of disease, health outcomes, or the social context
  of aging are not eligible.
