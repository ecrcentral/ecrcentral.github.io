name: Special Postdoctoral Researcher (SPDR) Program
description: There is a pressing need to make the most of creative and basic research
  potential if we are to pioneer new frontiers in science and technology on a global
  scale. And for this our greatest hope lies with the work of talented and free-thinking
  young scientists. RIKEN's program for Special Postdoctoral Researchers (SPDR) was
  instituted to provide young and creative scientists the opportunity to be involved
  in autonomous and independent research that is in line with RIKEN objectives and
  research fields.
