name: The China Medical Board (CMB) Postdoctoral Research Fellowship in China
description: "Facilitated by the U-M Medical School and funded by the China Medical\
  \ Board(link is external) (CMB), the CMB Postdoctoral Research Fellowship Program\
  \ places early-career researchers or advanced students (MD, PhD, or equivalent)\
  \ from US institutions into select labs at highly-ranked academic institutions in\
  \ China under the guidance of a local and a U-M mentor.\r\n\r\nFellows spend 1-2\
  \ years training at one of three program host sites: Peking University Health Science\
  \ Center, Central South University Xiangya School of Medicine, or Shanghai Technology\
  \ University. Fellows are provided with NIH-equivalent stipends, benefits, and funds\
  \ to accommodate travel between the US and China. A certificate of completion will\
  \ be awarded upon successful completion of the program.\r\n\r\nEach postdoctoral\
  \ fellow will be co-mentored by a faculty member from the U-M Medical School and\
  \ the Chinese host institution. Fellows and their mentors will work together to\
  \ develop and submit an individualized mentorship and training plan as part of the\
  \ application process. The fellowship year typically runs July-June and begins with\
  \ a week-long orientation at the NIH with the world’s leading global health experts,\
  \ after which fellows will spend 11-12 months on-site at the host institution to\
  \ carry out a mentored research project and training activities aimed at building\
  \ the trainee’s methodologic skills and content expertise in a field relevant to\
  \ health and biomedical science."
