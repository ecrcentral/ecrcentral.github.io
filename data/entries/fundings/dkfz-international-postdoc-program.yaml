name: DKFZ International Postdoc Program
description: "The DKFZ Postdoc Program is the German Cancer Research Center’s official\
  \ program to provide comprehensive support to young researchers while doing their\
  \ postdoc at the institute.\r\n\r\nWe aim to recruit highly talented young scientists\
  \ from all over the world who wish to pursue research projects in basic and translational\
  \ cancer research.\r\n\r\nThrough the research groups in DKFZ’s six Research Programs\
  \ we provide access to cutting-edge research facilities and state-of-the-art labs.\
  \ We foster personal career development of our postdoctoral researchers by offering\
  \ a unique and tailored training portfolio."
