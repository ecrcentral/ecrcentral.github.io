comments: The purpose of the Section Health Policy and Administration Grant Program
  is to stimulate, encourage and support research activities that enhance the body
  of knowledge related to health policy, clinical administration, global health, and
  the use of technology in physical therapy. The grants provide funding to assist
  new physical therapist investigators, or established investigators who are embarking
  on a new research agenda in these areas of physical therapist practice, leadership,
  administration, or education. Through this grant program, the Section hopes to encourage
  the development of proposals that will seek financial support from external agencies.
  1-2 research grant awards of up to $15,000 are available to Section members to assist
  with a 1-year research study that investigates a question or questions of importance
  to health policy or clinical administration. Grants may be renewable (no-cost extension)
  for up to 1 year.
