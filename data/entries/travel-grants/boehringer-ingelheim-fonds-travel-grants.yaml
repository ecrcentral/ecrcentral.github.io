description: <p>The Boehringer Ingelheim Fonds (BIF) awards travel grants of up to
  three months duration to MD and PhD students, as well as postdoctoral researchers
  from all over the world. The BIF supports them if they conduct experimental projects
  in basic biomedical research and want to pursue short-term research stays or attend
  practical courses relevant to their projects in Europe or overseas. The programme
  also enables graduate students and their potential supervisors to evaluate the scientific
  and personal fit before starting a PhD project abroad.</p>
