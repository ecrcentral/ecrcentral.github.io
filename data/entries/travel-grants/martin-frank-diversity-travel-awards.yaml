description: 'The Martin Frank Diversity Travel Award program is designed to broaden participation of those pursuing professional careers in physiological sciences. The specific intent this program is to increase active participation in and networking at scientific meetings among trainees and early career faculty who are from groups underrepresented in the physiological sciences. Specifically about the program: Provides travel awards to underrepresented graduate students, postdoctoral fellows and early career faculty members (within 5 years of obtaining a PhD) to attend the APS annual meeting at Experimental Biology (EB), and APS conferences. EB is a four day meeting attended by approximately 10,000 scientists annually. EB serves as a forum for interactions between physiologists and researchers from other disciplines. APS meetings are focused on a specific physiology topic and occur in an informal setting, allowing for greater interaction between trainees and scientists at the meeting.'
