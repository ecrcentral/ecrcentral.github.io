description: <p>The Springer Nature's communications journals (Biology, Chemistry,
  and Physics) introduced this travel grants for early career researchers in 2018.
  The programme aims to help promising researchers travel to an international scientific
  meeting of their choice that they would otherwise have not been able to attend due
  to a lack of funds. Three grants, each of €2,500, are available to promising early
  career scientists whose research is focused upon one of the three subject areas
  covered by the journals to support the costs of travelling to and participating
  in a conference.</p>
