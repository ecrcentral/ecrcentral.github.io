description: The ECCB Travel Fellowship supports students, early-career researchers, and young researchers who would otherwise have difficulty covering the costs of attending the European Conference on Computational Biology (ECCB). Recipients must be presenting authors on accepted proceedings, abstracts, or posters, and must register and attend all three conference days. Expenses are reimbursed after attendance.
