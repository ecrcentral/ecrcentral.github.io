description: The purpose of the DDSA Visit Grant is to attract students and early career researchers interested in forming a future DDSA fellowship application in collaboration with a potential supervisor from a Danish university or a Danish research institution. The grant contributes up to DKK 15,000 to cover costs for travel, accommodation and related expenses. Application is open to Danish and international students on a bachelor’s degree or a master’s degree programme, PhD students and postdoctoral researchers. You must be enrolled or employed at a university at the time of the planned visit, or your visit must take place within in one year of having completed your enrolment or employment at the university. Applications can be submitted all year round and will be processed within 4 weeks.
