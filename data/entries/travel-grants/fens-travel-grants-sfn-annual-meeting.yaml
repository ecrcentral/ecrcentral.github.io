description: FENS offers travel grants to support its members attending the Society
  for Neuroscience (SfN) Annual Meeting in the USA. Ten grants of EUR 2,000 each
  are awarded per cycle. Open to researchers from the 2nd year of PhD up to postdoctoral
  fellows within 2 years of their PhD defense. FENS membership is required. Grants
  are awarded in odd years only (biennial).
