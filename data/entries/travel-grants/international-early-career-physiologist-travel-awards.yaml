description: <p>The International Early Career Physiologist (IECP) Travel Awards are
  presented to graduate students, post-doctoral fellows and junior faculty members
  who work outside the United States. This initiative of the International Physiology
  Committee is designed to assist with travel expenses that international early career
  physiologists incur in attending the Experimental Biology Meeting in order to present
  their work.</p>
