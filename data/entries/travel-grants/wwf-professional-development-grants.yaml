description: <p>Professional Development Grants (PDGs) provide support for mid-career
  conservationists to pursue short-term, non-degree training to upgrade their knowledge
  and skills. These trainings can include short courses, certificate trainings, or
  conferences among other training opportunities. PDGs support training-related costs,
  including registration fees and tuition, meals and accommodations, books and materials,
  international travel, visa fees, and local transportation. Training may take place
  anywhere in the world and applicants can request up to $ 6500.</p>
