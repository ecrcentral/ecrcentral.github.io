description: 'The Winston Churchill Memorial Trust runs the Churchill Fellowships, a unique programme of overseas research grants. These support UK citizens from all parts of society to travel the world in search of innovative solutions for today''s most pressing problems. Every year we award 150 Fellowships. These fund outstanding individuals to travel for 4-8 weeks, anywhere in the world, researching a topic of their choice among global leaders in their field. On their return, we help them to share their global learning with professions and communities across the UK.'
