description: S&R Evermay’s Kuno Award for Applied Science for the Social Good is a biennial award designed to support women social innovators using scientific research and principles to address a 21st Century problem. The award supports the translation of scientific research to a practical, real-world solution for those aiming to achieve broad social impact. The Kuno awardee is provided with $100,000 in funding. Indirect costs up to 10% are included in the $100,000 award amount. Award recipients are visionaries with deep domain expertise in fields relating to the specific 21st century challenges addressed by their project. Potential project outcomes can vary greatly from a developing a new teaching model to hosting a conference to developing a new tool for your field. if you have any questions, please email y.niang@skimpactfund.com
