description: The CORBEL webinar series continues with a presentation by Noriko A.
  Cassman, from the Netherlands Cancer Institute (NKI). Participants will be introduced
  to the data-integration platform cBioPortal. Here, different sources of research
  data (clinical, imaging, biosample and experimental) of a study are integrated,
  enabling viewing, querying and analysis. This webinar is aimed at data managers,
  researchers, PhD students and postdocs involved in clinical, translational and biomedical
  research.
