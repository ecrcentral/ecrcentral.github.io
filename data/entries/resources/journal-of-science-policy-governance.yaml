description: "The Journal of Science Policy & Governance (JSPG) is an internationally\
  \ recognized, open-access peer-reviewed publication dedicated to elevating students,\
  \ post-docs, policy fellows and early career scholars in science, technology and\
  \ innovation policy and governance debate worldwide. Since 2011, JSPG has served\
  \ as a vehicle for students and early career researchers to bolster their research\
  \ and writing credentials in science policy. JSPG also elevates published work using\
  \ a podcast, conference panels, and webinars that foster intergenerational discussions\
  \ and engage the next generation in science policy. \r\n\r\nOpportunities with JSPG:\r\
  \n●\tPublication opportunities - submit your science policy research to our standard\
  \ or special issue deadlines throughout the year.\r\n●\tWriting workshops and webinars\
  \ - attend events to learn from science policy experts and practice your writing\
  \ skills in preparation for submission. \r\n●\tEditorial board - our editorial board\
  \ is composed of early career researchers looking to build their skills in science\
  \ policy writing and editing. \r\n●\tAmbassador program - we offer ambassador opportunities\
  \ for students interested in science policy. \r\n●\tScience policy & advocacy certificate\
  \ program - learn key concepts and develop practical skills in science policy and\
  \ advocacy, and network with policy professionals. \r\n●\tOpportunities for published\
  \ authors - we highlight published work through speaking opportunities and conference\
  \ panels, in addition to media outreach. \r\n●\tPodcast - we interview published\
  \ authors, to provide another medium for them to share more about their publications\
  \ and reach an extended audience in science policy.\r\n\r\nSubmission deadlines:\r\
  \n•\t2023 Special Issue deadlines: October 29, 2023 - Sponsored by Sigma Xi and\
  \ the Rita Allen Foundation\r\n•\t2023 Standard issue deadlines:  November 26, 2023\
  \ - Winter Standard Issue\r\n\r\nFollow JSPG on Twitter, Facebook, LinkedIn, Instagram,\
  \ YouTube and Soundcloud. Subscribe to our newsletter for the latest call for papers,\
  \ volume releases and professional development opportunities in science policy.\r\
  \n\r\nWebsite: https://www.sciencepolicyjournal.org/\r\nFacebook: https://www.facebook.com/SciPolJournal/\r\
  \nTwitter: https://twitter.com/SciPolJournal\r\nYouTube: https://www.youtube.com/channel/UCREFJdaKqt3tCw4IfxGRcyw\r\
  \nInstagram: https://instagram.com/scipoljournal\r\nLinkedIn: https://www.linkedin.com/company/the-journal-of-science-policy-and-governance/\r\
  \nNewsletter sign up: https://www.sciencepolicyjournal.org/contact.html"
