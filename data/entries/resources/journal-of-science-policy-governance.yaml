description: 'The Journal of Science Policy & Governance (JSPG) is an internationally recognized, open-access peer-reviewed publication dedicated to elevating students, post-docs, policy fellows and early career scholars in science, technology and innovation policy and governance debate worldwide. Since 2011, JSPG has served as a vehicle for students and early career researchers to bolster their research and writing credentials in science policy. JSPG also elevates published work using a podcast, conference panels, and webinars that foster intergenerational discussions and engage the next generation in science policy. Opportunities with JSPG: ● Publication opportunities - submit your science policy research to our standard or special issue deadlines throughout the year. ● Writing workshops and webinars - attend events to learn from science policy experts and practice your writing skills in preparation for submission. ● Editorial board - our editorial board is composed of early career researchers looking to build their skills in science policy writing and editing. ● Ambassador program - we offer ambassador opportunities for students interested in science policy. ● Science policy & advocacy certificate program - learn key concepts and develop practical skills in science policy and advocacy, and network with policy professionals. ● Opportunities for published authors - we highlight published work through speaking opportunities and conference panels, in addition to media outreach. ● Podcast - we interview published authors, to provide another medium for them to share more about their publications and reach an extended audience in science policy. Submission deadlines: • 2023 Special Issue deadlines: October 29, 2023 - Sponsored by Sigma Xi and the Rita Allen Foundation • 2023 Standard issue deadlines: November 26, 2023 - Winter Standard Issue Follow JSPG on Twitter, Facebook, LinkedIn, Instagram, YouTube and Soundcloud. Subscribe to our newsletter for the latest call for papers, volume releases and professional development opportunities in science policy. Website: https://www.sciencepolicyjournal.org/ Facebook: https://www.facebook.com/SciPolJournal/ Twitter: https://twitter.com/SciPolJournal YouTube: https://www.youtube.com/channel/UCREFJdaKqt3tCw4IfxGRcyw Instagram: https://instagram.com/scipoljournal LinkedIn: https://www.linkedin.com/company/the-journal-of-science-policy-and-governance/ Newsletter sign up: https://www.sciencepolicyjournal.org/contact.html'
