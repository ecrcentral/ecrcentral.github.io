description: 'The 2020 application for the $100,000 Kuno Award for Applied Science is now open until August 31st. S&R Foundation’s Kuno Award for Applied Science for the Social Good is designed to support women social innovators using scientific research and principles to address a 21st Century problem. The award supports the translation of scientific research to a practical, real-world solution for those aiming to achieve measurable social impact. To learn more about this award, visit S&R Foundation here: https://sandrfoundation.org/programs/kuno-award'
