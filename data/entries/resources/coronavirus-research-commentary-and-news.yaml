description: As scientists strive to understand the dangerous respiratory disease
  COVID-19 (coronavirus disease 2019) and the virus that causes it, research and analyses
  are coming to the Sciencejournals at a dizzying pace. Our editors aim to quickly
  review and publish the best of them. The Science family of journals is proud to
  cosign a letter led by the Wellcome Trust setting out the terms under which scientific
  publishers should operate during this crisis. As a result, for coronavirus papers
  we are strongly encouraging preprints, making all data and the published paper free
  immediately, and aiming for expedited but thorough peer-review. Our news staff is
  covering the broader landscape of research and public health. We hope Science’s
  collected content will provide information you can trust as the science behind COVID-19
  is discovered.
