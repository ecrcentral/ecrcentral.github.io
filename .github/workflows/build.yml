name: Build

on:
  push:
    branches:
      - main
    paths:
      - 'data/entries/**'
      - 'data/schema/**'
      - 'apps/web/**'
      - 'scripts/build/**'
      - 'scripts/validate/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install pyyaml jsonschema

      - name: Validate content
        run: |
          python scripts/validate/validate_yaml.py
          python scripts/validate/validate_taxonomies.py
          python scripts/validate/validate_duplicates.py

      - name: Build JSON artifacts
        run: |
          python scripts/build/build_records.py
          python scripts/build/build_facets.py
          python scripts/build/build_search_index.py
          python scripts/build/build_homepage_featured.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Node dependencies
        run: cd apps/web && npm ci

      - name: Build Astro site
        run: cd apps/web && npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
